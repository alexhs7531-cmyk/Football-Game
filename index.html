<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draft Zone League</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --pitch-0:#08251C;--pitch-1:#0E3728;--pitch-2:#15543F;--pitch-3:#1C6B4F;
    --chalk:#EAF3EE;--chalk-dim:#93AEA2;--line:rgba(234,243,238,.16);--line-strong:rgba(234,243,238,.34);
    --p1:#FFB23E;--p2:#39B7F0;--pos:#5BE08A;--neg:#FF7A7A;--gold:#F4C95D;
    --display:'Anton',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 50% -10%,#14503B 0%,var(--pitch-0) 60%),var(--pitch-0);color:var(--chalk);font-family:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--body);cursor:pointer;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--pitch-2);border-radius:8px;}::-webkit-scrollbar-track{background:transparent;}
  .wrap{max-width:1320px;margin:0 auto;padding:0 20px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(8,37,28,.96),rgba(8,37,28,.78));backdrop-filter:blur(6px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:14px;}
  .crest{width:38px;height:38px;border-radius:9px;background:repeating-linear-gradient(90deg,var(--p1) 0 6px,#0E3728 6px 12px);border:2px solid var(--chalk);}
  .brand h1{font-family:var(--display);font-size:22px;letter-spacing:.06em;margin:0;line-height:1;text-transform:uppercase;}
  .brand .sub{font-size:11px;color:var(--chalk-dim);letter-spacing:.18em;text-transform:uppercase;}
  .scorechips{display:flex;gap:10px;align-items:center;}
  .chip{display:flex;flex-direction:column;align-items:center;min-width:84px;padding:6px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.18);}
  .chip .nm{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip .pts{font-family:var(--display);font-size:24px;line-height:1;}
  .chip.p1{box-shadow:inset 0 -3px 0 var(--p1);}.chip.p1 .pts{color:var(--p1);}
  .chip.p2{box-shadow:inset 0 -3px 0 var(--p2);}.chip.p2 .pts{color:var(--p2);}
  .panel{background:linear-gradient(180deg,var(--pitch-1),#0B2C21);border:1px solid var(--line);border-radius:16px;}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  h2.head{font-family:var(--display);text-transform:uppercase;letter-spacing:.04em;font-size:30px;margin:6px 0 0;}
  .btn{border:none;border-radius:11px;padding:13px 22px;font-weight:700;font-size:15px;letter-spacing:.02em;background:var(--chalk);color:#0A2A20;transition:transform .06s,filter .15s;}
  .btn:hover{filter:brightness(1.06);}.btn:active{transform:translateY(1px);}.btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.sm{padding:8px 14px;font-size:13px;}
  .btn.ghost{background:transparent;color:var(--chalk);border:1px solid var(--line-strong);}
  .btn.p1{background:var(--p1);color:#2A1700;}.btn.p2{background:var(--p2);color:#04263A;}
  .btn.danger{background:transparent;color:var(--neg);border:1px solid rgba(255,122,122,.5);}
  input.fld,select.fld{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:11px;padding:12px 13px;font-size:15px;font-family:var(--body);}
  input.fld:focus,select.fld:focus{outline:none;border-color:var(--gold);}
  select.fld option{background:#0B2C21;}
  label.lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:7px;}
  .muted{color:var(--chalk-dim);}
  .center{min-height:72vh;display:flex;align-items:center;justify-content:center;}
  .card{width:100%;max-width:560px;padding:34px;}
  .kit-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
  .kit-pill.p1{background:rgba(255,178,62,.14);color:var(--p1);border:1px solid rgba(255,178,62,.4);}
  .kit-pill.p2{background:rgba(57,183,240,.14);color:var(--p2);border:1px solid rgba(57,183,240,.4);}
  .draftgrid{display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:20px;align-items:start;margin-top:18px;}
  @media(max-width:980px){.draftgrid{grid-template-columns:1fr;}}
  .clock{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px;border-radius:14px;margin-bottom:16px;border:1px solid var(--line-strong);}
  .clock.p1{background:linear-gradient(90deg,rgba(255,178,62,.18),rgba(255,178,62,.03));box-shadow:inset 4px 0 0 var(--p1);}
  .clock.p2{background:linear-gradient(90deg,rgba(57,183,240,.18),rgba(57,183,240,.03));box-shadow:inset 4px 0 0 var(--p2);}
  .clock .who{font-family:var(--display);font-size:24px;letter-spacing:.03em;text-transform:uppercase;}
  .clock .meta{font-size:12px;color:var(--chalk-dim);letter-spacing:.08em;text-transform:uppercase;}
  .reels{display:flex;gap:12px;justify-content:center;margin:10px 0 6px;}
  .reel{flex:1;max-width:260px;background:#06201A;border:1px solid var(--line-strong);border-radius:13px;padding:16px;text-align:center;overflow:hidden;}
  .reel .cap{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--chalk-dim);}
  .reel .val{font-family:var(--display);font-size:25px;line-height:1.05;margin-top:6px;letter-spacing:.02em;min-height:34px;}
  .reel.season .val{font-family:var(--mono);font-size:23px;color:var(--gold);}
  .reel.spinning .val{filter:blur(1px);opacity:.85;}
  .spinbtn{display:block;width:100%;border:none;border-radius:13px;padding:18px;font-family:var(--display);font-size:24px;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(180deg,var(--gold),#D9A52E);color:#2A1C00;}
  .spinbtn:active{transform:translateY(1px);}
  .clubpool{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .poolhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,0,0,.2);}
  .poolhdr b{font-size:15px;}.poolhdr .ss{font-family:var(--mono);color:var(--gold);}
  .poolist{max-height:330px;overflow:auto;}
  .prow{display:grid;grid-template-columns:42px 1fr auto auto;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
  .prow:hover{background:rgba(255,255,255,.05);}.prow:last-child{border-bottom:none;}
  .ovr{font-family:var(--mono);font-weight:700;font-size:15px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:var(--pitch-2);}
  .ovr.hi{background:#1E7A57;color:#EAFBF2;}.ovr.lo{background:#3a2f1a;color:#e8d7a8;}
  .pname{font-weight:600;font-size:15px;line-height:1.15;}.pmeta{font-size:11.5px;color:var(--chalk-dim);}
  .info{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--chalk-dim);width:28px;height:28px;border-radius:7px;font-weight:700;}
  .pickbtn{background:var(--chalk);color:#0A2A20;border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;}
  .empty{padding:24px;text-align:center;color:var(--chalk-dim);}
  .pitch{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:3/4;background:repeating-linear-gradient(0deg,#16573F 0 12.5%,#13503A 12.5% 25%);border:1px solid var(--line);}
  .pitch .mk{position:absolute;border:2px solid var(--line-strong);}
  .pitch .halfway{left:8%;right:8%;top:50%;height:0;border-top:2px solid var(--line-strong);}
  .pitch .circle{left:50%;top:50%;width:26%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;}
  .pitch .boxTop{left:26%;right:26%;top:0;height:15%;}.pitch .boxBot{left:26%;right:26%;bottom:0;height:15%;}
  .slot{position:absolute;transform:translate(-50%,-50%);width:74px;text-align:center;cursor:pointer;}
  .slot:hover .shirt{filter:brightness(1.12);}
  .shirt{width:48px;height:48px;margin:0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:16px;color:#06231A;border:2px solid rgba(255,255,255,.55);position:relative;}
  .shirt.empty{background:transparent;border:2px dashed var(--line-strong);color:var(--chalk-dim);font-family:var(--body);font-size:11px;font-weight:700;}
  .shirt.p1{background:linear-gradient(160deg,#FFC862,#F39B17);}.shirt.p2{background:linear-gradient(160deg,#6FD0FF,#1E9FE0);color:#04263A;}
  .slot .nm{font-size:11px;margin-top:4px;line-height:1.1;color:var(--chalk);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;font-weight:600;}
  .slot .cl{font-size:9px;color:var(--chalk-dim);display:block;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poslab{position:absolute;top:-6px;left:-6px;background:#06231A;border:1px solid var(--line-strong);color:var(--gold);font-family:var(--mono);font-size:9px;font-weight:700;border-radius:5px;padding:1px 4px;}
  .mgrslot{display:flex;align-items:center;gap:12px;margin-top:12px;padding:11px 14px;border-radius:12px;border:1px dashed var(--line-strong);}
  .mgrslot.filled{border-style:solid;}
  .opp{margin-top:16px;padding:14px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.14);}
  .opp h4{margin:0 0 8px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .progbars{display:flex;gap:6px;}.pb{flex:1;height:6px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;}.pb i{display:block;height:100%;}
  table.league{width:100%;border-collapse:collapse;font-size:14px;}
  table.league th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);text-align:right;padding:10px 8px;border-bottom:1px solid var(--line-strong);font-weight:700;}
  table.league th.l,table.league td.l{text-align:left;}
  table.league td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono);}
  table.league td.team{font-family:var(--body);font-weight:600;cursor:pointer;}
  table.league td.team:hover{color:var(--gold);}
  table.league tr.r1{background:linear-gradient(90deg,rgba(255,178,62,.12),transparent);}
  table.league tr.r2{background:linear-gradient(90deg,rgba(57,183,240,.12),transparent);}
  table.league tr.click{cursor:pointer;}table.league tr.click:hover td{background:rgba(255,255,255,.04);}
  .pos{display:inline-block;width:22px;color:var(--chalk-dim);}
  .ownerbar{display:inline-block;width:4px;height:16px;border-radius:2px;margin-right:9px;vertical-align:-3px;}
  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin:8px 0 24px;}
  .bigscore{font-family:var(--display);font-size:84px;line-height:.9;}
  .winnerbanner{text-align:center;padding:22px;border-radius:16px;margin-bottom:22px;border:1px solid var(--line-strong);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}.bigscore{font-size:60px;}}
  .teamline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .teamline .p{font-family:var(--mono);font-weight:700;}.teamline.click{cursor:pointer;}.teamline.click:hover{color:var(--gold);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#3a1414;border:1px solid #FF7A7A;color:#ffd9d9;padding:12px 18px;border-radius:11px;font-size:14px;z-index:80;}
  .row{display:flex;gap:12px;align-items:center;}.spread{display:flex;justify-content:space-between;align-items:center;}
  .stat{font-family:var(--mono);}.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .smallcap{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .seg{display:flex;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
  .seg button{background:transparent;border:none;color:var(--chalk-dim);padding:9px 13px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
  .seg button.on{background:var(--pitch-2);color:var(--chalk);}
  .modal{position:fixed;inset:0;background:rgba(3,16,12,.74);z-index:70;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modalbox{max-width:820px;width:100%;max-height:92vh;overflow:auto;padding:22px;}
  .xline{display:grid;grid-template-columns:34px 1fr auto auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer;}
  .xline:hover{color:var(--gold);}
  .bar{display:grid;grid-template-columns:120px 1fr 34px;gap:10px;align-items:center;margin:6px 0;font-size:13px;}
  .bar .track{height:8px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden;}
  .bar .fill{height:100%;border-radius:5px;}
  .bar .v{font-family:var(--mono);text-align:right;font-weight:700;}
  .traitchip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(244,201,93,.4);background:rgba(244,201,93,.1);border-radius:999px;padding:4px 10px;margin:3px 4px 0 0;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chiptoggle{font-size:12px;font-weight:600;border:1px solid var(--line-strong);background:transparent;color:var(--chalk-dim);border-radius:999px;padding:6px 11px;}
  .chiptoggle.on{background:var(--gold);color:#2A1C00;border-color:var(--gold);}
  .attgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  @media(max-width:620px){.attgrid{grid-template-columns:repeat(2,1fr);}}
  .att label{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:3px;}
  .att input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:9px;padding:8px;font-family:var(--mono);font-size:14px;}
  .cvrow{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .cvrow .nm{font-weight:600;}.cvrow .meta{font-size:12px;color:var(--chalk-dim);}
  code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px;}
</style>
</head>

/* ---- RNG + poisson ---- */
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

function makeRng(seed){const n=mulberry32(typeof seed==='string'?hashSeed(seed):seed);return{
  float:()=>n(),int:(lo,hi)=>Math.floor(n()*(hi-lo+1))+lo,
  poisson:(l)=>{if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=n();}while(p>L);return k-1;},
  weighted:(w)=>{const t=w.reduce((a,b)=>a+b,0);if(t<=0)return 0;let r=n()*t;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}return w.length-1;}};}

/* ---- trait modifiers ---- */

/* ---- simulation engine ---- */
const BASE_GOALS=1.30,QEXP=1.65,HOME_ADV=1.12,POSS_INF=0.5,BIGM=78,OOP=0.85;

const chem=(p,v)=>p.inPrimaryPosition?v:v*OOP;
function buildProfile(team){
  const P=team.players.map(applyTraits);
  const gks=P.filter(p=>p.line==='GK'),defs=P.filter(p=>p.line==='DEF'),mids=P.filter(p=>p.line==='MID'),fwds=P.filter(p=>p.line==='FWD');
  const gk=avg(gks.map(p=>chem(p,p.goalkeeping*.75+p.physical*.1+p.consistency*.15)))||50;
  const def=avg(defs.map(p=>chem(p,p.defending*.55+p.physical*.25+p.pace*.1+p.consistency*.1)))||50;
  const midControl=avg(mids.map(p=>chem(p,p.passing*.4+p.creativity*.35+p.consistency*.15+p.physical*.1)))||50;
  const midDefend=avg(mids.map(p=>chem(p,p.defending*.6+p.physical*.3+p.pace*.1)))||50;
  const att=avg(fwds.map(p=>chem(p,p.shooting*.45+p.pace*.2+p.creativity*.2+p.consistency*.15)))||50;
  const m=team.manager||{attackingStyle:55,defensiveStyle:55,adaptability:55,discipline:55,possession:55,counterAttack:50};
  const attackMod=0.85+(m.attackingStyle/100)*0.4+(m.adaptability/100)*0.05;
  const defenceMod=0.85+(m.defensiveStyle/100)*0.4+(m.discipline/100)*0.05;
  return {gk,def,midControl,midDefend,att,avgBig:avg(P.map(p=>p.bigMatch))||50,
    attackOutput:(att*.62+midControl*.38)*attackMod,defensiveResistance:(def*.5+gk*.3+midDefend*.2)*defenceMod};
}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function attribute(team,goals,rng){
  const ev=[];if(goals<=0)return ev;

  const sw=att.map(p=>p.shooting*(p.line==='FWD'?1.6:0.8)+p.pace*.3+p.creativity*.3);
  const aw=att.map(p=>p.creativity*1.4+p.passing*1.1);
  for(let g=0;g<goals;g++){const min=rng.int(1,90),si=rng.weighted(sw),sc=att[si];
    ev.push({pid:sc.id,team:team.teamId,type:'GOAL',minute:min,name:sc.name});
    if(rng.float()<0.75&&att.length>1){let ai=rng.weighted(aw);if(ai===si)ai=(ai+1)%att.length;
      ev.push({pid:att[ai].id,team:team.teamId,type:'ASSIST',minute:min,name:att[ai].name});}}
  return ev;
}
function simulateMatch(home,away,seed){
  const rng=makeRng(seed),H=buildProfile(home),A=buildProfile(away);
  const hMid=H.midControl*(0.85+(home.manager?home.manager.possession:55)/333),aMid=A.midControl*(0.85+(away.manager?away.manager.possession:55)/333);
  const hShare=hMid/(hMid+aMid),aShare=1-hShare;
  const hPoss=1+(hShare-0.5)*2*POSS_INF,aPoss=1+(aShare-0.5)*2*POSS_INF;
  const hCtr=1+aShare*((home.manager?home.manager.counterAttack:50)/100)*0.25,aCtr=1+hShare*((away.manager?away.manager.counterAttack:50)/100)*0.25;
  let hXg=BASE_GOALS*Math.pow(H.attackOutput/A.defensiveResistance,QEXP)*hPoss*hCtr*HOME_ADV;
  let aXg=BASE_GOALS*Math.pow(A.attackOutput/H.defensiveResistance,QEXP)*aPoss*aCtr;
  if(H.att>=BIGM&&A.att>=BIGM){const d=(H.avgBig-A.avgBig)/100;hXg*=1+d*0.12;aXg*=1-d*0.12;}
  hXg=clamp(hXg,0.15,5.5);aXg=clamp(aXg,0.15,5.5);
  const hg=rng.poisson(hXg),ag=rng.poisson(aXg);
  return {homeTeamId:home.teamId,awayTeamId:away.teamId,homeGoals:hg,awayGoals:ag,homeXg:Math.round(hXg*100)/100,awayXg:Math.round(aXg*100)/100,events:[...attribute(home,hg,rng),...attribute(away,ag,rng)]};
}
function generateFixtures(ids,seed){
  const rng=makeRng(seed);const teams=ids.slice();
  for(let i=teams.length-1;i>0;i--){const j=rng.int(0,i);[teams[i],teams[j]]=[teams[j],teams[i]];}
  const n=teams.length,rounds=n-1,half=n/2,arr=teams.slice(),first=[];
  for(let r=0;r<rounds;r++){for(let i=0;i<half;i++){const t1=arr[i],t2=arr[n-1-i],hf=(r+i)%2===0;first.push({matchday:r+1,homeTeamId:hf?t1:t2,awayTeamId:hf?t2:t1});}
    const fixed=arr[0],rest=arr.slice(1);rest.unshift(rest.pop());arr.splice(0,arr.length,fixed,...rest);}
  return first.concat(first.map(f=>({matchday:f.matchday+rounds,homeTeamId:f.awayTeamId,awayTeamId:f.homeTeamId})));
}
function computeTable(ids,results){
  const m=new Map(ids.map(id=>[id,{teamId:id,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0}]));
  for(const r of results){const h=m.get(r.homeTeamId),a=m.get(r.awayTeamId);
    h.played++;a.played++;h.gf+=r.homeGoals;h.ga+=r.awayGoals;a.gf+=r.awayGoals;a.ga+=r.homeGoals;
    if(r.homeGoals>r.awayGoals){h.won++;h.pts+=3;a.lost++;}else if(r.homeGoals<r.awayGoals){a.won++;a.pts+=3;h.lost++;}else{h.drawn++;a.drawn++;h.pts++;a.pts++;}}
  const rows=[...m.values()].sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf||x.teamId.localeCompare(y.teamId));
  rows.forEach((r,i)=>{r.gd=r.gf-r.ga;r.position=i+1;});return rows;
}
function computeScores(teams,table){
  const pos=new Map(table.map(r=>[r.teamId,r]));
  const mk=slot=>{const mine=teams.filter(t=>t.owner===slot);
    const tp=mine.map(t=>{const r=pos.get(t.id)||{pts:0,position:0};return{id:t.id,name:t.name,pts:r.pts,position:r.position};});
    return{total:tp.reduce((s,x)=>s+x.pts,0),teams:tp.sort((a,b)=>a.position-b.position)};};
  const p1=mk(1),p2=mk(2);return{p1,p2,winner:p1.total===p2.total?0:(p1.total>p2.total?1:2)};
}
function toSim(team,cards){
  const mgr=cards.get(team.slots.MANAGER);const players=[];
  for(const s of SLOT_ORDER){if(s==='MANAGER')continue;const id=team.slots[s];if(!id)continue;const c=cards.get(id);const line=slotLine(s);
    const inPos=POS_LINE[c.primary]===line||(c.secondaries||[]).some(x=>POS_LINE[x]===line);
    players.push({...c,line,inPrimaryPosition:inPos});}
  return{teamId:team.id,name:team.name,owner:team.owner,players,manager:mgr};
}

function parseCSV(text){const rows=[];let i=0,field='',row=[],q=false;
  while(i<text.length){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){field+='"';i++;}else q=false;}else field+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){row.push(field);field='';}
      else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;if(field!==''||row.length){row.push(field);rows.push(row);row=[];field='';}}
      else field+=ch;}i++;}
  if(field!==''||row.length){row.push(field);rows.push(row);}
  if(!rows.length)return[];const head=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1).map(r=>{const o={};head.forEach((h,j)=>o[h]=(r[j]??'').trim());return o;});
}

const SKEY='dz_state_v4';
function loadState(){try{const raw=localStorage.getItem(SKEY);if(raw){const s=JSON.parse(raw);if(s&&s.screen&&s.catalogue&&s.catalogue.players&&s.catalogue.players.length)return s;}}catch(e){}return null;}

   State / reducer
   ========================================================================== */
function emptyTeam(owner,round){const slots={};SLOT_ORDER.forEach(s=>slots[s]=null);
  return{id:`t${owner}r${round}_${Math.random().toString(36).slice(2,7)}`,owner,round,name:'',slots,respins:RESPINS};}
function teamComplete(t){return SLOT_ORDER.every(s=>t.slots[s]);}
function nextOpenSlotForLine(t,line){return LINE_SLOTS[line].find(s=>!t.slots[s])||null;}
function activeTeam(s){return s.teams.find(t=>t.round===s.round&&t.owner===s.activeSlot);}
function getOpen(team){const lines=new Set();['GK','DEF','MID','FWD'].forEach(L=>{if(LINE_SLOTS[L].some(s=>!team.slots[s]))lines.add(L);});return{lines,managerOpen:!team.slots.MANAGER};}
function cardMapOf(cat){return new Map([...cat.players,...cat.managers].map(c=>[c.id,c]));}
function csCards(cardMap,cs,team,drafted){
  const open=getOpen(team);
  const players=cs.playerIds.map(id=>cardMap.get(id)).filter(c=>c&&!drafted[c.id]&&open.lines.has(c.line)&&nextOpenSlotForLine(team,c.line));
  const manager=(open.managerOpen&&cs.managerId&&!drafted[cs.managerId])?cardMap.get(cs.managerId):null;
  return{players,manager};
}
function pickClubSeason(state,exclude){
  const team=activeTeam(state);if(!team)return null;
  const cm=cardMapOf(state.catalogue);
  let cands=state.clubSeasons.filter(cs=>{const r=csCards(cm,cs,team,state.drafted);return r.players.length||r.manager;});
  if(exclude&&cands.length>1)cands=cands.filter(cs=>cs.key!==exclude);
  if(!cands.length)return null;
  const weights=cands.map(cs=>{const r=csCards(cm,cs,team,state.drafted);const all=[...r.players];if(r.manager)all.push(r.manager);return Math.max(1,(all.reduce((s,c)=>s+(c.overall||60),0)/all.length)-40);});
  const t=weights.reduce((a,b)=>a+b,0);let r=Math.random()*t,idx=0;for(let i=0;i<cands.length;i++){r-=weights[i];if(r<=0){idx=i;break;}}
  return cands[idx].key;
}
function freshState(catalogue){const cat=catalogue||generateCatalogue();
  return{screen:'setup',p1Name:'',p2Name:'',catalogue:cat,clubSeasons:buildClubSeasons(cat),round:1,activeSlot:1,teams:[],drafted:{},spin:{key:null,nonce:0},results:null,byDay:null,simDay:0,table:null,scores:null,error:null};}
function initState(){return loadState()||freshState(DEFAULT_DATA||undefined);}

function reducer(state,a){
  switch(a.type){
    case 'NAMES':return{...state,p1Name:a.p1,p2Name:a.p2};
    case 'SET_CATALOGUE':return{...state,catalogue:a.cat,clubSeasons:buildClubSeasons(a.cat)};
    case 'ERR':return{...state,error:a.msg};
    case 'CLR_ERR':return{...state,error:null};
    case 'GO':return{...state,screen:a.screen};
    case 'START':return{...state,screen:'naming',round:1,activeSlot:1,teams:[],drafted:{},spin:{key:null,nonce:0},results:null,table:null,scores:null,byDay:null,simDay:0};
    case 'NAME_TEAMS':{const t1=emptyTeam(1,state.round),t2=emptyTeam(2,state.round);t1.name=a.n1.trim();t2.name=a.n2.trim();
      return{...state,teams:[...state.teams,t1,t2],screen:'draft',activeSlot:1,spin:{key:null,nonce:state.spin.nonce}};}
    case 'SPIN':{const key=pickClubSeason(state,null);if(!key)return{...state,error:'No clubs left with players you can use'};
      return{...state,spin:{key,nonce:state.spin.nonce+1}};}
    case 'RESPIN':{const team=activeTeam(state);if(!team||team.respins<=0)return{...state,error:'No re-spins left for this team'};
      const key=pickClubSeason(state,state.spin.key);if(!key)return state;
      return{...state,teams:state.teams.map(t=>t.id===team.id?{...t,respins:t.respins-1}:t),spin:{key,nonce:state.spin.nonce+1}};}
    case 'PICK':{const card=a.card,team=activeTeam(state);if(!team)return state;
      if(!state.spin.key)return{...state,error:'Spin first'};
      if(card.club+'__'+card.season!==state.spin.key)return state;
      if(state.drafted[card.id])return{...state,error:'Already taken'};
      const slot=card.kind==='manager'?'MANAGER':nextOpenSlotForLine(team,card.line);
      if(!slot)return{...state,error:'No open slot for that pick'};
      const teams=state.teams.map(t=>t.id===team.id?{...t,slots:{...t.slots,[slot]:card.id}}:t);
      const drafted={...state.drafted,[card.id]:true};
      const base={...state,teams,drafted,spin:{key:null,nonce:state.spin.nonce},error:null};
      const cur=teams.filter(t=>t.round===state.round);
      if(cur.every(teamComplete)){if(state.round>=ROUNDS)return startSim(base);return{...base,round:state.round+1,activeSlot:1,screen:'naming'};}
      return{...base,activeSlot:state.activeSlot===1?2:1};}
    case 'SIM_TICK':return{...state,simDay:Math.min(state.simDay+1,38)};
    case 'RESET':return{...freshState(state.catalogue),p1Name:state.p1Name,p2Name:state.p2Name};
    default:return state;
  }
}
function startSim(state){
  const cards=cardMapOf(state.catalogue);const sims=state.teams.map(t=>toSim(t,cards));
  const ids=state.teams.map(t=>t.id);const fixtures=generateFixtures(ids,'dz-'+ids.join('').slice(0,8));
  const byId=new Map(sims.map(t=>[t.teamId,t]));
  const results=fixtures.map((f,i)=>({...simulateMatch(byId.get(f.homeTeamId),byId.get(f.awayTeamId),`${f.matchday}:${f.homeTeamId}:${f.awayTeamId}`),matchday:fixtures[i].matchday}));
  const byDay={};results.forEach(r=>{(byDay[r.matchday]=byDay[r.matchday]||[]).push(r);});
  const table=computeTable(ids,results);const scores=computeScores(state.teams,table);
  return{...state,screen:'sim',simDay:0,results,byDay,table,scores,error:null};
}

  const open=getOpen(team);

                    <button class="pickbtn">Draft</button></div>`)}

function Simulating({state,dispatch}){
  useEffect(()=>{if(state.simDay>=38)return;const t=setTimeout(()=>dispatch({type:'SIM_TICK'}),130);return()=>clearTimeout(t);},[state.simDay]);
  const ids=state.teams.map(t=>t.id);const upto=[];for(let d=1;d<=state.simDay;d++)(state.byDay[d]||[]).forEach(r=>upto.push(r));
  const tbl=computeTable(ids,upto);const nameOf=new Map(state.teams.map(t=>[t.id,t]));const done=state.simDay>=38;
  return html`<div class="wrap"><div class="panel" style=${{padding:'24px',marginTop:'22px'}}>
    <div class="spread"><div><div class="eyebrow">Season in progress</div><h2 class="head">Matchday ${state.simDay} / 38</h2></div>
      ${done?html`<button class="btn p1" onClick=${()=>dispatch({type:'GO',screen:'results'})}>See final result →</button>`:html`<div class="smallcap">Simulating…</div>`}</div>
    <div class="pb" style=${{height:'8px',marginTop:'14px'}}><i style=${{width:(state.simDay/38*100)+'%',background:'var(--gold)',transition:'width .13s'}}></i></div>
    <div style=${{marginTop:'18px',maxHeight:'520px',overflow:'auto'}}><${LeagueTable} rows=${tbl} nameOf=${nameOf} /></div>
  </div></div>`;
}

function TeamView({team,cards,onClose,state,viewPlayer}){
  const players=SLOT_ORDER.filter(s=>s!=='MANAGER').map(s=>({slot:s,c:cards.get(team.slots[s])})).filter(x=>x.c);
  const mgr=cards.get(team.slots.MANAGER);
  const row=state.table?state.table.find(r=>r.teamId===team.id):null;
  return html`<div class="modal" onClick=${onClose}><div class="panel modalbox" onClick=${e=>e.stopPropagation()}>
    <div class="spread"><div><div class="eyebrow">${team.owner===1?state.p1Name:state.p2Name}</div><h2 class="head">${team.name}</h2></div>
      <button class="btn ghost sm" onClick=${onClose}>Close</button></div>
    ${row&&html`<div class="smallcap" style=${{marginTop:'6px'}}>Finished ${row.position}${row.position===1?'st':row.position===2?'nd':row.position===3?'rd':'th'} · ${row.pts} pts · ${row.won}W ${row.drawn}D ${row.lost}L · GD ${(row.gd>=0?'+':'')+row.gd}</div>`}
    <div class="grid2" style=${{marginTop:'14px',alignItems:'start'}}>
      <${Pitch} team=${team} owner=${team.owner} cards=${cards} onPlayer=${viewPlayer} />
      <div>
        <div class="smallcap">Manager</div>
        <div class="xline" style=${{cursor:'default'}}><div></div><div class="pname">${mgr?mgr.name:'—'}</div><div class="pmeta">ATK ${mgr?mgr.attackingStyle:''} · DEF ${mgr?mgr.defensiveStyle:''}</div><div class="stat" style=${{fontWeight:700}}>${mgr?mgr.overall:''}</div></div>
        <div class="smallcap" style=${{marginTop:'10px'}}>Starting XI — tap a player</div>
        ${players.map(({slot,c})=>html`<div class="xline" key=${slot} onClick=${()=>viewPlayer(c)}>
          <div class="smallcap">${SLOT_POS[slot]}</div><div class="pname">${c.name}</div>
          <div class="pmeta">${c.club} ${c.season}</div><div class="stat" style=${{fontWeight:700,color:'var(--gold)'}}>${c.overall}</div></div>`)}

function StatBox({title,rows}){return html`<div class="panel" style=${{padding:'18px'}}>
  <div class="smallcap" style=${{marginBottom:'10px'}}>${title}</div>
  ${rows.length?rows.map((r,i)=>html`<div class="teamline" key=${i}><span><span class="pos">${i+1}</span>${r.name}<span class="pmeta" style=${{marginLeft:'8px'}}>${r.sub||''}</span></span><span class="p">${r.v}</span></div>`):html`<div class="empty">No data</div>`}
</div>`;}

function Results({state,viewPlayer}){
  const cards=useMemo(()=>cardMapOf(state.catalogue),[state.catalogue]);
  const sc=state.scores;const nameOf=new Map(state.teams.map(t=>[t.id,t]));
  const [sel,setSel]=useState(null);const [statSort,setStatSort]=useState('g');
  const win=sc.winner,winColor=win===1?'var(--p1)':win===2?'var(--p2)':'var(--chalk)',winName=win===1?state.p1Name:win===2?state.p2Name:'Draw';
  const stats=useMemo(()=>{
    const goals={},assists={},cs={};
    state.results.forEach(m=>{m.events.forEach(e=>{const c=cards.get(e.pid)||{name:e.name,club:''};
      if(e.type==='GOAL'){goals[e.pid]=goals[e.pid]||{name:e.name,sub:c.club,g:0};goals[e.pid].g++;}
      else{assists[e.pid]=assists[e.pid]||{name:e.name,sub:c.club,a:0};assists[e.pid].a++;}});
      const home=nameOf.get(m.homeTeamId),away=nameOf.get(m.awayTeamId);
      if(m.awayGoals===0&&home&&home.slots.GK){const gk=cards.get(home.slots.GK);cs[home.slots.GK]=cs[home.slots.GK]||{name:gk.name,sub:home.name,c:0};cs[home.slots.GK].c++;}
      if(m.homeGoals===0&&away&&away.slots.GK){const gk=cards.get(away.slots.GK);cs[away.slots.GK]=cs[away.slots.GK]||{name:gk.name,sub:away.name,c:0};cs[away.slots.GK].c++;}});
    return{scorers:Object.values(goals).sort((a,b)=>b.g-a.g).slice(0,8).map(x=>({name:x.name,sub:x.sub,v:x.g})),
      assisters:Object.values(assists).sort((a,b)=>b.a-a.a).slice(0,8).map(x=>({name:x.name,sub:x.sub,v:x.a})),
      keepers:Object.values(cs).sort((a,b)=>b.c-a.c).slice(0,8).map(x=>({name:x.name,sub:x.sub,v:x.c}))};
  },[state.results]);
  const playerStats=useMemo(()=>{
    const goals={},assists={},cs={};
    state.results.forEach(m=>{m.events.forEach(e=>{if(e.type==='GOAL')goals[e.pid]=(goals[e.pid]||0)+1;else assists[e.pid]=(assists[e.pid]||0)+1;});
      const home=nameOf.get(m.homeTeamId),away=nameOf.get(m.awayTeamId);
      if(m.awayGoals===0&&home&&home.slots.GK)cs[home.slots.GK]=(cs[home.slots.GK]||0)+1;
      if(m.homeGoals===0&&away&&away.slots.GK)cs[away.slots.GK]=(cs[away.slots.GK]||0)+1;});
    const rows=[];state.teams.forEach(t=>{SLOT_ORDER.forEach(s=>{if(s==='MANAGER')return;const id=t.slots[s];if(!id)return;const c=cards.get(id);if(!c)return;
      rows.push({card:c,team:t.name,owner:t.owner,pos:c.primary,ovr:c.overall,g:goals[id]||0,a:assists[id]||0,cs:cs[id]||0});});});
    return rows;
  },[state.results]);
  const sortedStats=[...playerStats].sort((a,b)=>statSort==='g'?b.g-a.g:statSort==='a'?b.a-a.a:statSort==='cs'?b.cs-a.cs:b.ovr-a.ovr).slice(0,90);
  return html`<div class="wrap">
    ${sel&&html`<${TeamView} team=${state.teams.find(t=>t.id===sel)} cards=${cards} state=${state} viewPlayer=${viewPlayer} onClose=${()=>setSel(null)} />`}
    <div class="winnerbanner" style=${{boxShadow:`inset 0 -4px 0 ${winColor}`,marginTop:'22px'}}>
      <div class="eyebrow">Final result</div>
      <div style=${{fontFamily:'var(--display)',fontSize:'40px',color:winColor,textTransform:'uppercase',letterSpacing:'.03em',marginTop:'6px'}}>${win===0?'Dead heat':`${winName} wins`}</div></div>
    <div class="vs">
      <div style=${{textAlign:'right'}}><div class="smallcap">${state.p1Name}</div><div class="bigscore" style=${{color:'var(--p1)'}}>${sc.p1.total}</div></div>
      <div class="smallcap">total points</div>
      <div><div class="smallcap">${state.p2Name}</div><div class="bigscore" style=${{color:'var(--p2)'}}>${sc.p2.total}</div></div></div>
    <div class="grid2">
      ${[[1,sc.p1,state.p1Name,'var(--p1)'],[2,sc.p2,state.p2Name,'var(--p2)']].map(([slot,ps,nm,col])=>html`
        <div class="panel" key=${slot} style=${{padding:'18px'}}>
          <div class="spread"><div style=${{fontWeight:700,color:col}}>${nm}'s teams</div><div class="stat" style=${{fontWeight:700}}>${ps.total} pts</div></div>
          <div style=${{marginTop:'8px'}}>${ps.teams.map(t=>html`<div class="teamline click" key=${t.id} onClick=${()=>setSel(t.id)}><span><span class="pos">${t.position}</span>${t.name}</span><span class="p">${t.pts}</span></div>`)}</div>
        </div>`)}
    </div>
    <div class="grid3" style=${{marginTop:'16px'}}>
      <${StatBox} title="Golden boot — goals" rows=${stats.scorers} />
      <${StatBox} title="Playmaker — assists" rows=${stats.assisters} />
      <${StatBox} title="Golden glove — clean sheets" rows=${stats.keepers} />
    </div>
    <div class="panel" style=${{padding:'18px',marginTop:'16px'}}>
      <div class="spread"><div class="smallcap">Player stats — full season · tap a player</div>
        <div class="seg">${[['g','Goals'],['a','Assists'],['cs','Clean sheets'],['ovr','Rating']].map(([k,lab])=>html`<button key=${k} class=${statSort===k?'on':''} onClick=${()=>setStatSort(k)}>${lab}</button>`)}</div></div>
      <div style=${{maxHeight:'520px',overflow:'auto',marginTop:'10px'}}>
        <table class="league"><thead><tr><th class="l">Player</th><th class="l">Team</th><th>Pos</th><th>OVR</th><th>G</th><th>A</th><th>CS</th></tr></thead>
        <tbody>${sortedStats.map((r,i)=>html`<tr key=${i} class=${'click '+(r.owner===1?'r1':'r2')} onClick=${()=>viewPlayer(r.card)}>
          <td class="l team">${r.card.name}</td><td class="l">${r.team}</td><td>${r.pos}</td><td>${r.ovr}</td>
          <td style=${{fontWeight:r.g?700:400,color:r.g?'var(--gold)':'inherit'}}>${r.g}</td><td>${r.a}</td><td>${r.cs}</td></tr>`)}</tbody></table>
      </div></div>
    <div class="panel" style=${{padding:'18px',marginTop:'16px'}}>
      <div class="smallcap" style=${{marginBottom:'10px'}}>Final league table · tap a team for its lineup</div>
      <div style=${{maxHeight:'560px',overflow:'auto'}}><${LeagueTable} rows=${state.table} nameOf=${nameOf} onTeam=${setSel} /></div></div>
    <div style=${{marginTop:'20px',textAlign:'center'}}><button class="btn" onClick=${()=>{ if(confirm('Start a new game? Your database is kept.')) location.reload(); }}>New game</button></div>
  </div>`;
}

/* ---------- DATA EDITOR ---------- */
function Chips({all,value,onChange}){
  return html`<div class="chips">${all.map(opt=>{const on=value.includes(opt);
    return html`<button type="button" key=${opt} class=${'chiptoggle'+(on?' on':'')} onClick=${()=>onChange(on?value.filter(v=>v!==opt):[...value,opt])}>${opt}</button>`;})}</div>`;
}
function emptyPlayer(){return {name:'',primary:'ST',secondaries:[],nationality:'',age:26,overall:75,pace:75,shooting:75,passing:75,creativity:75,defending:60,physical:72,goalkeeping:18,consistency:74,bigMatch:74,leadership:65,injuryResistance:72,potential:78,traits:[]};}
function emptyManager(){return {name:'',overall:75,attackingStyle:70,defensiveStyle:70,possession:70,counterAttack:60,playerDevelopment:65,discipline:65,adaptability:65,bigMatch:72};}

function PlayerForm({initial,onSave,onCancel}){
  const [p,setP]=useState(initial);
  const set=(k,v)=>setP(o=>({...o,[k]:v}));
  const setNum=(k,v)=>set(k,Math.max(0,Math.min(99,+v||0)));
  return html`<div class="panel" style=${{padding:'16px',marginTop:'12px',border:'1px solid var(--gold)'}}>
    <div class="grid2">
      <div><label class="lbl">Name</label><input class="fld" value=${p.name} onInput=${e=>set('name',e.target.value)} /></div>
      <div><label class="lbl">Nationality</label><input class="fld" value=${p.nationality} onInput=${e=>set('nationality',e.target.value)} /></div>
    </div>
    <div class="grid2" style=${{marginTop:'10px'}}>
      <div><label class="lbl">Primary position</label><select class="fld" value=${p.primary} onChange=${e=>set('primary',e.target.value)}>${POSITIONS.map(x=>html`<option key=${x} value=${x}>${x}</option>`)}</select></div>
      <div><label class="lbl">Age</label><input class="fld" type="number" value=${p.age} onInput=${e=>set('age',+e.target.value||0)} /></div>
    </div>

    <div style=${{marginTop:'12px'}}><label class="lbl">Attributes (0–99)</label>
      <div class="attgrid">${[['overall','Overall'],['pace','Pace'],['shooting','Shooting'],['passing','Passing'],['creativity','Creativity'],['defending','Defending'],['physical','Physical'],['goalkeeping','Goalkeeping'],['consistency','Consistency'],['bigMatch','Big match'],['leadership','Leadership'],['injuryResistance','Injury resist'],['potential','Potential']].map(([k,lab])=>
        html`<div class="att" key=${k}><label>${lab}</label><input type="number" value=${p[k]} onInput=${e=>setNum(k,e.target.value)} /></div>`)}</div></div>
    <div style=${{marginTop:'12px'}}><label class="lbl">Traits</label><${Chips} all=${TRAITS} value=${p.traits} onChange=${v=>set('traits',v)} /></div>
    <div class="spread" style=${{marginTop:'14px'}}><button class="btn ghost sm" onClick=${onCancel}>Cancel</button>
      <button class="btn p1 sm" onClick=${()=>{if(!p.name.trim()){alert('Player needs a name');return;}onSave(p);}}>Save player</button></div>
  </div>`;
}

function ClubEditor({cv,catalogue,dispatch,onBack}){
  const [club,setClub]=useState(cv?cv.club:'');const [season,setSeason]=useState(cv?cv.season:'');
  const [mgr,setMgr]=useState(cv&&cv.manager?{...cv.manager}:emptyManager());
  const [adding,setAdding]=useState(false);const [editId,setEditId]=useState(null);
  const isNew=!cv;
  const players=cv?listClubVersions(catalogue).find(x=>x.club===cv.club&&x.season===cv.season)?.players||[]:[];
  const setM=(k,v)=>setMgr(o=>({...o,[k]:k==='name'?v:Math.max(0,Math.min(99,+v||0))}));
  function saveHeader(){
    if(!club.trim()||!season.trim()){alert('Club and season are required');return;}
    if(!mgr.name.trim()){alert('Every club-version needs a manager (name + ratings)');return;}
    let cat=catalogue;
    if(cv&&(cv.club!==club.trim()||cv.season!==season.trim())) cat=renameClubVersion(cat,cv.club,cv.season,club.trim(),season.trim());
    cat=upsertManager(cat,club.trim(),season.trim(),mgr);
    dispatch({type:'SET_CATALOGUE',cat});
    if(isNew){alert('Club-version created. Now add players below.');}
  }
  function savePlayer(p){
    if(!club.trim()||!season.trim()){alert('Set club and season first, then Save header');return;}
    let cat=catalogue;
    if(editId)cat=updatePlayer(cat,editId,{...p,club:club.trim(),season:season.trim()});
    else cat=addPlayer(cat,{...p,id:newId('ed'),club:club.trim(),season:season.trim()});
    dispatch({type:'SET_CATALOGUE',cat});setAdding(false);setEditId(null);
  }
  function delPlayer(id){if(confirm('Delete this player?'))dispatch({type:'SET_CATALOGUE',cat:deletePlayer(catalogue,id)});}
  const byLine={GK:0,DEF:0,MID:0,FWD:0};players.forEach(p=>byLine[p.line]++);
  return html`<div class="wrap"><div class="panel" style=${{padding:'24px',marginTop:'22px',maxWidth:'900px',margin:'22px auto 0'}}>
    <div class="spread"><div><div class="eyebrow">${isNew?'New club-version':'Edit club-version'}</div><h2 class="head">${club||'Club'} ${season||''}</h2></div>
      <button class="btn ghost sm" onClick=${onBack}>← All clubs</button></div>
    <div class="grid2" style=${{marginTop:'16px'}}>
      <div><label class="lbl">Club name</label><input class="fld" value=${club} placeholder="e.g. Celta Vigo" onInput=${e=>setClub(e.target.value)} /></div>
      <div><label class="lbl">Season</label><input class="fld" value=${season} placeholder="e.g. 1999/00" onInput=${e=>setSeason(e.target.value)} /></div>
    </div>
    <div class="panel" style=${{padding:'16px',marginTop:'14px'}}>
      <div class="smallcap" style=${{marginBottom:'8px'}}>Manager (required) — appears and is draftable when this club spins</div>
      <div class="grid2"><div><label class="lbl">Manager name</label><input class="fld" value=${mgr.name} placeholder="e.g. José Mourinho" onInput=${e=>setM('name',e.target.value)} /></div>
        <div><label class="lbl">Overall</label><input class="fld" type="number" value=${mgr.overall} onInput=${e=>setM('overall',e.target.value)} /></div></div>
      <div class="attgrid" style=${{marginTop:'10px'}}>${[['attackingStyle','Attacking'],['defensiveStyle','Defensive'],['possession','Possession'],['counterAttack','Counter'],['playerDevelopment','Development'],['discipline','Discipline'],['adaptability','Adaptability'],['bigMatch','Big match']].map(([k,lab])=>
        html`<div class="att" key=${k}><label>${lab}</label><input type="number" value=${mgr[k]} onInput=${e=>setM(k,e.target.value)} /></div>`)}</div>
    </div>
    <div style=${{marginTop:'14px'}}><button class="btn p1 sm" onClick=${saveHeader}>${isNew?'Create club-version':'Save club & manager'}</button></div>

    ${!isNew&&html`<div style=${{marginTop:'18px'}}>
      <div class="spread"><div class="smallcap">Players — ${players.length} (GK ${byLine.GK} · DEF ${byLine.DEF} · MID ${byLine.MID} · FWD ${byLine.FWD})</div>
        <button class="btn sm" onClick=${()=>{setEditId(null);setAdding(true);}}>+ Add player</button></div>
      ${(adding||editId)&&html`<${PlayerForm} initial=${editId?players.find(p=>p.id===editId):emptyPlayer()} onCancel=${()=>{setAdding(false);setEditId(null);}} onSave=${savePlayer} />`}
      <div style=${{marginTop:'10px'}}>${players.map(p=>html`<div class="cvrow" key=${p.id}>
        <div><span class="nm">${p.name}</span> <span class="meta">${p.primary}${(p.secondaries&&p.secondaries.length)?'/'+p.secondaries.join('/'):''}</span></div>
        <div class="stat" style=${{fontWeight:700,color:'var(--gold)'}}>${p.overall}</div>
        <button class="btn ghost sm" onClick=${()=>{setAdding(false);setEditId(p.id);}}>Edit</button>
        <button class="btn danger sm" onClick=${()=>delPlayer(p.id)}>Delete</button>
      </div>`)}</div>
    </div>`}
  </div></div>`;
}

function Editor({state,dispatch}){
  const cat=state.catalogue;const [editing,setEditing]=useState(null);const [creating,setCreating]=useState(false);
  const [q,setQ]=useState('');const [msg,setMsg]=useState('');
  const cvs=useMemo(()=>listClubVersions(cat),[cat]);
  const filtered=cvs.filter(c=>!q||(c.club+' '+c.season).toLowerCase().includes(q.toLowerCase()));
  if(creating)return html`<${ClubEditor} cv=${null} catalogue=${cat} dispatch=${dispatch} onBack=${()=>setCreating(false)} />`;
  if(editing)return html`<${ClubEditor} cv=${editing} catalogue=${cat} dispatch=${dispatch} onBack=${()=>setEditing(null)} />`;
  function readFile(e,kind){const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{try{if(kind==='players'){const players=importPlayersCSV(rd.result);dispatch({type:'SET_CATALOGUE',cat:{...cat,players}});setMsg(`Imported ${players.length} players`);}
      else{const managers=importManagersCSV(rd.result);dispatch({type:'SET_CATALOGUE',cat:{...cat,managers}});setMsg(`Imported ${managers.length} managers`);}}catch(err){setMsg('Import failed: '+err.message);}};
    rd.readAsText(f);e.target.value='';}
  function delCV(c){if(confirm(`Delete ${c.club} ${c.season} and all its players?`))dispatch({type:'SET_CATALOGUE',cat:deleteClubVersion(cat,c.club,c.season)});}
  const counts={GK:0,DEF:0,MID:0,FWD:0};cat.players.forEach(p=>counts[p.line]++);
  return html`<div class="wrap"><div class="panel" style=${{padding:'24px',marginTop:'22px',maxWidth:'960px',margin:'22px auto 0'}}>
    <div class="spread"><div><div class="eyebrow">Your database</div><h2 class="head">Clubs, players &amp; managers</h2></div>
      <button class="btn ghost sm" onClick=${()=>dispatch({type:'GO',screen:'setup'})}>← Back to game</button></div>
    <p class="muted" style=${{marginTop:'8px',lineHeight:1.5}}>Add any club-version you like — e.g. <em>Celta Vigo 1999/00</em> or <em>Manchester City 2012/13</em> — with your own players, ratings, multiple positions and a manager. Or bulk-edit in Excel via CSV. Everything is saved in this browser; export <code>data.json</code> to make it permanent in your repo.</p>
    <div class="smallcap" style=${{marginTop:'10px'}}>${cat.players.length} players · ${cat.managers.length} managers · ${cvs.length} club-versions · GK ${counts.GK} / DEF ${counts.DEF} / MID ${counts.MID} / FWD ${counts.FWD}</div>
    <div class="pillbar" style=${{marginTop:'14px'}}>
      <button class="btn p1 sm" onClick=${()=>setCreating(true)}>+ New club-version</button>
      <label class="btn ghost sm" style=${{display:'inline-block'}}>Import players CSV<input type="file" accept=".csv" style=${{display:'none'}} onChange=${e=>readFile(e,'players')}/></label>
      <label class="btn ghost sm" style=${{display:'inline-block'}}>Import managers CSV<input type="file" accept=".csv" style=${{display:'none'}} onChange=${e=>readFile(e,'managers')}/></label>
      <button class="btn ghost sm" onClick=${()=>download('players.csv',exportPlayersCSV(cat))}>Export players CSV</button>
      <button class="btn ghost sm" onClick=${()=>download('managers.csv',exportManagersCSV(cat))}>Export managers CSV</button>
      <button class="btn sm" onClick=${()=>download('data.json',JSON.stringify({players:cat.players,managers:cat.managers}),'application/json')}>Export data.json</button>
      <button class="btn ghost sm" onClick=${()=>{if(confirm('Reset to the built-in dataset? Your edits will be lost.'))dispatch({type:'SET_CATALOGUE',cat:DEFAULT_DATA||generateCatalogue()});}}>Reset to default</button>
    </div>
    ${msg&&html`<div class="smallcap" style=${{marginTop:'12px',color:'var(--gold)'}}>${msg}</div>`}
    <input class="fld" style=${{marginTop:'16px'}} placeholder="Search club-versions…" value=${q} onInput=${e=>setQ(e.target.value)} />
    <div style=${{marginTop:'8px',maxHeight:'520px',overflow:'auto'}}>
      ${filtered.map(c=>{const bl={GK:0,DEF:0,MID:0,FWD:0};c.players.forEach(p=>bl[p.line]++);
        return html`<div class="cvrow" key=${c.club+c.season}>
        <div><span class="nm">${c.club}</span> <span class="meta">${c.season} · ${c.players.length} players · mgr ${c.manager?c.manager.name:html`<span style=${{color:'var(--neg)'}}>none</span>`}</span>
          <div class="pmeta">GK ${bl.GK} · DEF ${bl.DEF} · MID ${bl.MID} · FWD ${bl.FWD}</div></div>
        <div></div>
        <button class="btn ghost sm" onClick=${()=>setEditing(c)}>Edit</button>
        <button class="btn danger sm" onClick=${()=>delCV(c)}>Delete</button>
      </div>`;})}
      ${filtered.length===0&&html`<div class="empty">No club-versions. Add one to get started.</div>`}
    </div>
  </div></div>`;
}

function App(){
  const [state,dispatch]=useReducer(reducer,undefined,initState);
  const [profile,setProfile]=useState(null);
  useEffect(()=>{saveState(state);},[state]);
  useEffect(()=>{ if(state.teams.length>0)return;
    fetch('./data.json').then(r=>r.ok?r.json():null).then(d=>{if(d&&Array.isArray(d.players)&&d.players.length)dispatch({type:'SET_CATALOGUE',cat:{players:d.players,managers:d.managers||[]}});}).catch(()=>{});
  },[]);
  useEffect(()=>{if(state.error){const t=setTimeout(()=>dispatch({type:'CLR_ERR'}),2600);return()=>clearTimeout(t);}},[state.error]);
  let body;
  switch(state.screen){
    case 'setup':body=html`<${Setup} state=${state} dispatch=${dispatch}/>`;break;
    case 'editor':body=html`<${Editor} state=${state} dispatch=${dispatch}/>`;break;
    case 'naming':body=html`<${Naming} state=${state} dispatch=${dispatch}/>`;break;
    case 'draft':body=html`<${Draft} state=${state} dispatch=${dispatch} viewPlayer=${setProfile}/>`;break;
    case 'sim':body=html`<${Simulating} state=${state} dispatch=${dispatch}/>`;break;
    case 'results':body=html`<${Results} state=${state} viewPlayer=${setProfile}/>`;break;
    default:body=html`<div/>`;
  }
  return html`<div><${TopBar} state=${state}/>${state.screen==='setup'?html`<div class="wrap">${body}</div>`:body}
    ${profile&&html`<${PlayerProfile} card=${profile} onClose=${()=>setProfile(null)} />`}
    ${state.error&&html`<div class="toast">${state.error}</div>`}</div>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>

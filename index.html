<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draft Zone League</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --pitch-0:#08251C;--pitch-1:#0E3728;--pitch-2:#15543F;--pitch-3:#1C6B4F;
    --chalk:#EAF3EE;--chalk-dim:#93AEA2;--line:rgba(234,243,238,.16);--line-strong:rgba(234,243,238,.34);
    --p1:#FFB23E;--p2:#39B7F0;--pos:#5BE08A;--neg:#FF7A7A;--gold:#F4C95D;
    --display:'Anton',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 50% -10%,#14503B 0%,var(--pitch-0) 60%),var(--pitch-0);color:var(--chalk);font-family:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--body);cursor:pointer;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--pitch-2);border-radius:8px;}::-webkit-scrollbar-track{background:transparent;}
  .wrap{max-width:1320px;margin:0 auto;padding:0 20px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(8,37,28,.96),rgba(8,37,28,.78));backdrop-filter:blur(6px);border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:14px;}
  .crest{width:38px;height:38px;border-radius:9px;background:repeating-linear-gradient(90deg,var(--p1) 0 6px,#0E3728 6px 12px);border:2px solid var(--chalk);}
  .brand h1{font-family:var(--display);font-size:22px;letter-spacing:.06em;margin:0;line-height:1;text-transform:uppercase;}
  .brand .sub{font-size:11px;color:var(--chalk-dim);letter-spacing:.18em;text-transform:uppercase;}
  .toolbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .panel{background:linear-gradient(180deg,var(--pitch-1),#0B2C21);border:1px solid var(--line);border-radius:16px;}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  h2.head{font-family:var(--display);text-transform:uppercase;letter-spacing:.04em;font-size:30px;margin:6px 0 0;}
  .btn{border:none;border-radius:11px;padding:13px 22px;font-weight:700;font-size:15px;letter-spacing:.02em;background:var(--chalk);color:#0A2A20;transition:transform .06s,filter .15s;}
  .btn:hover{filter:brightness(1.06);}.btn:active{transform:translateY(1px);}.btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.sm{padding:8px 14px;font-size:13px;}
  .btn.tiny{padding:5px 9px;font-size:12px;border-radius:8px;}
  .btn.ghost{background:transparent;color:var(--chalk);border:1px solid var(--line-strong);}
  .btn.p1{background:var(--p1);color:#2A1700;}.btn.p2{background:var(--p2);color:#04263A;}
  .btn.gold{background:var(--gold);color:#2A1C00;}
  .btn.danger{background:transparent;color:var(--neg);border:1px solid rgba(255,122,122,.5);}
  input.fld,select.fld,textarea.fld{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:11px;padding:12px 13px;font-size:15px;font-family:var(--body);}
  input.fld:focus,select.fld:focus,textarea.fld:focus{outline:none;border-color:var(--gold);}
  textarea.fld{font-family:var(--mono);font-size:12.5px;line-height:1.5;resize:vertical;}
  select.fld option{background:#0B2C21;}
  label.lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:7px;}
  .muted{color:var(--chalk-dim);}
  .center{min-height:72vh;display:flex;align-items:center;justify-content:center;}
  .card{width:100%;max-width:600px;padding:34px;}
  .kit-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
  .kit-pill.p1{background:rgba(255,178,62,.14);color:var(--p1);border:1px solid rgba(255,178,62,.4);}
  .kit-pill.p2{background:rgba(57,183,240,.14);color:var(--p2);border:1px solid rgba(57,183,240,.4);}
  .draftgrid{display:grid;grid-template-columns:minmax(0,1fr) 384px;gap:20px;align-items:start;margin-top:18px;}
  @media(max-width:980px){.draftgrid{grid-template-columns:1fr;}}
  .clock{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px;border-radius:14px;margin-bottom:16px;border:1px solid var(--line-strong);}
  .clock.p1{background:linear-gradient(90deg,rgba(255,178,62,.18),rgba(255,178,62,.03));box-shadow:inset 4px 0 0 var(--p1);}
  .clock.p2{background:linear-gradient(90deg,rgba(57,183,240,.18),rgba(57,183,240,.03));box-shadow:inset 4px 0 0 var(--p2);}
  .clock .who{font-family:var(--display);font-size:24px;letter-spacing:.03em;text-transform:uppercase;}
  .clock .meta{font-size:12px;color:var(--chalk-dim);letter-spacing:.08em;text-transform:uppercase;}
  .clubpool{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .poolhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,0,0,.2);}
  .poolhdr b{font-size:15px;}.poolhdr .ss{font-family:var(--mono);color:var(--gold);}
  .prow{display:grid;grid-template-columns:42px 1fr auto auto;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
  .prow:hover{background:rgba(255,255,255,.05);}.prow:last-child{border-bottom:none;}
  .pname{font-weight:600;font-size:15px;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.pmeta{font-size:11.5px;color:var(--chalk-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .empty{padding:24px;text-align:center;color:var(--chalk-dim);}
  .pitch{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:3/4;background:repeating-linear-gradient(0deg,#16573F 0 12.5%,#13503A 12.5% 25%);border:1px solid var(--line);}
  .pitch .mk{position:absolute;border:2px solid var(--line-strong);}
  .pitch .halfway{left:8%;right:8%;top:50%;height:0;border-top:2px solid var(--line-strong);}
  .pitch .circle{left:50%;top:50%;width:26%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;}
  .pitch .boxTop{left:26%;right:26%;top:0;height:15%;}.pitch .boxBot{left:26%;right:26%;bottom:0;height:15%;}
  .slot{position:absolute;transform:translate(-50%,-50%);width:74px;text-align:center;cursor:pointer;}
  .slot:hover .shirt{filter:brightness(1.12);}
  .shirt{width:48px;height:48px;margin:0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:15px;color:#06231A;border:2px solid rgba(255,255,255,.55);position:relative;}
  .shirt.empty{background:transparent;border:2px dashed var(--line-strong);color:var(--chalk-dim);font-family:var(--body);font-size:11px;font-weight:700;}
  .shirt.p1{background:linear-gradient(160deg,#FFC862,#F39B17);}.shirt.p2{background:linear-gradient(160deg,#6FD0FF,#1E9FE0);color:#04263A;}
  .slot .nm{font-size:11px;margin-top:4px;line-height:1.1;color:var(--chalk);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;font-weight:600;}
  .slot .cl{font-size:9px;color:var(--chalk-dim);display:block;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poslab{position:absolute;top:-6px;left:-6px;background:#06231A;border:1px solid var(--line-strong);color:var(--gold);font-family:var(--mono);font-size:9px;font-weight:700;border-radius:5px;padding:1px 4px;}
  .mgrslot{display:flex;align-items:center;gap:12px;margin-top:12px;padding:11px 14px;border-radius:12px;border:1px dashed var(--line-strong);cursor:pointer;}
  .mgrslot.filled{border-style:solid;}.mgrslot:hover{background:rgba(255,255,255,.04);}
  table.league{width:100%;border-collapse:collapse;font-size:14px;}
  table.league th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);text-align:right;padding:10px 8px;border-bottom:1px solid var(--line-strong);font-weight:700;}
  table.league th.l,table.league td.l{text-align:left;}
  table.league td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono);}
  table.league td.team{font-family:var(--body);font-weight:600;cursor:pointer;}
  table.league td.team:hover{color:var(--gold);}
  table.league tr.click{cursor:pointer;}table.league tr.click:hover td{background:rgba(255,255,255,.04);}
  .pos{display:inline-block;width:22px;color:var(--chalk-dim);}
  .ownerbar{display:inline-block;width:4px;height:16px;border-radius:2px;margin-right:9px;vertical-align:-3px;}
  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin:8px 0 24px;}
  .bigscore{font-family:var(--display);font-size:84px;line-height:.9;}
  .winnerbanner{text-align:center;padding:22px;border-radius:16px;margin-bottom:22px;border:1px solid var(--line-strong);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}.bigscore{font-size:60px;}}
  .teamline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .teamline .p{font-family:var(--mono);font-weight:700;}.teamline.click{cursor:pointer;}.teamline.click:hover{color:var(--gold);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#3a1414;border:1px solid #FF7A7A;color:#ffd9d9;padding:12px 18px;border-radius:11px;font-size:14px;z-index:90;max-width:90vw;text-align:center;}
  .toast.ok{background:#123a23;border-color:var(--pos);color:#d6ffe6;}
  .row{display:flex;gap:12px;align-items:center;}.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .smallcap{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .seg{display:flex;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
  .seg button{background:transparent;border:none;color:var(--chalk-dim);padding:9px 13px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
  .seg button.on{background:var(--pitch-2);color:var(--chalk);}
  .modal{position:fixed;inset:0;background:rgba(3,16,12,.74);z-index:70;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modalbox{max-width:860px;width:100%;max-height:92vh;overflow:auto;padding:22px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chiptoggle{font-size:12px;font-weight:600;border:1px solid var(--line-strong);background:transparent;color:var(--chalk-dim);border-radius:999px;padding:6px 11px;}
  .chiptoggle.on{background:var(--gold);color:#2A1C00;border-color:var(--gold);}
  .attgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  @media(max-width:620px){.attgrid{grid-template-columns:repeat(2,1fr);}}
  .att label{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:3px;}
  .att input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:9px;padding:8px;font-family:var(--mono);font-size:14px;}
  code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px;}

  /* rating badge */
  .rbadge{display:inline-flex;align-items:center;justify-content:center;border-radius:9px;font-family:var(--mono);font-weight:700;line-height:1;padding:0 6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);}

  /* budget pot chips + allocator */
  .potchip{display:flex;flex-direction:column;align-items:flex-end;min-width:104px;padding:7px 13px;border-radius:11px;border:1px solid var(--line);background:rgba(0,0,0,.2);}
  .potchip .cap{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--chalk-dim);white-space:nowrap;}
  .potchip .v{font-family:var(--display);font-size:20px;line-height:1.05;margin-top:2px;}
  .potchip.p1{box-shadow:inset 0 -3px 0 var(--p1);}.potchip.p1 .v{color:var(--p1);}
  .potchip.p2{box-shadow:inset 0 -3px 0 var(--p2);}.potchip.p2 .v{color:var(--p2);}
  .alloc input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:6px;background:rgba(255,255,255,.14);outline:none;margin:6px 0;}
  .alloc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);border:3px solid #0B2C21;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.45);}
  .alloc input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--gold);border:3px solid #0B2C21;cursor:pointer;}
  .moneybar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:12px;padding:11px 15px;border-radius:12px;border:1px solid var(--line-strong);background:rgba(0,0,0,.24);}
  .moneybar .v{font-family:var(--mono);font-weight:700;}

  /* market */
  .ctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .ctrls .s{flex:1 1 160px;min-width:140px;background:rgba(0,0,0,.3);border:1px solid var(--line-strong);color:var(--chalk);border-radius:10px;padding:10px 13px;font-size:14px;font-family:var(--body);}
  .ctrls .s::placeholder{color:var(--chalk-dim);}
  .ctrls .s:focus{outline:none;border-color:var(--gold);}
  .mlist{display:flex;flex-direction:column;gap:8px;max-height:58vh;overflow:auto;padding:2px 4px 2px 2px;}
  .mrow{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;gap:13px;align-items:center;padding:11px 13px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.025);cursor:pointer;transition:transform .07s,background .12s,border-color .12s;}
  .mrow:hover{background:rgba(255,255,255,.07);border-color:var(--line-strong);transform:translateX(2px);}
  .mrow.no{opacity:.45;cursor:not-allowed;}
  .mrow.no:hover{transform:none;background:rgba(255,255,255,.025);border-color:var(--line);}
  .mval{font-family:var(--mono);font-weight:700;font-size:15px;text-align:right;white-space:nowrap;}
  .chev{color:var(--chalk-dim);font-size:20px;line-height:1;width:14px;text-align:center;}
  .mrow:hover .chev{color:var(--gold);}

  /* profile */
  .prof-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-bottom:16px;border-bottom:1px solid var(--line);}
  .prof-pos{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .poschip{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--chalk);background:rgba(255,255,255,.06);border:1px solid var(--line-strong);border-radius:7px;padding:4px 9px;}
  .poschip.first{background:var(--gold);color:#2a1c00;border-color:var(--gold);}
  .prof-r{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex-shrink:0;}
  .attwrap2{display:grid;grid-template-columns:repeat(auto-fit,minmax(236px,1fr));gap:0 30px;margin-top:6px;}
  .attgroup h5{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:16px 0 9px;font-weight:700;}
  .attbar{display:grid;grid-template-columns:108px 1fr 26px;gap:10px;align-items:center;margin:8px 0;font-size:12.5px;}
  .attbar .lab{color:var(--chalk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .attbar .track{height:7px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden;}
  .attbar .track i{display:block;height:100%;border-radius:5px;}
  .attbar .v{font-family:var(--mono);font-weight:700;text-align:right;}

  /* season + awards */
  .sstats{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 2px;}
  .sstat{flex:1 1 84px;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center;}
  .sstat .l{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .sstat .v{font-family:var(--mono);font-weight:700;font-size:18px;margin-top:3px;}
  .podium{display:grid;grid-template-columns:1fr 1.25fr 1fr;gap:12px;align-items:end;margin:6px 0 20px;}
  @media(max-width:620px){.podium{grid-template-columns:1fr;}}
  .pod{border:1px solid var(--line-strong);border-radius:14px;padding:16px 14px;text-align:center;background:linear-gradient(180deg,rgba(0,0,0,.18),transparent);}
  .pod.g1{border-color:var(--gold);background:linear-gradient(180deg,rgba(244,201,93,.18),transparent);}
  .pod .rank{font-family:var(--display);font-size:30px;line-height:1;color:var(--gold);}
  .pod .nm{font-weight:700;font-size:15px;margin:8px 0 2px;line-height:1.15;}
  .pod .sub{font-size:11px;color:var(--chalk-dim);}
  .pod .bp{font-family:var(--mono);font-weight:700;font-size:20px;margin-top:8px;color:var(--gold);}
  .award-row{display:grid;grid-template-columns:30px 40px 1fr auto;gap:11px;align-items:center;padding:9px 6px;border-bottom:1px solid var(--line);}
  .award-row:last-child{border-bottom:none;}
  .award-row .rk{font-family:var(--mono);color:var(--chalk-dim);text-align:center;font-size:13px;}
  .award-row .bp{font-family:var(--mono);font-weight:700;color:var(--gold);text-align:right;}
  .award-row .ln{font-size:11px;color:var(--chalk-dim);}
  .totspitch{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:3/4;max-width:440px;margin:0 auto;background:repeating-linear-gradient(0deg,#16573F 0 12.5%,#13503A 12.5% 25%);border:1px solid var(--line);}
  .totsslot{position:absolute;transform:translate(-50%,-50%);width:100px;text-align:center;}
  .totsslot .nm{font-size:11px;line-height:1.1;color:var(--chalk);font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .totsslot .sub{font-size:9px;color:var(--chalk-dim);}
  .anbar{display:grid;grid-template-columns:120px 1fr 64px;gap:10px;align-items:center;margin:9px 0;font-size:13px;}
  .anbar .lab{color:var(--chalk);}
  .anbar .track{height:13px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;display:flex;}
  .anbar .track i{display:block;height:100%;}
  .anbar .v{font-family:var(--mono);font-weight:700;text-align:right;}
  .sstable{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
  .sstable th{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);text-align:right;padding:7px 6px;border-bottom:1px solid var(--line-strong);}
  .sstable th.l,.sstable td.l{text-align:left;}
  .sstable td{padding:7px 6px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono);}
  .sstable td.nm{font-family:var(--body);font-weight:600;cursor:pointer;}
  .sstable td.nm:hover{color:var(--gold);}
  .sstable tr.click{cursor:pointer;}.sstable tr.click:hover td{background:rgba(255,255,255,.04);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.js"></script>
<script>
/* ============================================================================
   Draft Zone League — budget draft + Football-Manager-style season sim.
   Two managers, 10 teams each (20 in one league). Teams are built in an ABBA
   snake order. For each team you pick a formation, allocate part of your pot,
   then sign 11 players + a head coach from everyone eligible (priced by value);
   the cost is deducted from your pot the moment you confirm the team. Full FM
   player + manager attributes drive a deep, phase-by-phase match engine, then a
   Ballon d'Or-style vote, a Golden Glove and a Team of the Season. One file.
   ========================================================================== */

function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function mix(a,b,t){const pa=hx(a),pb=hx(b);const r=Math.round(pa[0]+(pb[0]-pa[0])*t),g=Math.round(pa[1]+(pb[1]-pa[1])*t),bl=Math.round(pa[2]+(pb[2]-pa[2])*t);return `rgb(${r},${g},${bl})`;}
function colorForRating(v){
  v=Math.max(1,Math.min(99,Math.round(v||0)));
  let bg,fg='#06231A';
  if(v>=96){const t=(v-96)/3;bg=mix('#7A3BB0','#4A1480',t);fg='#fff';}
  else if(v>=92){bg='#15803D';fg='#EAFBF2';}
  else if(v>=88){bg='#2E9E4F';fg='#EAFBF2';}
  else if(v>=84){bg='#54C273';}
  else if(v>=80){bg='#8FCB52';}
  else if(v>=76){bg='#D7D24A';fg='#2A2400';}
  else if(v>=71){bg='#E6A93C';fg='#2A1C00';}
  else if(v>=64){bg='#E27A3A';fg='#2A1300';}
  else{bg='#D44A4A';fg='#fff';}
  return {bg,fg};
}
function ratingStyle(v){const c=colorForRating(v);return {background:c.bg,color:c.fg};}

/* ---------- RNG + poisson + weighted pick ---------- */
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function hashSeed(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function makeRng(seed){const n=mulberry32(typeof seed==='string'?hashSeed(seed):seed);return{
  float:()=>n(),int:(lo,hi)=>Math.floor(n()*(hi-lo+1))+lo,
  poisson:(l)=>{if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=n();}while(p>L);return k-1;},
  weighted:(w)=>{const t=w.reduce((a,b)=>a+b,0);if(t<=0)return 0;let r=n()*t;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}return w.length-1;}};}

/* ============================================================================
   DEEP MATCH ENGINE — phase-by-phase, quality-sensitive (calibrated).
   ========================================================================== */
const W_DEF={tackling:4.5,marking:4.5,positioning:3,heading:0.7,anticipation:0.5,concentration:0.4};
const W_ATT={finishing:3.6,offTheBall:3,composure:2.4,anticipation:2,dribbling:1.6,technique:1.6,firstTouch:2,flair:1.5,longShots:1.4,heading:1.4,acceleration:1.6,pace:1.6,balance:1,agility:1.1};
const W_CRE={vision:3,passing:3,technique:2.6,decisions:2,flair:2,composure:1.6,offTheBall:1.6,crossing:1.5,firstTouch:2,dribbling:1.6,anticipation:1.4};
const W_CON={passing:3,vision:2,technique:2.4,composure:2,decisions:2,teamwork:2,workRate:2,stamina:1.6,firstTouch:2,anticipation:1.5,tackling:1.4,positioning:1.4};
const W_GK={reflexes:3,handling:3,oneOnOnes:2.6,commandOfArea:2.2,aerialReach:2,kicking:1.4,positioning:2,concentration:2,anticipation:1.8,communication:1.4,composure:1.6,agility:1.6,throwing:1};
const W_PRESS={workRate:3,stamina:2.4,aggression:2,anticipation:2.2,teamwork:2,acceleration:1.6,determination:1.4,pace:1.2,naturalFitness:1.2};
const W_TRANS={pace:3,acceleration:3,dribbling:1.8,offTheBall:1.8,anticipation:1.4,balance:1.2,technique:1.2};
const W_AERA={jumpingReach:3,heading:3,strength:2,bravery:1.4,anticipation:1.2};
const W_TEMPO={passing:2.4,vision:2,technique:2,firstTouch:2,decisions:1.6,composure:1.4,flair:1.2};
const W_SETT={corners:2.6,freeKick:2.6,crossing:2.4,technique:1.8,vision:1.4,passing:1.2};
const W_PHYS={strength:3,stamina:2,balance:1.6,naturalFitness:1.6,aggression:1.2,jumpingReach:1.2};

const BASE_OPEN=1.66, QEXP=2.25, HOME_ADV=1.11, SEC_PEN=0.93, PHASES=6;
const SET_BASE=0.40, COUNTER_BASE=0.28, CONV_OPEN=0.122, CONV_SET=0.103, CONV_CTR=0.150, BIGM=83;

const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const mx=a=>a.length?Math.max.apply(null,a):0;
const mn=a=>a.length?Math.min.apply(null,a):0;
function blend(arr,wMean,wMax){if(!arr.length)return 48;return avg(arr)*wMean+mx(arr)*wMax;}
function topN(arr,n){return arr.slice().sort((x,y)=>y-x).slice(0,n);}
function pScore(p,W){let s=0,t=0;for(const a in W){if(p[a]!=null){s+=p[a]*W[a];t+=W[a];}}return t?s/t:50;}
function chemistryOf(P){const m={};let best=0;P.forEach(p=>{const k=(p.club||'')+'|'+(p.season||'');m[k]=(m[k]||0)+1;if(m[k]>best)best=m[k];});return clamp((best-1)/9,0,1);}

function buildProfile(team){
  const P=team.players;
  const adj=(p,v)=>p.inPrimaryPosition?v:v*SEC_PEN;
  const gks=P.filter(p=>p.line==='GK'),defs=P.filter(p=>p.line==='DEF'),mids=P.filter(p=>p.line==='MID'),fwds=P.filter(p=>p.line==='FWD');
  const out=[...defs,...mids,...fwds];
  const counts=formationCounts(team.formation);
  const defScore=defs.map(p=>adj(p,pScore(p,W_DEF)));
  const backline=defScore.length?(avg(defScore)*0.78+mn(defScore)*0.22):44;
  const gk=gks.length?pScore(gks[0],W_GK):44;
  const midCon=blend(mids.map(p=>adj(p,pScore(p,W_CON))),0.72,0.28);
  const midDef=avg(mids.map(p=>adj(p,pScore(p,W_DEF))))||44;
  const midCre=blend(mids.map(p=>adj(p,pScore(p,W_CRE))),0.62,0.38);
  const fwdAtt=blend(fwds.map(p=>adj(p,pScore(p,W_ATT))),0.5,0.5);
  const fwdCre=blend(fwds.map(p=>adj(p,pScore(p,W_CRE))),0.55,0.45);
  const cf=(c,b)=>Math.sqrt(Math.max(1,c)/b);
  const dF=cf(defs.length,4),mF=cf(mids.length,3),fF=cf(fwds.length,3);
  const allAtt=out.map(p=>adj(p,pScore(p,W_ATT)));
  let attack=(fwdAtt*0.7 + blend(allAtt,0.4,0.6)*0.3)*(0.62+0.38*fF);
  let creativity=(midCre*0.5 + fwdCre*0.3 + blend(out.map(p=>adj(p,pScore(p,W_CRE))),0.45,0.55)*0.2)*(0.7+0.3*mF);
  let control=midCon*(0.55+0.45*mF) + (avg(out.map(p=>adj(p,pScore(p,W_TEMPO))))||50)*0.18;
  let defence=(backline*0.60 + gk*0.26 + midDef*0.14)*(0.84+0.16*dF)*1.075;
  let pressing=(avg(out.map(p=>adj(p,pScore(p,W_PRESS))))||50);
  let transition=blend(fwds.concat(mids).map(p=>adj(p,pScore(p,W_TRANS))),0.5,0.5);
  const wideMen=out.filter(p=>['LB','RB','LM','RM','LW','RW'].includes(p.slotPos));
  let width=wideMen.length?avg(wideMen.map(p=>adj(p,(p.crossing||50)))):avg(out.map(p=>p.crossing||50))*0.9;
  let aerialAtt=avg(topN(out.map(p=>pScore(p,W_AERA)),3));
  let aerialDef=(avg(defs.map(p=>pScore(p,W_AERA)))||50)*0.7 + (gks.length?(gks[0].commandOfArea||60):55)*0.3;
  let setTake=mx(out.map(p=>pScore(p,W_SETT)));
  let setAtt=setTake*0.45 + aerialAtt*0.4 + mx(out.map(p=>p.finishing||40))*0.15;
  let setDef=aerialDef*0.7 + (gks.length?(gks[0].commandOfArea||60):55)*0.3;
  let physical=avg(out.map(p=>pScore(p,W_PHYS)))||60;
  let stamina=avg(P.map(p=>0.6*(p.stamina||70)+0.4*(p.naturalFitness||70)));
  let discipline=avg(out.map(p=>0.5*(99-(p.aggression||55))+0.3*(p.composure||60)+0.2*(p.decisions||60)));
  let mentality=avg(P.map(p=>0.4*(p.composure||60)+0.25*(p.concentration||60)+0.2*(p.determination||60)+0.15*(p.leadership||55)));
  let penalty=mx(out.map(p=>p.penalties||60));
  let finishing=blend(fwds.concat(mids).map(p=>adj(p,(p.finishing||45)*0.6+(p.composure||55)*0.4)),0.5,0.5);
  const chem=chemistryOf(P);
  const m=team.manager||{attacking:55,defending:55,tactical:55,motivating:55,manManagement:55,peopleManagement:55,levelOfDiscipline:55,discipline:55,mental:55,determination:55,adaptability:55,fitness:60,technical:55};
  const formBias=(counts.FWD-counts.DEF)/5;
  const mgrLean=(m.attacking-m.defending)/100;
  const fit=1-Math.min(0.55,Math.abs(formBias*1.7-mgrLean));
  const fitBonus=1+(m.tactical/100)*(fit-0.72)*0.22;
  const cohesion=0.88 + ((m.manManagement+m.peopleManagement+m.motivating)/300)*0.10 + (avg(P.map(p=>p.teamwork||55))/100)*0.06 + chem*0.06;
  const atkMod=(0.82+(m.attacking/100)*0.30+(m.tactical/100)*0.10+(m.motivating/100)*0.06)*fitBonus;
  const defMod=(0.82+(m.defending/100)*0.30+(m.tactical/100)*0.10+(m.levelOfDiscipline/100)*0.06)*fitBonus;
  attack*=atkMod*cohesion;
  creativity*=(0.9+(m.tactical/100)*0.2)*cohesion;
  control*=(0.9+(m.attacking/100)*0.16+(m.technical/100)*0.06)*(0.92+chem*0.08);
  defence*=defMod*cohesion;
  pressing*=(0.86+(m.motivating/100)*0.16+(m.tactical/100)*0.08);
  transition*=(0.9+(m.adaptability/100)*0.16);
  setAtt*=(0.92+(m.attacking/100)*0.1);
  setDef*=(0.92+(m.defending/100)*0.1);
  discipline=clampA(discipline*(0.9+(m.levelOfDiscipline/100)*0.18));
  mentality=mentality*0.7 + (m.mental*0.5+m.determination*0.3+m.motivating*0.2)*0.3;
  stamina=stamina*(0.92+(m.fitness/100)*0.12);
  return {attack,creativity,control,defence,pressing,transition,width,aerialAtt,aerialDef,setAtt,setDef,
    physical,stamina,discipline,mentality,penalty,finishing,gkRating:gk,chem,topAtt:fwdAtt,counts};
}

/* makeWeights — decides WHO is credited a goal/assist. Finishing-led composite
   raised to a power, with a designated finisher so an elite focal striker can
   run away with the Golden Boot (30+ in a strong season). Calibrated. */
const SCORE_POW=3.1;
const FWD_OPEN=1.0, MID_OPEN=0.36, DEF_OPEN=0.05;
const FIN_MULT=3.0;    // lead forward hoards open + counter chances
const FIN_MULT2=1.32;  // second forward gets a smaller boost
const FIN_SET=1.7;     // lead forward also claims more set-pieces
function makeWeights(team){
  const P=team.players, pool=P.filter(p=>p.line!=='GK');
  const lf=p=>p.line==='FWD'?FWD_OPEN:p.line==='MID'?MID_OPEN:DEF_OPEN;
  const lfSet=p=>p.line==='FWD'?0.92:p.line==='MID'?0.55:0.95;
  const lfCtr=p=>p.line==='FWD'?1.0:p.line==='MID'?0.42:0.05;
  const lfAst=p=>p.line==='FWD'?0.8:p.line==='MID'?1.0:0.45;
  const comp=p=>{const c=((p.finishing||40)*0.62+(p.offTheBall||40)*0.24+(p.anticipation||40)*0.09+(p.longShots||30)*0.05);return Math.pow(Math.max(0.2,c/88),SCORE_POW);};
  const compC=p=>{const c=((p.finishing||40)*0.5+(p.pace||50)*0.2+(p.offTheBall||40)*0.22+(p.acceleration||50)*0.08);return Math.pow(Math.max(0.2,c/88),SCORE_POW);};
  const open=pool.map(p=>Math.max(0.02, comp(p)*lf(p)));
  const ctr =pool.map(p=>Math.max(0.02, compC(p)*lfCtr(p)));
  const setW=pool.map(p=>Math.max(0.02,((p.heading||40)*1.5+(p.jumpingReach||40)*0.8+(p.finishing||40)*0.7+(p.strength||40)*0.5)/200*lfSet(p)));
  const fwdIdx=pool.map((p,i)=>({i,line:p.line,w:open[i]})).filter(x=>x.line==='FWD').sort((a,b)=>b.w-a.w);
  if(fwdIdx[0]){const i=fwdIdx[0].i;open[i]*=FIN_MULT;ctr[i]*=FIN_MULT;setW[i]*=FIN_SET;}
  if(fwdIdx[1]){const i=fwdIdx[1].i;open[i]*=FIN_MULT2;ctr[i]*=FIN_MULT2;}
  return {pool, open, ctr, setW,
    ast: pool.map(p=>Math.max(0.02,((p.vision||40)*1.3+(p.passing||40)*1.0+(p.crossing||30)*0.6+(p.flair||30)*0.5)/300*lfAst(p))),
    take:pool.map(p=>Math.max(1,pScore(p,W_SETT))),
    pen:(()=>{let bi=0,bv=-1;pool.forEach((p,i)=>{const v=(p.penalties||50)+(p.composure||50)*0.3;if(v>bv){bv=v;bi=i;}});return bi;})()
  };
}

function simulateMatch(home,away,seed){
  const rng=makeRng(seed);
  const H=buildProfile(home),A=buildProfile(away);
  const WH=makeWeights(home),WA=makeWeights(away);
  let hShare=clamp(H.control/(H.control+A.control)*1.0,0.28,0.72);
  hShare=clamp(hShare+0.03,0.28,0.74);
  const aShare=1-hShare;
  const gameTempo=0.86+clamp((((H.control+A.control)/2)-70)/100,-0.2,0.35)*0.5;
  const exposure=t=>clamp((t.counts.FWD-t.counts.DEF),-2,3);
  const result={homeTeamId:home.teamId,awayTeamId:away.teamId,homeGoals:0,awayGoals:0,homeXg:0,awayXg:0,homeShots:0,awayShots:0,homeSot:0,awaySot:0,homePoss:Math.round(hShare*100),events:[]};
  let momentum=0;
  function realise(side,att,def,share,oppShare,W,oppExposure,isHome,segIdx,momSide,fatigue){
    const sp=isHome?'home':'away';const homeFin=isHome?1.04:1.0;
    const pressDrag=clamp(1-(def.pressing-62)/300,0.82,1.12);
    const possF=0.55+share*0.9;
    let stateF=1,stateDef=1;
    const myG=isHome?result.homeGoals:result.awayGoals,opG=isHome?result.awayGoals:result.homeGoals;
    if(segIdx>=3){if(myG<opG){stateF=1.045+(att.mentality-70)/360+(myG<opG-1?0.035:0);}else if(myG>opG+1){stateF=0.955;stateDef=1.035;}}
    const mom=1+momSide*0.12;
    let openExp=BASE_OPEN*Math.pow(att.attack/def.defence,QEXP)*possF*gameTempo*pressDrag*mom*stateF*fatigue*(isHome?HOME_ADV:1);
    openExp=clamp(openExp,0.04,4.2);
    const openN=rng.poisson(openExp);
    const qMeanOpen=CONV_OPEN*Math.pow(att.creativity/def.defence,0.55);
    for(let i=0;i<openN;i++){let q=qMeanOpen*(0.55+0.9*rng.float());q*=(0.82+(att.finishing-def.gkRating)/200)*homeFin;q=clamp(q,0.02,0.84);
      result[sp+'Shots']++;result[sp+'Xg']+=q;const onT=rng.float()<clamp(0.30+q*0.8,0.2,0.85);const goal=rng.float()<q;if(onT||goal)result[sp+'Sot']++;if(goal)scoreGoal(side,W,'open',segIdx,rng,result);}
    let setExp=SET_BASE*Math.pow(att.setAtt/def.setDef,0.8)*(0.6+share*0.7)*(0.8+att.width/200)*fatigue;
    setExp=clamp(setExp,0.02,2.2);const setN=rng.poisson(setExp);const qMeanSet=CONV_SET*Math.pow(att.setAtt/def.setDef,0.6);
    for(let i=0;i<setN;i++){let q=qMeanSet*(0.4+1.2*rng.float());q=clamp(q,0.02,0.7);result[sp+'Shots']++;result[sp+'Xg']+=q;const onT=rng.float()<clamp(0.26+q*0.8,0.18,0.8);const goal=rng.float()<q;if(onT||goal)result[sp+'Sot']++;if(goal)scoreGoal(side,W,'set',segIdx,rng,result);}
    let ctrExp=COUNTER_BASE*Math.pow(att.transition/def.defence,0.9)*oppShare*(0.6+0.18*oppExposure)*mom;
    ctrExp=clamp(ctrExp,0,1.8);const ctrN=rng.poisson(ctrExp);const qMeanCtr=CONV_CTR*Math.pow(att.transition/def.defence,0.5);
    for(let i=0;i<ctrN;i++){let q=qMeanCtr*(0.5+1.1*rng.float());q*=(0.85+(att.finishing-def.gkRating)/200);q=clamp(q,0.03,0.86);result[sp+'Shots']++;result[sp+'Xg']+=q;const onT=rng.float()<clamp(0.34+q*0.8,0.22,0.86);const goal=rng.float()<q;if(onT||goal)result[sp+'Sot']++;if(goal)scoreGoal(side,W,'counter',segIdx,rng,result);}
    let penP=clamp((1-def.discipline/120)*0.010*(0.6+share)*(att.attack/def.defence),0,0.05);
    if(rng.float()<penP){const q=0.79;result[sp+'Shots']++;result[sp+'Xg']+=q;result[sp+'Sot']++;if(rng.float()<q){const sc=W.pool[W.pen];pushGoal(side,sc,null,segIdx,rng,result,'pen');}}
  }
  function scoreGoal(side,W,kind,seg,rng,res){let si;if(kind==='set')si=rng.weighted(W.setW);else if(kind==='counter')si=rng.weighted(W.ctr);else si=rng.weighted(W.open);
    const scorer=W.pool[si];let assister=null;const aProb=kind==='set'?0.84:kind==='counter'?0.62:0.74;
    if(rng.float()<aProb&&W.pool.length>1){let ai=kind==='set'?W.take.indexOf(Math.max.apply(null,W.take)):rng.weighted(W.ast);if(ai===si){ai=rng.weighted(W.ast);if(ai===si)ai=(ai+1)%W.pool.length;}assister=W.pool[ai];}
    pushGoal(side,scorer,assister,seg,rng,res,kind);}
  function pushGoal(side,scorer,assister,seg,rng,res,kind){const sp=side==='H'?'home':'away';res[sp+'Goals']++;const minute=clamp(seg*15+rng.int(1,15),1,90);const teamId=side==='H'?home.teamId:away.teamId;
    res.events.push({pid:scorer.id,team:teamId,type:'GOAL',minute,name:scorer.name,kind});if(assister)res.events.push({pid:assister.id,team:teamId,type:'ASSIST',minute,name:assister.name});}
  for(let s=0;s<PHASES;s++){momentum=clamp(momentum+(rng.float()-0.5)*0.42,-1,1);
    const fatH=1-Math.max(0,s-3)*0.018*(1-(H.stamina-70)/140);const fatA=1-Math.max(0,s-3)*0.018*(1-(A.stamina-70)/140);
    realise('H',H,A,hShare,aShare,WH,exposure(A),true,s,momentum,fatH);
    realise('A',A,H,aShare,hShare,WA,exposure(H),false,s,-momentum,fatA);}
  result.events.sort((a,b)=>a.minute-b.minute);
  return result;
}
function generateFixtures(ids,seed){const rng=makeRng(seed);const teams=ids.slice();
  for(let i=teams.length-1;i>0;i--){const j=rng.int(0,i);[teams[i],teams[j]]=[teams[j],teams[i]];}
  const n=teams.length,rounds=n-1,half=n/2,arr=teams.slice(),first=[];
  for(let r=0;r<rounds;r++){for(let i=0;i<half;i++){const t1=arr[i],t2=arr[n-1-i],hf=(r+i)%2===0;first.push({matchday:r+1,homeTeamId:hf?t1:t2,awayTeamId:hf?t2:t1});}
    const fixed=arr[0],rest=arr.slice(1);rest.unshift(rest.pop());arr.splice(0,arr.length,fixed,...rest);}
  return first.concat(first.map(f=>({matchday:f.matchday+rounds,homeTeamId:f.awayTeamId,awayTeamId:f.homeTeamId})));}
function computeTable(ids,results){const m=new Map(ids.map(id=>[id,{teamId:id,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0}]));
  for(const r of results){const h=m.get(r.homeTeamId),a=m.get(r.awayTeamId);if(!h||!a)continue;h.played++;a.played++;h.gf+=r.homeGoals;h.ga+=r.awayGoals;a.gf+=r.awayGoals;a.ga+=r.homeGoals;
    if(r.homeGoals>r.awayGoals){h.won++;h.pts+=3;a.lost++;}else if(r.homeGoals<r.awayGoals){a.won++;a.pts+=3;h.lost++;}else{h.drawn++;a.drawn++;h.pts++;a.pts++;}}
  const rows=[...m.values()].sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf||x.teamId.localeCompare(y.teamId));
  rows.forEach((r,i)=>{r.gd=r.gf-r.ga;r.position=i+1;});return rows;}

/* ============================================================================
   SEASON ACCUMULATION + AWARDS — FM-style per-match ratings drive a Ballon
   d'Or-style vote, a Golden Glove and a Team of the Season.
   ========================================================================== */
const RATE_BASE=6.0, RATE_SLOPE=0.045;
const BAL_RATING=120, BAL_GOAL=9, BAL_AST=5, BAL_TEAM=1.6, BAL_MOTM=3;
function gauss(rng){let u=0,v=0;while(u===0)u=rng.float();while(v===0)v=rng.float();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function ratePlayer(p,ctx,rng){
  let r=RATE_BASE+((p.overall||70)-70)*RATE_SLOPE;
  r+=ctx.goals*0.34; r+=ctx.assists*0.22;

function buildSeason(teams,results,cards){
  const acc={};

    const rng=makeRng('rate_'+r.homeTeamId+'_'+r.awayTeamId+'_'+(r.matchday||0));
    const goalsBy={},assistBy={},kindBy={};
    (r.events||[]).forEach(e=>{if(e.type==='GOAL'){goalsBy[e.pid]=(goalsBy[e.pid]||0)+1;(kindBy[e.pid]||(kindBy[e.pid]={}))[e.kind||'open']=((kindBy[e.pid]||{})[e.kind||'open']||0)+1;}else if(e.type==='ASSIST')assistBy[e.pid]=(assistBy[e.pid]||0)+1;});

}
function buildAwards(season,table){

/* ============================================================================
   ATTRIBUTE DERIVER — fill a new card's attributes from an overall + position
   (editor convenience; existing cards keep their hand-set values).
   ========================================================================== */
function lineProfile(primary){
  const L=POS_LINE[primary];
  const hi={},lo={};
  if(L==='GK'){GKA_K.forEach(k=>hi[k]=1);['reflexes','handling','oneOnOnes','positioning','concentration','anticipation','commandOfArea','aerialReach'].forEach(k=>hi[k]=1);['finishing','dribbling','pace','acceleration','crossing','longShots','tackling','heading'].forEach(k=>lo[k]=1);}
  else if(L==='DEF'){['tackling','marking','positioning','heading','strength','jumpingReach','bravery','concentration','anticipation'].forEach(k=>hi[k]=1);['finishing','flair','dribbling','longShots','vision'].forEach(k=>lo[k]=1);}
  else if(L==='MID'){['passing','vision','technique','decisions','workRate','stamina','firstTouch','composure','teamwork'].forEach(k=>hi[k]=1);['heading','jumpingReach','strength'].forEach(k=>lo[k]=1);}
  else {['finishing','offTheBall','dribbling','acceleration','pace','composure','firstTouch','technique','flair'].forEach(k=>hi[k]=1);['marking','tackling','positioning'].forEach(k=>lo[k]=1);}

}
function deriveAttrs(overall,primary,seedStr){
  const rng=makeRng(seedStr||('d_'+primary+'_'+overall+'_'+Math.random()));
  const {L,hi,lo}=lineProfile(primary);
  const keys=L==='GK'?ALL_PLAYER_K:OUT_K;

  keys.forEach(k=>{let base=overall;if(hi[k])base+=6;if(lo[k])base-=22;base+=(rng.float()*12-6);out[k]=clampA(base);});
  if(L!=='GK')GKA_K.forEach(k=>{ if(k==='kicking'||k==='throwing'||k==='communication') out[k]=clampA(overall-25+rng.float()*10); });
  return out;
}
function mgrDerive(overall,seedStr){const rng=makeRng(seedStr||('m_'+overall+'_'+Math.random()));const o={};MGR_K.forEach(k=>o[k]=clampA(overall-4+rng.float()*12));return o;}

/* ---------- CSV round-trip (players + managers in one file) ---------- */
const CSV_HEAD=['kind','id','name','club','season','primary','secondaries','nationality','overall','value',...ALL_PLAYER_K,...MGR_K];
function csvCell(v){v=(v==null?'':String(v));if(/[",\n]/.test(v))return '"'+v.replace(/"/g,'""')+'"';return v;}
function exportCatalogueCSV(cat){
  const rows=[CSV_HEAD.join(',')];
  const emit=rec=>{const r=CSV_HEAD.map(k=>{if(k==='secondaries')return csvCell((rec.secondaries||[]).join('|'));return csvCell(rec[k]);});rows.push(r.join(','));};
  cat.players.forEach(emit);cat.managers.forEach(emit);

function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch==='\r'){}else cur+=ch;}}
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function importCatalogueCSV(text,existing){

/* ---------- robust download (mobile-safe: correct MIME so JSON stays JSON) ---------- */
function downloadFile(filename,text,mime){
  try{

    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.rel='noopener';
    document.body.appendChild(a);a.click();

    return true;
  }catch(e){return false;}
}

/* ============================================================================
   DRAFT STATE + REDUCER — 2 managers, 10 teams each (20 total), built in an
   ABBA snake order. Per team: pick a formation, allocate budget from your pot,
   sign 11 players (name-unique across the league) + an optional head coach.
   Cost is committed to your pot when the team is confirmed.
   ========================================================================== */
const OWNERS=[1,2], TEAMS_PER_OWNER=10, TOTAL_TEAMS=20, DEFAULT_FORMATION='4-3-3';
const DRAFT_ORDER=(()=>{const o=[];for(let r=0;r<TEAMS_PER_OWNER;r++){if(r%2===0)o.push(1,2);else o.push(2,1);}return o;})();
function builderAt(pick){return DRAFT_ORDER[pick]||1;}
function ownerCls(o){return o===1?'p1':'p2';}
function teamsBuilt(state,owner){return state.teams.filter(t=>t.owner===owner).length;}
function teamsLeftAfterCurrent(state,owner){return TEAMS_PER_OWNER-teamsBuilt(state,owner)-1;}
function potRemaining(state,owner){return (state.catalogue.config.budget||10000)-(state.spent[owner]||0);}

function fSlots(cur){return fSlotsOf(cur.formation);}
function emptySlots(cur){return fSlots(cur).filter(s=>!cur.slots[s.id]);}
function teamComplete(cur){return fSlots(cur).every(s=>cur.slots[s.id]);} /* 11 players; coach optional */
function curSpent(cur,cards){let s=0;Object.keys(cur.slots).forEach(sid=>{const c=cards.get(cur.slots[sid]);if(c)s+=c.value||0;});return s;}

function usedPlayerNames(state,cards){const set=new Set();const add=t=>fSlotsOf(t.formation).forEach(s=>{const c=cards.get(t.slots[s.id]);if(c)set.add(c.name);});state.teams.forEach(add);if(state.cur)add(state.cur);return set;}
function usedManagerNames(state,cards){const set=new Set();const add=t=>{const c=cards.get(t.slots.MANAGER);if(c)set.add(c.name);};state.teams.forEach(add);if(state.cur)add(state.cur);return set;}
function eligibleFor(slot,card){return card.line===slot.line || eligPos(card).includes(slot.pos);}
function undraftedFor(slot,state,cards){const used=usedPlayerNames(state,cards);const seen=new Set();const out=[];state.catalogue.players.forEach(p=>{if(used.has(p.name))return;if(!eligibleFor(slot,p))return;out.push(p);});return out;}
function undraftedManagers(state,cards){return state.catalogue.managers.slice();} /* coaches are reusable across teams */

function poolByLineDedup(state,cards){const used=usedPlayerNames(state,cards);const seenName={};const m={GK:[],DEF:[],MID:[],FWD:[]};
  state.catalogue.players.forEach(p=>{if(used.has(p.name))return;const k=p.line+'|'+p.name;if(seenName[k])return;seenName[k]=1;m[p.line].push(p);});
  Object.keys(m).forEach(L=>m[L].sort((a,b)=>(a.value||0)-(b.value||0)));return m;}
function fillRemainingCost(cur,state,cards){const need={GK:0,DEF:0,MID:0,FWD:0};emptySlots(cur).forEach(s=>need[s.line]++);
  const byLine=poolByLineDedup({...state,cur},cards);let c=0;Object.keys(need).forEach(L=>{for(let i=0;i<need[L];i++)c+=byLine[L][i]?(byLine[L][i].value||0):9999;});return c;}
function minXICostFromPool(state,cards){const need={GK:1,DEF:4,MID:3,FWD:3};const byLine=poolByLineDedup(state,cards);let c=0;Object.keys(need).forEach(L=>{for(let i=0;i<need[L];i++)c+=byLine[L][i]?(byLine[L][i].value||0):9999;});return c;}
function maxBudget(state,cards,owner){const others=Math.max(0,teamsLeftAfterCurrent(state,owner));const floor=minXICostFromPool(state,cards);return Math.max(0,potRemaining(state,owner)-others*floor);}
function curBudgetBounds(state,cards){const owner=state.cur.owner;const spent=curSpent(state.cur,cards);const minT=Math.max(spent,spent+fillRemainingCost(state.cur,state,cards));const maxA=Math.max(minT,maxBudget(state,cards,owner));return{min:minT,max:maxA};}
function canSign(state,cards,slot,card){const cur=state.cur;const spent=curSpent(cur,cards);if(spent+(card.value||0)>cur.budget)return false;
  const after={...cur,slots:{...cur.slots,[slot.id]:card.id}};const rem=fillRemainingCost(after,{...state,cur:after},cards);return curSpent(after,cards)+rem<=cur.budget;}
function canSignManager(state,cards,card){const cur=state.cur;return curSpent(cur,cards)+(card.value||0)<=cur.budget;}

function defaultTeamName(state,owner){return (state.names[owner]||('Player '+owner))+' '+(teamsBuilt(state,owner)+1);}
function newCur(owner,state,cards){const cur={owner,name:'',formation:DEFAULT_FORMATION,slots:{}};cur.name=defaultTeamName(state,owner);
  const probe={...state,cur};const b=curBudgetBounds(probe,cards);cur.budget=clamp(state.catalogue.config.startEachTeamSuggested||1000,b.min,b.max);return cur;}
function freshDraft(cat,names){const cards=cardMapOf(cat);const st={phase:'draft',catalogue:cat,names:names||{1:'Player 1',2:'Player 2'},pick:0,teams:[],cur:null,spent:{1:0,2:0},results:null,table:null,seed:Math.floor(Math.random()*1e9)};st.cur=newCur(builderAt(0),st,cards);return st;}
function setupState(cat,names){return {phase:'setup',catalogue:cat,names:names||{1:'Player 1',2:'Player 2'},pick:0,teams:[],cur:null,spent:{1:0,2:0},results:null,table:null,seed:Math.floor(Math.random()*1e9)};}

function autofillTeam(state,cards){const original=state.cur.budget;const cur={...state.cur,slots:{...state.cur.slots}};
  const mgrsAll=undraftedManagers({...state,cur},cards);
  const cheapMgr=cur.slots.MANAGER?0:(mgrsAll.length?Math.min.apply(null,mgrsAll.map(m=>m.value||0)):0);
  cur.budget=Math.max(fillRemainingCost(cur,{...state,cur},cards),original-cheapMgr); /* reserve room for a coach */
  const order={GK:0,DEF:1,MID:2,FWD:3};
  fSlots(cur).slice().sort((a,b)=>order[a.line]-order[b.line]).forEach(slot=>{if(cur.slots[slot.id])return;const ctx={...state,cur};
    const elig=undraftedFor(slot,ctx,cards).filter(c=>c.line===slot.line); /* exact line only, so a tight line is never drained by versatile picks */
    const aff=elig.filter(c=>canSign(ctx,cards,slot,c)).sort((a,b)=>(b.overall-a.overall)||((b.value||0)-(a.value||0)));
    let pick=aff[0];if(!pick)pick=elig.slice().sort((a,b)=>(a.value||0)-(b.value||0))[0];
    if(!pick){const any=undraftedFor(slot,ctx,cards).sort((a,b)=>(a.value||0)-(b.value||0));pick=any[0];}
    if(pick)cur.slots[slot.id]=pick.id;});

  if(!cur.slots.MANAGER){const sp=curSpent(cur,cards);const aff=mgrsAll.filter(m=>sp+(m.value||0)<=cur.budget).sort((a,b)=>b.overall-a.overall);if(aff[0])cur.slots.MANAGER=aff[0].id;}
  return cur;}

function commitTeam(state,cards){const cur=state.cur;const teamId='t'+state.teams.length;const spent=curSpent(cur,cards);
  const team={teamId,owner:cur.owner,name:cur.name||defaultTeamName(state,cur.owner),formation:cur.formation,slots:{...cur.slots},budget:cur.budget,spent};
  const teams=state.teams.concat([team]);const spentMap={...state.spent,[cur.owner]:(state.spent[cur.owner]||0)+spent};
  const pick=state.pick+1;
  if(pick>=TOTAL_TEAMS)return startSim({...state,teams,spent:spentMap,pick,cur:null});
  const next={...state,teams,spent:spentMap,pick,cur:null};next.cur=newCur(builderAt(pick),next,cards);return next;}

function startSim(state){const cat=state.catalogue;const cards=cardMapOf(cat);
  const sims=state.teams.map(t=>toSim(t,cards));const ids=sims.map(s=>s.teamId);const byId=Object.fromEntries(sims.map(s=>[s.teamId,s]));
  const fixtures=generateFixtures(ids,state.seed);
  const results=fixtures.map(f=>{const r=simulateMatch(byId[f.homeTeamId],byId[f.awayTeamId],state.seed+'_'+f.homeTeamId+'_'+f.awayTeamId+'_'+f.matchday);r.matchday=f.matchday;return r;});
  const table=computeTable(ids,results);return {...state,results,table,cur:null,phase:'final'};}

function quickPlay(state){let st={...state,teams:state.teams.slice(),spent:{...state.spent}};const cards=cardMapOf(st.catalogue);
  let pick=st.pick;let cur=st.cur;
  while(pick<TOTAL_TEAMS){const owner=builderAt(pick);
    if(!cur||cur.owner!==owner)cur=newCur(owner,st,cards);
    const teamsLeft=TEAMS_PER_OWNER-teamsBuilt(st,owner);cur={...cur,budget:Math.max(curBudgetBounds({...st,cur},cards).min,Math.floor(potRemaining(st,owner)/Math.max(1,teamsLeft)))};
    cur=autofillTeam({...st,cur},cards);
    const teamId='t'+st.teams.length;const spent=curSpent(cur,cards);
    st.teams.push({teamId,owner,name:cur.name||defaultTeamName(st,owner),formation:cur.formation,slots:{...cur.slots},budget:cur.budget,spent});
    st.spent[owner]=(st.spent[owner]||0)+spent;pick++;cur=null;}
  st.pick=TOTAL_TEAMS;st.cur=null;return startSim(st);}

function reducer(state,a){const cards=cardMapOf(state.catalogue);
  switch(a.type){
    case 'SET_NAMES':return {...state,names:{...state.names,...a.names}};
    case 'SET_CATALOGUE':{const cat=a.catalogue;saveCatalogue(cat);return {...state,catalogue:cat};}
    case 'START_DRAFT':return freshDraft(state.catalogue,state.names);
    case 'SET_FORMATION':{if(!state.cur)return state;const keepMgr=state.cur.slots.MANAGER;const cur={...state.cur,formation:a.formation,slots:keepMgr?{MANAGER:keepMgr}:{}};const b=curBudgetBounds({...state,cur},cards);cur.budget=clamp(cur.budget,b.min,b.max);return {...state,cur};}
    case 'SET_TEAMNAME':{if(!state.cur)return state;return {...state,cur:{...state.cur,name:a.name}};}
    case 'SET_BUDGET':{if(!state.cur)return state;const b=curBudgetBounds(state,cards);return {...state,cur:{...state.cur,budget:clamp(a.budget,b.min,b.max)}};}
    case 'SIGN':{if(!state.cur)return state;const slot=fSlots(state.cur).find(s=>s.id===a.slotId);const card=cards.get(a.cardId);if(!slot||!card)return state;if(!canSign(state,cards,slot,card))return {...state,_err:'Not enough budget left to still complete the XI.'};return {...state,cur:{...state.cur,slots:{...state.cur.slots,[a.slotId]:a.cardId}},_err:null};}
    case 'UNSIGN':{if(!state.cur)return state;const slots={...state.cur.slots};delete slots[a.slotId];return {...state,cur:{...state.cur,slots}};}
    case 'SIGN_MANAGER':{if(!state.cur)return state;const card=cards.get(a.cardId);if(!card)return state;if(!canSignManager(state,cards,card))return {...state,_err:'Not enough budget for that coach.'};return {...state,cur:{...state.cur,slots:{...state.cur.slots,MANAGER:a.cardId}},_err:null};}
    case 'UNSIGN_MANAGER':{if(!state.cur)return state;const slots={...state.cur.slots};delete slots.MANAGER;return {...state,cur:{...state.cur,slots}};}
    case 'AUTOFILL_TEAM':{if(!state.cur)return state;return {...state,cur:autofillTeam(state,cards)};}
    case 'CLEAR_TEAM':{if(!state.cur)return state;return {...state,cur:{...state.cur,slots:{}}};}
    case 'CONFIRM_TEAM':{if(!state.cur||!teamComplete(state.cur))return {...state,_err:'Fill all 11 positions first.'};return commitTeam(state,cards);}
    case 'QUICK_PLAY':return quickPlay(state);
    case 'BACK_TO_SETUP':return setupState(state.catalogue,state.names);
    case 'RESET_ALL':{const cat=baseCatalogue();saveCatalogue(cat);return setupState(cat,{1:'Player 1',2:'Player 2'});}
    default:return state;
  }
}

function TOTSPitch({tots,season,onProfile}){
  const C={gk:[{x:50,y:90}],def:[{x:17,y:70},{x:39,y:71},{x:61,y:71},{x:83,y:70}],mid:[{x:25,y:47},{x:50,y:46},{x:75,y:47}],fwd:[{x:22,y:21},{x:50,y:20},{x:78,y:21}]};
  const place=(arr,coords,kind)=>arr.map((a,i)=>{const co=coords[i]||{x:50,y:50};return html`<div key=${kind+i} className="totsslot" style=${{left:co.x+'%',top:co.y+'%'}} onClick=${()=>onProfile&&onProfile(a)}>
    <${RBadge} v=${a.overall} size=${30}/><div className="nm">${surname(a.name)}</div><div className="sub">${a.goals?(a.goals+'g '):''}${a.assists?(a.assists+'a '):''}${(!a.goals&&!a.assists&&a.cs)?(a.cs+' CS'):''}${a.avg?(' · '+a.avg.toFixed(2)):''}</div></div>`;});
  return html`<div className="totspitch">
    <div className="mk halfway"></div><div className="mk circle"></div><div className="mk boxTop"></div><div className="mk boxBot"></div>
    ${tots.gk?place([tots.gk],C.gk,'gk'):''}${place(tots.def,C.def,'d')}${place(tots.mid,C.mid,'m')}${place(tots.fwd,C.fwd,'f')}
  </div>`;
}

function FinalScreen({state,dispatch,onEditor}){
  const cards=useMemo(()=>cardMapOf(state.catalogue),[state.catalogue]);
  const data=useMemo(()=>{
    const sims=state.teams.map(t=>toSim(t,cards));
    const season=buildSeason(sims,state.results,cards);
    const ballon=buildAwards(season,state.table);
    const gloves=buildGloves(season);
    const tots=buildTOTS(ballon);
    const arr=Object.values(season).filter(s=>s.apps>0);
    const scorers=arr.slice().sort((a,b)=>b.goals-a.goals||b.assists-a.assists||b.avg-a.avg).slice(0,15);
    const assisters=arr.slice().sort((a,b)=>b.assists-a.assists||b.goals-a.goals).slice(0,15);
    const kinds={open:0,set:0,counter:0,pen:0};arr.forEach(s=>{kinds.open+=s.gOpen||0;kinds.set+=s.gSet||0;kinds.counter+=s.gCtr||0;kinds.pen+=s.gPen||0;});
    const byOwner={1:0,2:0};(state.results||[]).forEach(r=>(r.events||[]).forEach(e=>{if(e.type==='GOAL'){const o=teamOwner(state,e.team);byOwner[o]=(byOwner[o]||0)+1;}}));
    const totalGoals=(state.results||[]).reduce((a,r)=>a+r.homeGoals+r.awayGoals,0);
    const matches=(state.results||[]).map(r=>({...r,tot:r.homeGoals+r.awayGoals,margin:Math.abs(r.homeGoals-r.awayGoals)}));
    const highest=matches.slice().sort((a,b)=>b.tot-a.tot)[0];
    const biggest=matches.slice().sort((a,b)=>b.margin-a.margin)[0];
    const bandDef=[[96,200,'96+'],[90,95,'90–95'],[85,89,'85–89'],[80,84,'80–84'],[1,79,'Below 80']];
    const bands=bandDef.map(([lo,hi,lab])=>{const g=arr.filter(s=>(s.overall||0)>=lo&&(s.overall||0)<=hi);return {lab,n:g.length,goals:g.reduce((a,b)=>a+b.goals,0),per:g.length?g.reduce((a,b)=>a+b.goals,0)/g.length:0,avg:g.length?g.reduce((a,b)=>a+b.avg,0)/g.length:0};});
    return {season,ballon,gloves,tots,scorers,assisters,kinds,byOwner,totalGoals,highest,biggest,bands};
  },[state.results,state.table,state.teams,cards]);

      </div>
      <div>
        <div className="panel" style=${{padding:18}}><div className="eyebrow">Playmakers — top assists</div>

          <tbody>${assisters.map((s,i)=>html`<tr key=${s.id} className="click" onClick=${()=>openCard(s.id)}><td className="l muted">${i+1}</td><td className="nm">${s.name}</td><td style=${{fontWeight:700,color:'var(--gold)'}}>${s.assists}</td><td>${s.goals}</td></tr>`)}</tbody></table>

      </div>
      <div className="grid2">
        <div className="panel" style=${{padding:20}}><div className="eyebrow">Team of the Season</div><div style=${{marginTop:12}}><${TOTSPitch} tots=${tots} season=${season} onProfile=${a=>openCard(a.id)}/></div></div>
        <div className="panel" style=${{padding:20}}><div className="eyebrow">Golden Glove — goalkeepers</div>
          <table className="sstable" style=${{marginTop:10}}><thead><tr><th className="l">#</th><th className="l">Keeper</th><th>CS</th><th>Avg</th></tr></thead>
          <tbody>${gloves.slice(0,12).map((g,i)=>html`<tr key=${g.id} className="click" onClick=${()=>openCard(g.id)}><td className="l muted">${i+1}</td><td className="nm">${g.name} <span className="muted" style=${{fontSize:11}}>${g.club||''}</span></td><td style=${{fontWeight:700,color:'var(--gold)'}}>${g.cs}</td><td>${g.avg.toFixed(2)}</td></tr>`)}</tbody></table>
        </div>
      </div>
    </div>`}

    ${tab==='analysis'&&html`<div className="grid2">
      <div>
        <div className="panel" style=${{padding:20}}><div className="eyebrow">How goals were scored</div><div style=${{marginTop:12}}>
          ${[['Open play',kinds.open,'var(--pos)'],['Set pieces',kinds.set,'var(--gold)'],['Counter-attacks',kinds.counter,'var(--p2)'],['Penalties',kinds.pen,'var(--neg)']].map(([lab,v,col])=>html`<div key=${lab} className="anbar"><span className="lab">${lab}</span><span className="track"><i style=${{width:(v/kindTotal*100)+'%',background:col}}></i></span><span className="v">${v}</span></div>`)}
        </div></div>
        <div className="panel" style=${{padding:20,marginTop:16}}><div className="eyebrow">Goals by manager</div><div style=${{marginTop:12}}>
          ${OWNERS.map(o=>html`<div key=${o} className="anbar"><span className="lab">${state.names[o]}</span><span className="track"><i style=${{width:(byOwner[o]/ownerTotal*100)+'%',background:o===1?'var(--p1)':'var(--p2)'}}></i></span><span className="v">${byOwner[o]}</span></div>`)}
        </div></div>
      </div>
      <div className="panel" style=${{padding:20}}><div className="eyebrow">Output by player rating</div>

        <tbody>${bands.map(b=>html`<tr key=${b.lab}><td className="l">${b.lab}</td><td>${b.n}</td><td>${b.goals}</td><td style=${{color:'var(--gold)',fontWeight:700}}>${b.per.toFixed(1)}</td><td>${b.avg?b.avg.toFixed(2):'—'}</td></tr>`)}</tbody></table>

function EditRecord({rec0,onSave,onDelete,onDup,onClose}){
  const [rec,setRec]=useState(()=>JSON.parse(JSON.stringify(rec0)));
  const isM=rec.kind==='manager';const line=isM?null:(POS_LINE[rec.primary]||'MID');
  const set=(k,v)=>setRec(r=>({...r,[k]:v}));
  const setNum=(k,v)=>setRec(r=>({...r,[k]:clampA(+v||0)}));
  const setOverall=v=>setRec(r=>({...r,overall:clampA(+v||0)}));
  const setValue=v=>setRec(r=>({...r,value:Math.max(1,Math.min(9999,Math.round(+v||0)))}));
  const toggleSec=p=>setRec(r=>{const cur=new Set(r.secondaries||[]);cur.has(p)?cur.delete(p):cur.add(p);return {...r,secondaries:[...cur].filter(x=>x!==r.primary)};});
  const autofill=()=>{if(isM)setRec(r=>({...r,...mgrDerive(r.overall,'e_'+r.id+'_'+r.overall+'_'+Math.random())}));else setRec(r=>({...r,...deriveAttrs(r.overall,r.primary,'e_'+r.id+'_'+r.overall+'_'+Math.random())}));};
  const save=()=>{const out={...rec};if(out.kind!=='manager')out.secondaries=(out.secondaries||[]).filter(p=>p!==out.primary);onSave(out);};
  const POS_OPTS=Object.keys(POS_LINE);
  const grid=(title,defs)=>html`<div style=${{marginTop:14}}><div className="eyebrow" style=${{marginBottom:8}}>${title}</div><div className="attgrid">${defs.map(([k,lab])=>html`<div className="att" key=${k}><label>${lab}</label><input type="number" min="1" max="99" value=${rec[k]!=null?rec[k]:''} onChange=${e=>setNum(k,e.target.value)}/></div>`)}</div></div>`;
  return html`<div className="modal" onClick=${onClose}><div className="panel modalbox" onClick=${e=>e.stopPropagation()}>
    <div className="spread"><div style=${{minWidth:0}}><div className="eyebrow">${isM?'Edit coach':'Edit player'}</div><h2 className="head" style=${{fontSize:22}}>${rec.name||'New'}</h2></div><button className="btn ghost sm" onClick=${onClose}>Close</button></div>
    <div className="grid2" style=${{marginTop:14}}>
      <div><label className="lbl">Name</label><input className="fld" value=${rec.name} onChange=${e=>set('name',e.target.value)}/></div>
      <div className="grid2"><div><label className="lbl">Overall</label><input className="fld" type="number" value=${rec.overall} onChange=${e=>setOverall(e.target.value)}/></div><div><label className="lbl">Value (m)</label><input className="fld" type="number" value=${rec.value} onChange=${e=>setValue(e.target.value)}/></div></div>
    </div>
    <div className="grid2" style=${{marginTop:12}}>
      <div><label className="lbl">Club</label><input className="fld" value=${rec.club||''} onChange=${e=>set('club',e.target.value)}/></div>
      <div><label className="lbl">Season</label><input className="fld" value=${rec.season||''} onChange=${e=>set('season',e.target.value)}/></div>
    </div>
    ${!isM&&html`<div><div className="grid2" style=${{marginTop:12}}>
      <div><label className="lbl">Primary position</label><select className="fld" value=${rec.primary} onChange=${e=>set('primary',e.target.value)}>${POS_OPTS.map(p=>html`<option key=${p} value=${p}>${p+' — '+POS_NAME[p]}</option>`)}</select></div>
      <div><label className="lbl">Nationality</label><input className="fld" value=${rec.nationality||''} onChange=${e=>set('nationality',e.target.value)}/></div>
    </div>
    <div style=${{marginTop:12}}><label className="lbl">Secondary positions</label><div className="chips">${POS_OPTS.filter(p=>p!==rec.primary).map(p=>html`<button key=${p} className=${'chiptoggle'+((rec.secondaries||[]).includes(p)?' on':'')} onClick=${()=>toggleSec(p)}>${p}</button>`)}</div></div></div>`}
    <div className="row" style=${{marginTop:16,flexWrap:'wrap'}}><button className="btn ghost sm" onClick=${autofill}>Auto-fill attributes from overall</button>${!isM&&html`<span className="muted" style=${{fontSize:12}}>${'Line: '+LINE_NAME[line]}</span>`}</div>
    ${isM?grid('Coaching attributes',MGR_ATTRS):html`<div>${grid('Technical',TECH)}${grid('Mental',MENT)}${grid('Physical',PHYS)}${line==='GK'?grid('Goalkeeping',GKA):''}</div>`}
    <div className="spread" style=${{marginTop:20,flexWrap:'wrap',gap:10}}>
      <div className="row"><button className="btn gold" onClick=${save}>Save</button><button className="btn ghost" onClick=${()=>onDup(rec)}>Duplicate</button></div>
      <button className="btn danger" onClick=${()=>onDelete(rec)}>Delete</button>
    </div>
  </div></div>`;
}

function Editor({state,dispatch,notify,onClose}){
  const cat=state.catalogue;
  const [tab,setTab]=useState('players');const [q,setQ]=useState('');const [edit,setEdit]=useState(null);
  const [textOpen,setTextOpen]=useState(false);const [textVal,setTextVal]=useState('');
  const jsonRef=useRef(null);const csvRef=useRef(null);
  const list=(tab==='players'?cat.players:cat.managers).filter(r=>{if(!q)return true;const s=q.toLowerCase();return r.name.toLowerCase().includes(s)||(r.club||'').toLowerCase().includes(s)||(r.season||'').toLowerCase().includes(s);});
  const openEdit=r=>setEdit(JSON.parse(JSON.stringify(r)));
  const addNew=()=>{const r=tab==='players'?blankPlayer():blankManager();dispatch({type:'SET_CATALOGUE',catalogue:putRecord(cat,r)});setEdit(JSON.parse(JSON.stringify(r)));};
  const saveRec=rec=>{recomputeLine(rec);if(rec.kind!=='manager'&&rec.line!=='GK')GKA_K.forEach(k=>delete rec[k]);dispatch({type:'SET_CATALOGUE',catalogue:putRecord(cat,rec)});setEdit(null);notify('Saved '+rec.name+'.',true);};
  const deleteRec=rec=>{if(!confirm('Delete '+rec.name+'?'))return;dispatch({type:'SET_CATALOGUE',catalogue:removeRecord(cat,rec.id,rec.kind)});setEdit(null);notify('Deleted '+rec.name+'.',true);};
  const dupRecord=rec=>{const copy={...JSON.parse(JSON.stringify(rec)),id:newId(rec.kind)};dispatch({type:'SET_CATALOGUE',catalogue:putRecord(cat,copy)});setEdit(JSON.parse(JSON.stringify(copy)));notify('Duplicated '+rec.name+' — now editing the copy.',true);};
  const backupJSON=()=>{const ok=downloadFile('draft-zone-database.json',JSON.stringify(cat,null,2),'application/json');notify(ok?'Backed up as draft-zone-database.json':'Could not start the download.',ok);};
  const exportCSV=()=>{const ok=downloadFile('draft-zone-database.csv',exportCatalogueCSV(cat),'text/csv');notify(ok?'Exported draft-zone-database.csv':'Could not start the download.',ok);};
  const loadJSONFile=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(String(r.result));const cat2={config:d.config||cat.config||{budget:10000,startEachTeamSuggested:1000},players:Array.isArray(d.players)?d.players:[],managers:Array.isArray(d.managers)?d.managers:[]};if(!cat2.players.length&&!cat2.managers.length)throw new Error('no records found');dispatch({type:'SET_CATALOGUE',catalogue:cat2});notify('Loaded '+cat2.players.length+' players and '+cat2.managers.length+' coaches.',true);}catch(err){notify('Load failed: '+err.message,false);}};r.readAsText(f);e.target.value='';};
  const importCSVFile=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const cat2=importCatalogueCSV(String(r.result),cat);dispatch({type:'SET_CATALOGUE',catalogue:cat2});notify('Imported '+cat2.players.length+' players and '+cat2.managers.length+' coaches.',true);}catch(err){notify('CSV import failed: '+err.message,false);}};r.readAsText(f);e.target.value='';};
  const openText=()=>{setTextVal(JSON.stringify(cat,null,2));setTextOpen(true);};
  const restoreText=()=>{try{const d=JSON.parse(textVal);const cat2={config:d.config||cat.config,players:Array.isArray(d.players)?d.players:[],managers:Array.isArray(d.managers)?d.managers:[]};if(!cat2.players.length&&!cat2.managers.length)throw new Error('no records');dispatch({type:'SET_CATALOGUE',catalogue:cat2});setTextOpen(false);notify('Database restored from text.',true);}catch(err){notify('Restore failed: '+err.message,false);}};
  const restoreDefault=()=>{if(!confirm('Replace the current database with the built-in default?'))return;dispatch({type:'SET_CATALOGUE',catalogue:baseCatalogue()});notify('Restored the built-in database.',true);};
  return html`<div className="modal" onClick=${onClose}><div className="panel modalbox" style=${{maxWidth:980}} onClick=${e=>e.stopPropagation()}>
    <div className="spread" style=${{flexWrap:'wrap',gap:10}}><div><div className="eyebrow">Database</div><h2 className="head" style=${{fontSize:24}}>Squad & player editor</h2></div><button className="btn ghost sm" onClick=${onClose}>Close</button></div>
    <div className="spread" style=${{marginTop:14,flexWrap:'wrap',gap:10}}>
      <div className="seg"><button className=${tab==='players'?'on':''} onClick=${()=>setTab('players')}>${'Players ('+cat.players.length+')'}</button><button className=${tab==='managers'?'on':''} onClick=${()=>setTab('managers')}>${'Coaches ('+cat.managers.length+')'}</button></div>
      <button className="btn sm" onClick=${addNew}>${tab==='players'?'+ Player':'+ Coach'}</button>
    </div>
    <div className="ctrls" style=${{marginTop:12}}><input className="s" placeholder="Search name, club or season…" value=${q} onChange=${e=>setQ(e.target.value)}/></div>
    <div className="mlist" style=${{maxHeight:'44vh'}}>${list.map(r=>html`<div key=${r.id} className="mrow" onClick=${()=>openEdit(r)}>
      <${RBadge} v=${r.overall} size=${34}/>
      <div style=${{minWidth:0}}><div className="pname">${r.name}</div><div className="pmeta">${(tab==='players'?(r.primary+((r.secondaries&&r.secondaries.length)?(' · '+r.secondaries.join(' ')):'')+' · '+(r.club||'—')):(r.club||'—'))+(r.season?(' · '+r.season):'')}</div></div>
      <button className="btn ghost tiny" onClick=${e=>{e.stopPropagation();dupRecord(r);}}>Duplicate</button><div className="chev">›</div>
    </div>`)}${!list.length&&html`<div className="empty">Nothing matches that search.</div>`}</div>
    <div style=${{marginTop:16,borderTop:'1px solid var(--line)',paddingTop:16}}><div className="eyebrow" style=${{marginBottom:10}}>Backup & transfer</div>
      <div className="row" style=${{flexWrap:'wrap'}}>
        <button className="btn sm" onClick=${backupJSON}>Back up (.json)</button>
        <button className="btn ghost sm" onClick=${()=>jsonRef.current&&jsonRef.current.click()}>Load backup</button>
        <button className="btn ghost sm" onClick=${exportCSV}>Export CSV</button>
        <button className="btn ghost sm" onClick=${()=>csvRef.current&&csvRef.current.click()}>Import CSV</button>
        <button className="btn ghost sm" onClick=${openText}>Backup as text</button>
        <button className="btn ghost sm" onClick=${restoreDefault}>Restore default</button>
      </div>
      <input ref=${jsonRef} type="file" accept=".json,application/json,text/plain,.txt,.csv" style=${{display:'none'}} onChange=${loadJSONFile}/>
      <input ref=${csvRef} type="file" accept=".csv,text/csv,text/plain" style=${{display:'none'}} onChange=${importCSVFile}/>
      <p className="muted" style=${{fontSize:12,marginTop:10,lineHeight:1.5}}>The .json backup now downloads with the correct file type, so it reloads cleanly on phones too. "Load backup" also accepts an older backup even if the phone saved it with a .csv ending. "Backup as text" lets you copy/paste the whole database if downloads are blocked.</p>
    </div>
    ${edit&&html`<${EditRecord} rec0=${edit} onSave=${saveRec} onDelete=${deleteRec} onDup=${dupRecord} onClose=${()=>setEdit(null)}/>`}
    ${textOpen&&html`<div className="modal" onClick=${()=>setTextOpen(false)}><div className="panel modalbox" onClick=${e=>e.stopPropagation()}>
      <div className="spread"><h2 className="head" style=${{fontSize:20}}>Database as text</h2><button className="btn ghost sm" onClick=${()=>setTextOpen(false)}>Close</button></div>
      <p className="muted" style=${{fontSize:12,margin:'8px 0'}}>Copy this to keep a backup, or paste a backup over it and press Restore.</p>
      <textarea className="fld" style=${{minHeight:'40vh'}} value=${textVal} onChange=${e=>setTextVal(e.target.value)}></textarea>
      <div className="row" style=${{marginTop:12}}><button className="btn gold sm" onClick=${restoreText}>Restore from text</button><button className="btn ghost sm" onClick=${()=>{try{navigator.clipboard&&navigator.clipboard.writeText(textVal);notify('Copied to clipboard.',true);}catch(e){}}}>Copy</button></div>
    </div></div>`}
  </div></div>`;
}

function App(){
  const [state,dispatch]=useReducer(reducer,null,()=>{const saved=loadState();if(saved&&saved.phase&&saved.catalogue&&Array.isArray(saved.catalogue.players))return saved;return setupState(loadCatalogue(),{1:'Player 1',2:'Player 2'});});
  const [editor,setEditor]=useState(false);const [toast,setToast]=useState(null);
  const notify=(msg,ok)=>setToast({msg,ok:!!ok});
  useEffect(()=>{saveState(state);},[state]);
  useEffect(()=>{if(!toast)return;const t=setTimeout(()=>setToast(null),3200);return ()=>clearTimeout(t);},[toast]);
  useEffect(()=>{if(state._err)notify(state._err,false);},[state._err]);
  return html`<div>
    <${TopBar} state=${state} onEditor=${()=>setEditor(true)} onReset=${()=>{if(confirm('Start a new game? Your current draft is cleared (your database is kept).'))dispatch({type:'BACK_TO_SETUP'});}}/>
    ${state.phase==='setup'&&html`<${SetupScreen} state=${state} dispatch=${dispatch} onEditor=${()=>setEditor(true)}/>`}
    ${state.phase==='draft'&&html`<${DraftScreen} state=${state} dispatch=${dispatch}/>`}
    ${state.phase==='final'&&html`<${FinalScreen} state=${state} dispatch=${dispatch} onEditor=${()=>setEditor(true)}/>`}
    ${editor&&html`<${Editor} state=${state} dispatch=${dispatch} notify=${notify} onClose=${()=>setEditor(false)}/>`}
    ${toast&&html`<div className=${'toast'+(toast.ok?' ok':'')}>${toast.msg}</div>`}
  </div>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>

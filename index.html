        <div class="grid3">${ag.big.map((m,i)=>{const hm=teamMeta[m.homeTeamId]||{},am=teamMeta[m.awayTeamId]||{};
          return html`<div key=${i} class="panel" style=${{padding:'13px',background:'rgba(0,0,0,.18)'}}>
            <div class="spread"><span class="pname" style=${{fontSize:'13px'}}>${hm.name}</span><span style=${{fontFamily:'var(--display)',fontSize:'22px'}}>${m.homeGoals}–${m.awayGoals}</span><span class="pname" style=${{fontSize:'13px',textAlign:'right'}}>${am.name}</span></div>
            <div class="smallcap" style=${{textAlign:'center',marginTop:'8px',fontSize:'10.5px'}}>xG ${m.homeXg}–${m.awayXg} · Poss ${m.homePoss}–${100-m.homePoss}% · Shots ${m.homeShots}–${m.awayShots}</div>
          </div>`;})}</div>
      </div></div>`:''}
    ${tab==='teams'?html`<div class="grid3">${[...state.table].map(r=>{const m=teamMeta[r.teamId]||{};return html`<div key=${r.teamId} class="panel" onClick=${()=>setTeam(r.teamId)} style=${{padding:'15px',cursor:'pointer'}}>
        <div class="spread"><span class="kit-pill ${m.owner===1?'p1':'p2'}">${m.owner===1?(state.p1Name||'P1'):(state.p2Name||'P2')}</span><span class="smallcap">${m.formation}</span></div>
        <div style=${{fontFamily:'var(--display)',fontSize:'20px',margin:'8px 0 4px'}}>${m.name}</div>
        <div class="spread"><span class="smallcap">#${r.position} · ${r.won}-${r.drawn}-${r.lost}</span><span style=${{fontFamily:'var(--mono)',fontWeight:700,color:'var(--gold)'}}>${r.pts} pts</span></div>
      </div>`;})}</div>`:''}
    <div class="row" style=${{justifyContent:'center',marginTop:'26px'}}>
      <button class="btn ghost" onClick=${()=>{if(confirm('Start a new draft?'))dispatch({type:'RESET'});}}>New draft</button></div>
    ${team?html`<${TeamView} state=${state} teamId=${team} onClose=${()=>setTeam(null)}/>`:''}
  </div>`;}

function ResultsScreen({state,dispatch}){
  if(!state.results)return null;
  if(state.simDay<38)return html`<${SimProgress} state=${state} dispatch=${dispatch}/>`;
  return html`<${FinalResults} state=${state} dispatch=${dispatch}/>`;
}

/* ---------------- Editor (catalogue + CSV) ---------------- */
function putRecord(cat,rec){const key=rec.kind==='manager'?'managers':'players';const arr=cat[key].slice();const i=arr.findIndex(x=>x.id===rec.id);if(i>=0)arr[i]=rec;else arr.push(rec);return {...cat,[key]:arr};}
function delRecord(cat,rec){const key=rec.kind==='manager'?'managers':'players';return {...cat,[key]:cat[key].filter(x=>x.id!==rec.id)};}
function emptyPlayer(){const o={id:newId('p'),kind:'player',name:'New Player',club:'',season:'',primary:'CM',secondaries:[],line:'MID',nationality:'',overall:70,value:5};OUT_K.forEach(k=>o[k]=60);return o;}
function emptyManager(){const o={id:newId('m'),kind:'manager',name:'New Manager',club:'',season:'',overall:70,value:5};MGR_K.forEach(k=>o[k]=60);return o;}

function EditRecord({rec,onSave,onDelete,onClose}){
  const [d,setD]=useState(()=>({...rec,secondaries:(rec.secondaries||[]).slice()}));
  const isM=rec.kind==='manager';
  const set=(k,v)=>setD(s=>({...s,[k]:v}));
  const setN=(k,v)=>setD(s=>({...s,[k]:clampA(+v||0)}));
  const attrs=isM?MGR_ATTRS:((d.primary==='GK'||d.reflexes!=null)?[...TECH,...MENT,...PHYS,...GKA]:[...TECH,...MENT,...PHYS]);
  function save(){const out={...d};out.overall=clampA(+d.overall||1);out.value=Math.max(1,Math.round(+d.value||1));
    if(!isM){out.line=POS_LINE[out.primary]||'MID';out.secondaries=(d.secondaries||[]).filter(p=>POS_LINE[p]&&p!==out.primary);}onSave(out);}
  return html`<div class="modal" onClick=${onClose}><div class="panel modalbox" onClick=${e=>e.stopPropagation()}>
    <div class="spread"><h2 class="head" style=${{fontSize:'24px'}}>Edit ${isM?'manager':'player'}</h2><button class="btn ghost sm" onClick=${onClose}>✕</button></div>
    <div class="grid3" style=${{marginTop:'14px'}}>
      <div><label class="lbl">Name</label><input class="fld" value=${d.name} onInput=${e=>set('name',e.target.value)}/></div>
      <div><label class="lbl">Club</label><input class="fld" value=${d.club} onInput=${e=>set('club',e.target.value)}/></div>
      <div><label class="lbl">Season</label><input class="fld" value=${d.season} onInput=${e=>set('season',e.target.value)}/></div>
    </div>
    <div class="grid3" style=${{marginTop:'12px'}}>
      <div><label class="lbl">Overall</label><input class="fld" type="number" value=${d.overall} onInput=${e=>set('overall',e.target.value)}/></div>
      <div><label class="lbl">Value (£m)</label><input class="fld" type="number" value=${d.value} onInput=${e=>set('value',e.target.value)}/></div>
      ${!isM?html`<div><label class="lbl">Primary</label><select class="fld" value=${d.primary} onChange=${e=>set('primary',e.target.value)}>${Object.keys(POS_LINE).map(p=>html`<option key=${p} value=${p}>${p}</option>`)}</select></div>`:html`<div></div>`}
    </div>
    ${!isM?html`<div style=${{marginTop:'12px'}}><label class="lbl">Other positions (space-separated)</label><input class="fld" value=${(d.secondaries||[]).join(' ')} onInput=${e=>set('secondaries',e.target.value.toUpperCase().split(/[ ,]+/).filter(Boolean))}/></div>`:''}
    <div class="attsec" style=${{marginTop:'16px'}}><h5>Attributes</h5>
      <div class="attgrid">${attrs.map(([k,lab])=>html`<div class="att" key=${k}><label>${lab}</label><input type="number" value=${d[k]==null?60:d[k]} onInput=${e=>setN(k,e.target.value)}/></div>`)}</div></div>
    <div class="row" style=${{marginTop:'18px',justifyContent:'space-between'}}>
      <button class="btn danger" onClick=${()=>{if(confirm('Delete this record permanently?'))onDelete(rec);}}>Delete</button>
      <button class="btn p1" onClick=${save}>Save changes</button></div>
  </div></div>`;}

function Editor({state,dispatch}){
  const cat=state.catalogue;
  const [tab,setTab]=useState('players');const [q,setQ]=useState('');const [edit,setEdit]=useState(null);
  const list=(tab==='players'?cat.players:cat.managers).filter(c=>{if(!q.trim())return true;const s=q.toLowerCase();return c.name.toLowerCase().includes(s)||(c.club||'').toLowerCase().includes(s)||(c.season||'').includes(s);});
  const save=rec=>{dispatch({type:'SET_CATALOGUE',cat:putRecord(cat,rec)});setEdit(null);};
  const del=rec=>{dispatch({type:'SET_CATALOGUE',cat:delRecord(cat,rec)});setEdit(null);};
  const importFile=(kind,file)=>{if(!file)return;const rd=new FileReader();rd.onload=()=>{try{const recs=kind==='players'?importPlayersCSV(rd.result):importManagersCSV(rd.result);if(!recs.length)throw 0;dispatch({type:'SET_CATALOGUE',cat:{...cat,[kind]:recs}});}catch(e){dispatch({type:'ERR',msg:'Import failed — check the CSV columns'});}};rd.readAsText(file);};
  return html`<div class="panel" style=${{padding:'22px'}}>
    <div class="spread"><div><div class="eyebrow">Data studio</div><h2 class="head">Edit players & managers</h2></div>
      <button class="btn ghost sm" onClick=${()=>dispatch({type:'GO',screen:'setup'})}>← Done</button></div>
    <div class="row" style=${{flexWrap:'wrap',gap:'8px',marginTop:'14px'}}>
      <button class="btn ghost sm" onClick=${()=>download('players.csv',exportPlayersCSV(cat))}>Export players</button>
      <button class="btn ghost sm" onClick=${()=>download('managers.csv',exportManagersCSV(cat))}>Export managers</button>
      <button class="btn p2 sm" onClick=${()=>download('draft-zone-database.json',JSON.stringify(cat,null,2))}>⬇ Back up database</button>
      <label class="btn p2 sm" style=${{display:'inline-flex',alignItems:'center'}}>⬆ Load database<input type="file" accept=".json,application/json" style=${{display:'none'}} onChange=${e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const c=JSON.parse(rd.result);if(!c||!Array.isArray(c.players)||!Array.isArray(c.managers)||!c.players.length)throw 0;if(!c.config)c.config={budget:10000,startEachTeamSuggested:1000};dispatch({type:'SET_CATALOGUE',cat:c});}catch(err){dispatch({type:'ERR',msg:'Could not read that database file — expected a Draft Zone JSON backup'});}};rd.readAsText(f);e.target.value='';}}/></label>
      <label class="btn ghost sm" style=${{display:'inline-flex',alignItems:'center'}}>Import players<input type="file" accept=".csv" style=${{display:'none'}} onChange=${e=>{importFile('players',e.target.files[0]);e.target.value='';}}/></label>
      <label class="btn ghost sm" style=${{display:'inline-flex',alignItems:'center'}}>Import managers<input type="file" accept=".csv" style=${{display:'none'}} onChange=${e=>{importFile('managers',e.target.files[0]);e.target.value='';}}/></label>
      <button class="btn danger sm" onClick=${()=>{if(confirm('Reset all data to the built-in legends?'))dispatch({type:'SET_CATALOGUE',cat:JSON.parse(JSON.stringify(DEFAULT_DATA))});}}>Reset to default</button>
    </div>
    <div class="row" style=${{justifyContent:'space-between',marginTop:'16px',gap:'10px'}}>
      <div class="seg">${[['players','Players'],['managers','Managers']].map(([k,l])=>html`<button key=${k} class=${tab===k?'on':''} onClick=${()=>{setTab(k);setQ('');}}>${l} · ${cat[k].length}</button>`)}</div>
      <input class="fld" style=${{maxWidth:'260px'}} placeholder="Search…" value=${q} onInput=${e=>setQ(e.target.value)}/>
      <button class="btn p1 sm" onClick=${()=>setEdit(tab==='players'?emptyPlayer():emptyManager())}>+ Add</button>
    </div>
    <div style=${{marginTop:'14px',maxHeight:'58vh',overflow:'auto'}}>
      ${list.length===0?html`<div class="empty">No matches.</div>`:list.slice(0,500).map(c=>html`<div class="prow" key=${c.id} onClick=${()=>setEdit(c)}>
        <${RBadge} v=${c.overall} size=${36}/>
        <div style=${{minWidth:0}}><div class="pname">${c.name}${c.kind==='player'?html`<span class="smallcap" style=${{marginLeft:'6px'}}>${c.primary}</span>`:''}</div><div class="pmeta">${c.club} · ${c.season}</div></div>
        <div class="mval">${fmtM(c.value)}</div><span class="chev">›</span></div>`)}
    </div>
    ${edit?html`<${EditRecord} rec=${edit} onSave=${save} onDelete=${del} onClose=${()=>setEdit(null)}/>`:''}
  </div>`;}

/* ---------------- Toast + App ---------------- */
function Toast({msg,dispatch}){useEffect(()=>{const t=setTimeout(()=>dispatch({type:'CLR_ERR'}),3400);return ()=>clearTimeout(t);},[msg]);
  return html`<div class="toast" onClick=${()=>dispatch({type:'CLR_ERR'})}>${msg}</div>`;}

function App(){
  const [state,dispatch]=useReducer(reducer,null,()=>{const s=loadState();return s||freshState(baseCatalogue());});
  useEffect(()=>{saveState(state);},[state]);
  return html`<div>
    <${TopBar} state=${state} dispatch=${dispatch}/>
    <div class="wrap" style=${{paddingTop:'22px'}}>
      ${state.screen==='setup'?html`<${SetupScreen} state=${state} dispatch=${dispatch}/>`:''}
      ${state.screen==='build'?html`<${BuildScreen} state=${state} dispatch=${dispatch}/>`:''}
      ${state.screen==='sim'?html`<${ResultsScreen} state=${state} dispatch=${dispatch}/>`:''}
      ${state.screen==='editor'?html`<${Editor} state=${state} dispatch=${dispatch}/>`:''}
    </div>
    ${state.error?html`<${Toast} msg=${state.error} dispatch=${dispatch}/>`:''}
  </div>`;}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>

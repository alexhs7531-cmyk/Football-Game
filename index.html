<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draft Zone League</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --pitch-0:#08251C;--pitch-1:#0E3728;--pitch-2:#15543F;--pitch-3:#1C6B4F;
    --chalk:#EAF3EE;--chalk-dim:#93AEA2;--line:rgba(234,243,238,.16);--line-strong:rgba(234,243,238,.34);
    --p1:#FFB23E;--p2:#39B7F0;--pos:#5BE08A;--neg:#FF7A7A;--gold:#F4C95D;
    --display:'Anton',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 50% -10%,#14503B 0%,var(--pitch-0) 60%),var(--pitch-0);color:var(--chalk);font-family:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--body);cursor:pointer;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--pitch-2);border-radius:8px;}::-webkit-scrollbar-track{background:transparent;}
  .wrap{max-width:1320px;margin:0 auto;padding:0 20px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(8,37,28,.96),rgba(8,37,28,.78));backdrop-filter:blur(6px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:14px;}
  .crest{width:38px;height:38px;border-radius:9px;background:repeating-linear-gradient(90deg,var(--p1) 0 6px,#0E3728 6px 12px);border:2px solid var(--chalk);}
  .brand h1{font-family:var(--display);font-size:22px;letter-spacing:.06em;margin:0;line-height:1;text-transform:uppercase;}
  .brand .sub{font-size:11px;color:var(--chalk-dim);letter-spacing:.18em;text-transform:uppercase;}
  .scorechips{display:flex;gap:10px;align-items:center;}
  .chip{display:flex;flex-direction:column;align-items:center;min-width:84px;padding:6px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.18);}
  .chip .nm{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip .pts{font-family:var(--display);font-size:24px;line-height:1;}
  .chip.p1{box-shadow:inset 0 -3px 0 var(--p1);}.chip.p1 .pts{color:var(--p1);}
  .chip.p2{box-shadow:inset 0 -3px 0 var(--p2);}.chip.p2 .pts{color:var(--p2);}
  .panel{background:linear-gradient(180deg,var(--pitch-1),#0B2C21);border:1px solid var(--line);border-radius:16px;}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  h2.head{font-family:var(--display);text-transform:uppercase;letter-spacing:.04em;font-size:30px;margin:6px 0 0;}
  .btn{border:none;border-radius:11px;padding:13px 22px;font-weight:700;font-size:15px;letter-spacing:.02em;background:var(--chalk);color:#0A2A20;transition:transform .06s,filter .15s;}
  .btn:hover{filter:brightness(1.06);}.btn:active{transform:translateY(1px);}.btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.sm{padding:8px 14px;font-size:13px;}
  .btn.ghost{background:transparent;color:var(--chalk);border:1px solid var(--line-strong);}
  .btn.p1{background:var(--p1);color:#2A1700;}.btn.p2{background:var(--p2);color:#04263A;}
  .btn.danger{background:transparent;color:var(--neg);border:1px solid rgba(255,122,122,.5);}
  input.fld,select.fld{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:11px;padding:12px 13px;font-size:15px;font-family:var(--body);}
  input.fld:focus,select.fld:focus{outline:none;border-color:var(--gold);}
  select.fld option{background:#0B2C21;}
  label.lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:7px;}
  .muted{color:var(--chalk-dim);}
  .center{min-height:72vh;display:flex;align-items:center;justify-content:center;}
  .card{width:100%;max-width:560px;padding:34px;}
  .kit-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
  .kit-pill.p1{background:rgba(255,178,62,.14);color:var(--p1);border:1px solid rgba(255,178,62,.4);}
  .kit-pill.p2{background:rgba(57,183,240,.14);color:var(--p2);border:1px solid rgba(57,183,240,.4);}
  .draftgrid{display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:20px;align-items:start;margin-top:18px;}
  @media(max-width:980px){.draftgrid{grid-template-columns:1fr;}}
  .clock{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px;border-radius:14px;margin-bottom:16px;border:1px solid var(--line-strong);}
  .clock.p1{background:linear-gradient(90deg,rgba(255,178,62,.18),rgba(255,178,62,.03));box-shadow:inset 4px 0 0 var(--p1);}
  .clock.p2{background:linear-gradient(90deg,rgba(57,183,240,.18),rgba(57,183,240,.03));box-shadow:inset 4px 0 0 var(--p2);}
  .clock .who{font-family:var(--display);font-size:24px;letter-spacing:.03em;text-transform:uppercase;}
  .clock .meta{font-size:12px;color:var(--chalk-dim);letter-spacing:.08em;text-transform:uppercase;}
  .reels{display:flex;gap:12px;justify-content:center;margin:10px 0 6px;}
  .reel{flex:1;max-width:260px;background:#06201A;border:1px solid var(--line-strong);border-radius:13px;padding:16px;text-align:center;overflow:hidden;}
  .reel .cap{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--chalk-dim);}
  .reel .val{font-family:var(--display);font-size:25px;line-height:1.05;margin-top:6px;letter-spacing:.02em;min-height:34px;}
  .reel.season .val{font-family:var(--mono);font-size:23px;color:var(--gold);}
  .reel.spinning .val{filter:blur(1px);opacity:.85;}
  .spinbtn{display:block;width:100%;border:none;border-radius:13px;padding:18px;font-family:var(--display);font-size:24px;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(180deg,var(--gold),#D9A52E);color:#2A1C00;}
  .spinbtn:active{transform:translateY(1px);}
  .clubpool{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .poolhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,0,0,.2);}
  .poolhdr b{font-size:15px;}.poolhdr .ss{font-family:var(--mono);color:var(--gold);}
  .poolist{max-height:330px;overflow:auto;}
  .prow{display:grid;grid-template-columns:42px 1fr auto auto;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
  .prow:hover{background:rgba(255,255,255,.05);}.prow:last-child{border-bottom:none;}
  .ovr{font-family:var(--mono);font-weight:700;font-size:15px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:var(--pitch-2);}
  .ovr.hi{background:#1E7A57;color:#EAFBF2;}.ovr.lo{background:#3a2f1a;color:#e8d7a8;}
  .pname{font-weight:600;font-size:15px;line-height:1.15;}.pmeta{font-size:11.5px;color:var(--chalk-dim);}
  .info{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--chalk-dim);width:28px;height:28px;border-radius:7px;font-weight:700;}
  .pickbtn{background:var(--chalk);color:#0A2A20;border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;}
  .empty{padding:24px;text-align:center;color:var(--chalk-dim);}
  .pitch{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:3/4;background:repeating-linear-gradient(0deg,#16573F 0 12.5%,#13503A 12.5% 25%);border:1px solid var(--line);}
  .pitch .mk{position:absolute;border:2px solid var(--line-strong);}
  .pitch .halfway{left:8%;right:8%;top:50%;height:0;border-top:2px solid var(--line-strong);}
  .pitch .circle{left:50%;top:50%;width:26%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;}
  .pitch .boxTop{left:26%;right:26%;top:0;height:15%;}.pitch .boxBot{left:26%;right:26%;bottom:0;height:15%;}
  .slot{position:absolute;transform:translate(-50%,-50%);width:74px;text-align:center;cursor:pointer;}
  .slot:hover .shirt{filter:brightness(1.12);}
  .shirt{width:48px;height:48px;margin:0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:16px;color:#06231A;border:2px solid rgba(255,255,255,.55);position:relative;}
  .shirt.empty{background:transparent;border:2px dashed var(--line-strong);color:var(--chalk-dim);font-family:var(--body);font-size:11px;font-weight:700;}
  .shirt.p1{background:linear-gradient(160deg,#FFC862,#F39B17);}.shirt.p2{background:linear-gradient(160deg,#6FD0FF,#1E9FE0);color:#04263A;}
  .slot .nm{font-size:11px;margin-top:4px;line-height:1.1;color:var(--chalk);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;font-weight:600;}
  .slot .cl{font-size:9px;color:var(--chalk-dim);display:block;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poslab{position:absolute;top:-6px;left:-6px;background:#06231A;border:1px solid var(--line-strong);color:var(--gold);font-family:var(--mono);font-size:9px;font-weight:700;border-radius:5px;padding:1px 4px;}
  .mgrslot{display:flex;align-items:center;gap:12px;margin-top:12px;padding:11px 14px;border-radius:12px;border:1px dashed var(--line-strong);}
  .mgrslot.filled{border-style:solid;}
  .opp{margin-top:16px;padding:14px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.14);}
  .opp h4{margin:0 0 8px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .progbars{display:flex;gap:6px;}.pb{flex:1;height:6px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;}.pb i{display:block;height:100%;}
  table.league{width:100%;border-collapse:collapse;font-size:14px;}
  table.league th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);text-align:right;padding:10px 8px;border-bottom:1px solid var(--line-strong);font-weight:700;}
  table.league th.l,table.league td.l{text-align:left;}
  table.league td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono);}
  table.league td.team{font-family:var(--body);font-weight:600;cursor:pointer;}
  table.league td.team:hover{color:var(--gold);}
  table.league tr.r1{background:linear-gradient(90deg,rgba(255,178,62,.12),transparent);}
  table.league tr.r2{background:linear-gradient(90deg,rgba(57,183,240,.12),transparent);}
  table.league tr.click{cursor:pointer;}table.league tr.click:hover td{background:rgba(255,255,255,.04);}
  .pos{display:inline-block;width:22px;color:var(--chalk-dim);}
  .ownerbar{display:inline-block;width:4px;height:16px;border-radius:2px;margin-right:9px;vertical-align:-3px;}
  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin:8px 0 24px;}
  .bigscore{font-family:var(--display);font-size:84px;line-height:.9;}
  .winnerbanner{text-align:center;padding:22px;border-radius:16px;margin-bottom:22px;border:1px solid var(--line-strong);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}.bigscore{font-size:60px;}}
  .teamline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .teamline .p{font-family:var(--mono);font-weight:700;}.teamline.click{cursor:pointer;}.teamline.click:hover{color:var(--gold);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#3a1414;border:1px solid #FF7A7A;color:#ffd9d9;padding:12px 18px;border-radius:11px;font-size:14px;z-index:80;}
  .row{display:flex;gap:12px;align-items:center;}.spread{display:flex;justify-content:space-between;align-items:center;}
  .stat{font-family:var(--mono);}.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .smallcap{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .seg{display:flex;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
  .seg button{background:transparent;border:none;color:var(--chalk-dim);padding:9px 13px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
  .seg button.on{background:var(--pitch-2);color:var(--chalk);}
  .modal{position:fixed;inset:0;background:rgba(3,16,12,.74);z-index:70;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modalbox{max-width:820px;width:100%;max-height:92vh;overflow:auto;padding:22px;}
  .xline{display:grid;grid-template-columns:34px 1fr auto auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer;}
  .xline:hover{color:var(--gold);}
  .bar{display:grid;grid-template-columns:120px 1fr 34px;gap:10px;align-items:center;margin:6px 0;font-size:13px;}
  .bar .track{height:8px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden;}
  .bar .fill{height:100%;border-radius:5px;}
  .bar .v{font-family:var(--mono);text-align:right;font-weight:700;}
  .traitchip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(244,201,93,.4);background:rgba(244,201,93,.1);border-radius:999px;padding:4px 10px;margin:3px 4px 0 0;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chiptoggle{font-size:12px;font-weight:600;border:1px solid var(--line-strong);background:transparent;color:var(--chalk-dim);border-radius:999px;padding:6px 11px;}
  .chiptoggle.on{background:var(--gold);color:#2A1C00;border-color:var(--gold);}
  .attgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  @media(max-width:620px){.attgrid{grid-template-columns:repeat(2,1fr);}}
  .att label{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:3px;}
  .att input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:9px;padding:8px;font-family:var(--mono);font-size:14px;}
  .cvrow{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .cvrow .nm{font-weight:600;}.cvrow .meta{font-size:12px;color:var(--chalk-dim);}
  code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px;}

  /* ============================================================
     REDESIGN — rating badge, market, profile, controls (added)
     ============================================================ */
  .rbadge{display:inline-flex;align-items:center;justify-content:center;border-radius:9px;font-family:var(--mono);font-weight:700;line-height:1;padding:0 5px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);}

  .potchip{display:flex;flex-direction:column;align-items:flex-end;min-width:96px;padding:7px 13px;border-radius:11px;border:1px solid var(--line);background:rgba(0,0,0,.2);}
  .potchip .cap{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--chalk-dim);white-space:nowrap;}
  .potchip .v{font-family:var(--display);font-size:20px;line-height:1.05;margin-top:2px;}
  .potchip.p1{box-shadow:inset 0 -3px 0 var(--p1);}.potchip.p1 .v{color:var(--p1);}
  .potchip.p2{box-shadow:inset 0 -3px 0 var(--p2);}.potchip.p2 .v{color:var(--p2);}

  .alloc input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:6px;background:rgba(255,255,255,.14);outline:none;margin:2px 0;}
  .alloc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);border:3px solid #0B2C21;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.45);}
  .alloc input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--gold);border:3px solid #0B2C21;cursor:pointer;}
  .moneybar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px;padding:11px 15px;border-radius:12px;border:1px solid var(--line-strong);background:rgba(0,0,0,.24);}
  .moneybar .v{font-family:var(--mono);font-weight:700;}

  .posbtns{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 2px;}
  .posbtn{min-width:54px;padding:11px 13px;border-radius:11px;border:1px solid var(--line-strong);background:rgba(255,255,255,.04);color:var(--chalk);font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.04em;transition:transform .06s,background .12s,border-color .12s;}
  .posbtn:hover{background:rgba(255,255,255,.1);border-color:var(--gold);transform:translateY(-1px);}

  .mkt{display:flex;flex-direction:column;}
  .ctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .ctrls .s{flex:1 1 160px;min-width:140px;background:rgba(0,0,0,.3);border:1px solid var(--line-strong);color:var(--chalk);border-radius:10px;padding:10px 13px;font-size:14px;font-family:var(--body);}
  .ctrls .s::placeholder{color:var(--chalk-dim);}
  .ctrls .s:focus{outline:none;border-color:var(--gold);}
  .mlist{display:flex;flex-direction:column;gap:8px;max-height:56vh;overflow:auto;padding:2px 4px 2px 2px;}
  .mrow{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;gap:13px;align-items:center;padding:11px 13px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.025);cursor:pointer;transition:transform .07s,background .12s,border-color .12s;}
  .mrow:hover{background:rgba(255,255,255,.07);border-color:var(--line-strong);transform:translateX(2px);}
  .mrow.no{opacity:.5;}
  .mrow.no:hover{transform:none;background:rgba(255,255,255,.025);}
  .mrow .pname{font-weight:600;font-size:15px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mrow .pmeta{font-size:11.5px;color:var(--chalk-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mval{font-family:var(--mono);font-weight:700;font-size:15px;text-align:right;white-space:nowrap;}
  .chev{color:var(--chalk-dim);font-size:20px;line-height:1;width:14px;text-align:center;}
  .mrow:hover .chev{color:var(--gold);}

  .prof-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-bottom:16px;border-bottom:1px solid var(--line);}
  .prof-pos{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .poschip{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--chalk);background:rgba(255,255,255,.06);border:1px solid var(--line-strong);border-radius:7px;padding:4px 9px;}
  .poschip.first{background:var(--gold);color:#2a1c00;border-color:var(--gold);}
  .prof-r{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex-shrink:0;}
  .prof-val{font-family:var(--mono);font-weight:700;font-size:19px;color:var(--gold);}
  .rolegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:18px 0 4px;}
  .rolecard{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;padding:12px 13px;}
  .rolecard .rl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .rolecard .rv{font-family:var(--display);font-size:25px;line-height:1;margin:5px 0 9px;}
  .rolecard .rt{height:6px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;}
  .rolecard .rt i{display:block;height:100%;border-radius:4px;}
  .attwrap2{display:grid;grid-template-columns:repeat(auto-fit,minmax(236px,1fr));gap:0 30px;margin-top:6px;}
  .attgroup{margin-top:4px;}
  .attgroup h5{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:16px 0 9px;font-weight:700;}
  .attbar{display:grid;grid-template-columns:104px 1fr 26px;gap:10px;align-items:center;margin:8px 0;font-size:12.5px;}

function buildFormation(name,rows){const slots=[];const n=rows.length;let oi=0;
  rows.forEach((row,ri)=>{const y=ri===0?91:Math.round(77-(ri-1)*((77-14)/(n-2)));const k=row.length;
    row.forEach((pos,ci)=>{const x=k===1?50:Math.round(15+ci*(70/(k-1)));const id=ri===0?'GK':('o'+(++oi));
      slots.push({id,pos,x,y,line:POS_LINE[pos]});});});
  const counts={GK:0,DEF:0,MID:0,FWD:0};slots.forEach(s=>counts[s.line]++);return{name,slots,counts};}
const FORMATIONS={};Object.keys(FORMATION_ROWS).forEach(n=>FORMATIONS[n]=buildFormation(n,FORMATION_ROWS[n]));

function fSlotsOf(formation){return (FORMATIONS[formation]||FORMATIONS['4-3-3']).slots;}
function fSlots(team){return fSlotsOf(team.formation);}
function teamSlotIds(team){return ['MANAGER',...fSlots(team).map(s=>s.id)];}
function eligPos(card){return [card.primary,...(card.secondaries||[])];}

function colorForRating(v){
  v=Math.max(1,Math.min(99,Math.round(v||0)));
  let bg,fg='#06231A';
  if(v>=96){const t=(v-96)/3;bg=mix('#7A3BB0','#4A1480',t);fg='#fff';}
  else if(v>=92){bg='#15803D';fg='#EAFBF2';}
  else if(v>=88){bg='#2E9E4F';fg='#EAFBF2';}
  else if(v>=84){bg='#54C273';}
  else if(v>=80){bg='#8FCB52';}
  else if(v>=76){bg='#D7D24A';fg='#2A2400';}
  else if(v>=71){bg='#E6A93C';fg='#2A1C00';}
  else if(v>=64){bg='#E27A3A';fg='#2A1300';}
  else{bg='#D44A4A';fg='#fff';}
  return {bg,fg};
}
function mix(a,b,t){const pa=hx(a),pb=hx(b);const r=Math.round(pa[0]+(pb[0]-pa[0])*t),g=Math.round(pa[1]+(pb[1]-pa[1])*t),bl=Math.round(pa[2]+(pb[2]-pa[2])*t);return `rgb(${r},${g},${bl})`;}
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function ratingStyle(v){const c=colorForRating(v);return {background:c.bg,color:c.fg};}

/* ---------- RNG + poisson ---------- */
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function hashSeed(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function makeRng(seed){const n=mulberry32(typeof seed==='string'?hashSeed(seed):seed);return{
  float:()=>n(),int:(lo,hi)=>Math.floor(n()*(hi-lo+1))+lo,
  poisson:(l)=>{if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=n();}while(p>L);return k-1;},
  weighted:(w)=>{const t=w.reduce((a,b)=>a+b,0);if(t<=0)return 0;let r=n()*t;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}return w.length-1;}};}

/* ============================================================================
   DEEP SIMULATION ENGINE — Football-Manager-26-style match model.
   Every player attribute AND manager attribute feeds a rich set of team
   metrics (attack, creativity, control/possession, defence, pressing,
   transition, width, aerial, set-pieces, physical, stamina, discipline,
   mentality, finishing, chemistry). A match plays out over six 15-minute
   phases with momentum, fatigue, home crowd and game-state (chasing/managing
   a lead) effects, resolving open play, set pieces, counters and rare
   penalties into shots, shots-on-target, xG and attributed goals/assists.
   Attack & creation use mean/max blends so a single superstar lifts the side.
   ========================================================================== */
const W_DEF={tackling:4.5,marking:4.5,positioning:3,heading:0.7,anticipation:0.5,concentration:0.4};
const W_ATT={finishing:3.6,offTheBall:3,composure:2.4,anticipation:2,dribbling:1.6,technique:1.6,firstTouch:2,flair:1.5,longShots:1.4,heading:1.4,acceleration:1.6,pace:1.6,balance:1,agility:1.1};
const W_CRE={vision:3,passing:3,technique:2.6,decisions:2,flair:2,composure:1.6,offTheBall:1.6,crossing:1.5,firstTouch:2,dribbling:1.6,anticipation:1.4};
const W_CON={passing:3,vision:2,technique:2.4,composure:2,decisions:2,teamwork:2,workRate:2,stamina:1.6,firstTouch:2,anticipation:1.5,tackling:1.4,positioning:1.4};
const W_GK={reflexes:3,handling:3,oneOnOnes:2.6,commandOfArea:2.2,aerialReach:2,kicking:1.4,positioning:2,concentration:2,anticipation:1.8,communication:1.4,composure:1.6,agility:1.6,throwing:1};
const W_PRESS={workRate:3,stamina:2.4,aggression:2,anticipation:2.2,teamwork:2,acceleration:1.6,determination:1.4,pace:1.2,naturalFitness:1.2};
const W_TRANS={pace:3,acceleration:3,dribbling:1.8,offTheBall:1.8,anticipation:1.4,balance:1.2,technique:1.2};
const W_AERA={jumpingReach:3,heading:3,strength:2,bravery:1.4,anticipation:1.2};
const W_TEMPO={passing:2.4,vision:2,technique:2,firstTouch:2,decisions:1.6,composure:1.4,flair:1.2};
const W_SETT={corners:2.6,freeKick:2.6,crossing:2.4,technique:1.8,vision:1.4,passing:1.2};
const W_PHYS={strength:3,stamina:2,balance:1.6,naturalFitness:1.6,aggression:1.2,jumpingReach:1.2};

function pScore(p,W){let s=0,t=0;for(const a in W){if(p[a]!=null){s+=p[a]*W[a];t+=W[a];}}return t?s/t:50;}
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const mx=a=>a.length?Math.max.apply(null,a):0;
const mn=a=>a.length?Math.min.apply(null,a):0;
function blend(arr,wMean,wMax){if(!arr.length)return 48;return avg(arr)*wMean+mx(arr)*wMax;}
function topN(arr,n){return arr.slice().sort((x,y)=>y-x).slice(0,n);}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}

/* tuning */
const BASE_OPEN=1.66, QEXP=2.25, HOME_ADV=1.11, POSS_INF=0.40, BIGM=83, SEC_PEN=0.93, PHASES=6;
const SET_BASE=0.40, COUNTER_BASE=0.28, CONV_OPEN=0.122, CONV_SET=0.103, CONV_CTR=0.150, REF=72;

function chemistryOf(P){const m={};let best=0;P.forEach(p=>{const k=(p.club||'')+'|'+(p.season||'');m[k]=(m[k]||0)+1;if(m[k]>best)best=m[k];});return clamp((best-1)/9,0,1);}

function buildProfile(team){
  const P=team.players;
  const adj=(p,v)=>p.inPrimaryPosition?v:v*SEC_PEN;
  const gks=P.filter(p=>p.line==='GK'),defs=P.filter(p=>p.line==='DEF'),mids=P.filter(p=>p.line==='MID'),fwds=P.filter(p=>p.line==='FWD');
  const out=[...defs,...mids,...fwds];
  const counts=formationCounts(team.formation);

  const defScore=defs.map(p=>adj(p,pScore(p,W_DEF)));
  const backline=defScore.length?(avg(defScore)*0.78+mn(defScore)*0.22):44;
  const gk=gks.length?pScore(gks[0],W_GK):44;
  const midCon=blend(mids.map(p=>adj(p,pScore(p,W_CON))),0.72,0.28);
  const midDef=avg(mids.map(p=>adj(p,pScore(p,W_DEF))))||44;
  const midCre=blend(mids.map(p=>adj(p,pScore(p,W_CRE))),0.62,0.38);
  const fwdAtt=blend(fwds.map(p=>adj(p,pScore(p,W_ATT))),0.5,0.5);
  const fwdCre=blend(fwds.map(p=>adj(p,pScore(p,W_CRE))),0.55,0.45);

  const cf=(c,b)=>Math.sqrt(Math.max(1,c)/b);
  const dF=cf(defs.length,4),mF=cf(mids.length,3),fF=cf(fwds.length,3);

  const allAtt=out.map(p=>adj(p,pScore(p,W_ATT)));
  let attack=(fwdAtt*0.7 + blend(allAtt,0.4,0.6)*0.3)*(0.62+0.38*fF);
  let creativity=(midCre*0.5 + fwdCre*0.3 + blend(out.map(p=>adj(p,pScore(p,W_CRE))),0.45,0.55)*0.2)*(0.7+0.3*mF);
  let control=midCon*(0.55+0.45*mF) + (avg(out.map(p=>adj(p,pScore(p,W_TEMPO))))||50)*0.18;
  let defence=(backline*0.60 + gk*0.26 + midDef*0.14)*(0.84+0.16*dF)*1.075;
  let pressing=(avg(out.map(p=>adj(p,pScore(p,W_PRESS))))||50);
  let transition=blend(fwds.concat(mids).map(p=>adj(p,pScore(p,W_TRANS))),0.5,0.5);
  const wideMen=out.filter(p=>['LB','RB','LM','RM','LW','RW'].includes(p.slotPos));
  let width=wideMen.length?avg(wideMen.map(p=>adj(p,(p.crossing||50)))):avg(out.map(p=>p.crossing||50))*0.9;
  let aerialAtt=avg(topN(out.map(p=>pScore(p,W_AERA)),3));
  let aerialDef=(avg(defs.map(p=>pScore(p,W_AERA)))||50)*0.7 + (gks.length?(gks[0].commandOfArea||60):55)*0.3;
  let setTake=mx(out.map(p=>pScore(p,W_SETT)));
  let setAtt=setTake*0.45 + aerialAtt*0.4 + mx(out.map(p=>p.finishing||40))*0.15;
  let setDef=aerialDef*0.7 + (gks.length?(gks[0].commandOfArea||60):55)*0.3;
  let physical=avg(out.map(p=>pScore(p,W_PHYS)))||60;
  let stamina=avg(P.map(p=>0.6*(p.stamina||70)+0.4*(p.naturalFitness||70)));
  let discipline=avg(out.map(p=>0.5*(99-(p.aggression||55))+0.3*(p.composure||60)+0.2*(p.decisions||60)));
  let mentality=avg(P.map(p=>0.4*(p.composure||60)+0.25*(p.concentration||60)+0.2*(p.determination||60)+0.15*(p.leadership||55)));
  let penalty=mx(out.map(p=>p.penalties||60));
  let finishing=blend(fwds.concat(mids).map(p=>adj(p,(p.finishing||45)*0.6+(p.composure||55)*0.4)),0.5,0.5);
  const chem=chemistryOf(P);

  const m=team.manager||{attacking:55,defending:55,tactical:55,motivating:55,manManagement:55,peopleManagement:55,levelOfDiscipline:55,discipline:55,mental:55,determination:55,adaptability:55,fitness:60,technical:55};
  const formBias=(counts.FWD-counts.DEF)/5;
  const mgrLean=(m.attacking-m.defending)/100;
  const fit=1-Math.min(0.55,Math.abs(formBias*1.7-mgrLean));
  const fitBonus=1+(m.tactical/100)*(fit-0.72)*0.22;
  const cohesion=0.88 + ((m.manManagement+m.peopleManagement+m.motivating)/300)*0.10 + (avg(P.map(p=>p.teamwork||55))/100)*0.06 + chem*0.06;
  const atkMod=(0.82+(m.attacking/100)*0.30+(m.tactical/100)*0.10+(m.motivating/100)*0.06)*fitBonus;
  const defMod=(0.82+(m.defending/100)*0.30+(m.tactical/100)*0.10+(m.levelOfDiscipline/100)*0.06)*fitBonus;

  attack*=atkMod*cohesion;
  creativity*=(0.9+(m.tactical/100)*0.2)*cohesion;
  control*=(0.9+(m.attacking/100)*0.16+(m.technical/100)*0.06)*(0.92+chem*0.08);
  defence*=defMod*cohesion;
  pressing*=(0.86+(m.motivating/100)*0.16+(m.tactical/100)*0.08);
  transition*=(0.9+(m.adaptability/100)*0.16);
  setAtt*=(0.92+(m.attacking/100)*0.1);
  setDef*=(0.92+(m.defending/100)*0.1);
  discipline=clampA(discipline*(0.9+(m.levelOfDiscipline/100)*0.18));
  mentality=mentality*0.7 + (m.mental*0.5+m.determination*0.3+m.motivating*0.2)*0.3;
  stamina=stamina*(0.92+(m.fitness/100)*0.12);

  return {attack,creativity,control,defence,pressing,transition,width,aerialAtt,aerialDef,setAtt,setDef,
    physical,stamina,discipline,mentality,penalty,finishing,gkRating:gk,chem,topAtt:fwdAtt,counts};
}

function makeWeights(team){
  const P=team.players, pool=P.filter(p=>p.line!=='GK');
  const lf=p=>p.line==='FWD'?1.0:p.line==='MID'?0.5:0.14;
  const lfSet=p=>p.line==='FWD'?1.0:p.line==='MID'?0.6:0.72;
  const lfCtr=p=>p.line==='FWD'?1.0:p.line==='MID'?0.55:0.08;
  const lfAst=p=>p.line==='FWD'?0.85:p.line==='MID'?1.0:0.32;
  return {pool,
    open: pool.map(p=>Math.max(1,((p.finishing||40)*1.6+(p.offTheBall||40)*1.0+(p.anticipation||40)*0.5+(p.longShots||30)*0.3)*lf(p))),
    setW: pool.map(p=>Math.max(1,((p.heading||40)*1.5+(p.jumpingReach||40)*0.8+(p.finishing||40)*0.7+(p.strength||40)*0.5)*lfSet(p))),
    ctr:  pool.map(p=>Math.max(1,((p.finishing||40)*1.4+(p.pace||50)*0.8+(p.offTheBall||40)*1.0+(p.acceleration||50)*0.5)*lfCtr(p))),
    ast:  pool.map(p=>Math.max(1,((p.vision||40)*1.3+(p.passing||40)*1.0+(p.crossing||30)*0.6+(p.flair||30)*0.5)*lfAst(p))),
    take: pool.map(p=>Math.max(1,pScore(p,W_SETT))),
    pen:  (()=>{let bi=0,bv=-1;pool.forEach((p,i)=>{const v=(p.penalties||50)+(p.composure||50)*0.3;if(v>bv){bv=v;bi=i;}});return bi;})()
  };
}

function simulateMatch(home,away,seed){
  const rng=makeRng(seed);
  const H=buildProfile(home),A=buildProfile(away);
  const WH=makeWeights(home),WA=makeWeights(away);

  // possession from midfield control (+ home edge)
  const hC=H.control*1.0, aC=A.control*1.0;
  let hShare=hC/(hC+aC); hShare=clamp(hShare+0.5,0,1); hShare=0.5+(hShare-0.5)*1.0;
  hShare=clamp(hC/(hC+aC)*1.0,0.28,0.72);
  hShare=clamp(hShare+0.03,0.28,0.74); // small home tilt
  const aShare=1-hShare;
  const gameTempo=0.86+clamp((( (H.control+A.control)/2 )-70)/100,-0.2,0.35)*0.5;

  const exposure=t=>clamp((t.counts.FWD-t.counts.DEF),-2,3); // how open the shape is to counters
  const result={homeTeamId:home.teamId,awayTeamId:away.teamId,homeGoals:0,awayGoals:0,
    homeXg:0,awayXg:0,homeShots:0,awayShots:0,homeSot:0,awaySot:0,homePoss:Math.round(hShare*100),events:[]};

  let momentum=0; // +home / -away

  function realise(side, att, def, share, oppShare, W, oppExposure, isHome, segIdx, momSide, fatigue){
    const sp = isHome ? 'home' : 'away';
    const homeFin = isHome ? 1.04 : 1.0;
    const pressDrag = clamp(1-(def.pressing-62)/300,0.82,1.12);
    const possF = 0.55 + share*0.9;
    // game state (chasing): trailing late teams push, leaders manage
    let stateF=1, stateDef=1;
    const myG = isHome?result.homeGoals:result.awayGoals, opG = isHome?result.awayGoals:result.homeGoals;
    if(segIdx>=3){
      if(myG<opG){stateF=1.045+(att.mentality-70)/360+ (myG<opG-1?0.035:0);}
      else if(myG>opG+1){stateF=0.955;stateDef=1.035;}
    }
    const mom=1+momSide*0.12;

    // ---- open play ----
    let openExp=BASE_OPEN*Math.pow(att.attack/def.defence,QEXP)*possF*gameTempo*pressDrag*mom*stateF*fatigue*(isHome?HOME_ADV:1);
    openExp=clamp(openExp,0.04,4.2);
    const openN=rng.poisson(openExp);
    const qMeanOpen=CONV_OPEN*Math.pow(att.creativity/def.defence,0.55);
    for(let i=0;i<openN;i++){
      let q=qMeanOpen*(0.55+0.9*rng.float());
      q*= (0.82+(att.finishing-def.gkRating)/200)*homeFin;
      q=clamp(q,0.02,0.84);
      result[sp+'Shots']++; result[sp+'Xg']+=q;
      const onT = rng.float()<clamp(0.30+q*0.8,0.2,0.85);
      const goal = rng.float()<q;
      if(onT||goal) result[sp+'Sot']++;
      if(goal) scoreGoal(side,W,'open',segIdx,rng,result);
    }
    // ---- set pieces ---- (volume scales with attacking pressure + width)
    let setExp=SET_BASE*Math.pow(att.setAtt/def.setDef,0.8)*(0.6+share*0.7)*(0.8+att.width/200)*fatigue;
    setExp=clamp(setExp,0.02,2.2);
    const setN=rng.poisson(setExp);
    const qMeanSet=CONV_SET*Math.pow(att.setAtt/def.setDef,0.6);
    for(let i=0;i<setN;i++){
      let q=qMeanSet*(0.4+1.2*rng.float()); q=clamp(q,0.02,0.7);
      result[sp+'Shots']++; result[sp+'Xg']+=q;
      const onT=rng.float()<clamp(0.26+q*0.8,0.18,0.8); const goal=rng.float()<q;
      if(onT||goal) result[sp+'Sot']++;
      if(goal) scoreGoal(side,W,'set',segIdx,rng,result);
    }
    // ---- counters ---- (more when opponent has the ball & is committed forward)
    let ctrExp=COUNTER_BASE*Math.pow(att.transition/def.defence,0.9)*oppShare*(0.6+0.18*oppExposure)*mom;
    ctrExp=clamp(ctrExp,0,1.8);
    const ctrN=rng.poisson(ctrExp);
    const qMeanCtr=CONV_CTR*Math.pow(att.transition/def.defence,0.5);
    for(let i=0;i<ctrN;i++){
      let q=qMeanCtr*(0.5+1.1*rng.float()); q*=(0.85+(att.finishing-def.gkRating)/200); q=clamp(q,0.03,0.86);
      result[sp+'Shots']++; result[sp+'Xg']+=q;
      const onT=rng.float()<clamp(0.34+q*0.8,0.22,0.86); const goal=rng.float()<q;
      if(onT||goal) result[sp+'Sot']++;
      if(goal) scoreGoal(side,W,'counter',segIdx,rng,result);
    }
    // ---- penalty ---- (rare; opponent indiscipline + attacking pressure)
    let penP=clamp((1-def.discipline/120)*0.010*(0.6+share)*(att.attack/def.defence),0,0.05);
    if(rng.float()<penP){
      const q=0.79; result[sp+'Shots']++; result[sp+'Xg']+=q; result[sp+'Sot']++;
      if(rng.float()<q){ const sc=W.pool[W.pen]; pushGoal(side,sc,null,segIdx,rng,result); }
    }
  }

  function scoreGoal(side,W,kind,seg,rng,res){
    let si;
    if(kind==='set') si=rng.weighted(W.setW);
    else if(kind==='counter') si=rng.weighted(W.ctr);
    else si=rng.weighted(W.open);
    const scorer=W.pool[si];
    let assister=null;
    const aProb = kind==='set'?0.84:kind==='counter'?0.62:0.74;
    if(rng.float()<aProb && W.pool.length>1){
      let ai = kind==='set'? W.take.indexOf(Math.max.apply(null,W.take)) : rng.weighted(W.ast);
      if(ai===si){ai=rng.weighted(W.ast); if(ai===si) ai=(ai+1)%W.pool.length;}
      assister=W.pool[ai];
    }
    pushGoal(side,scorer,assister,seg,rng,res);
  }
  function pushGoal(side,scorer,assister,seg,rng,res){
    const sp=side==='H'?'home':'away';
    res[sp+'Goals']++;
    const minute=clamp(seg*15+rng.int(1,15),1,90);
    const teamId=side==='H'?home.teamId:away.teamId;
    res.events.push({pid:scorer.id,team:teamId,type:'GOAL',minute,name:scorer.name});
    if(assister) res.events.push({pid:assister.id,team:teamId,type:'ASSIST',minute,name:assister.name});
  }

  for(let s=0;s<PHASES;s++){
    momentum=clamp(momentum+(rng.float()-0.5)*0.42,-1,1);
    const fatH=1-Math.max(0,s-3)*0.018*(1-(H.stamina-70)/140);
    const fatA=1-Math.max(0,s-3)*0.018*(1-(A.stamina-70)/140);
    realise('H',H,A,hShare,aShare,WH,exposure(A),true ,s,  momentum, fatH);
    realise('A',A,H,aShare,hShare,WA,exposure(H),false,s, -momentum, fatA);
  }

  // big-match temperament swing (only when both elite)
  if(H.topAtt>=BIGM && A.topAtt>=BIGM){
    // already folded into stateF/mentality; leave scoreline as sampled
  }
  result.homeXg=Math.round(result.homeXg*100)/100;
  result.awayXg=Math.round(result.awayXg*100)/100;
  result.events.sort((a,b)=>a.minute-b.minute);
  return result;
}
function generateFixtures(ids,seed){
  const rng=makeRng(seed);const teams=ids.slice();
  for(let i=teams.length-1;i>0;i--){const j=rng.int(0,i);[teams[i],teams[j]]=[teams[j],teams[i]];}
  const n=teams.length,rounds=n-1,half=n/2,arr=teams.slice(),first=[];
  for(let r=0;r<rounds;r++){for(let i=0;i<half;i++){const t1=arr[i],t2=arr[n-1-i],hf=(r+i)%2===0;first.push({matchday:r+1,homeTeamId:hf?t1:t2,awayTeamId:hf?t2:t1});}
    const fixed=arr[0],rest=arr.slice(1);rest.unshift(rest.pop());arr.splice(0,arr.length,fixed,...rest);}
  return first.concat(first.map(f=>({matchday:f.matchday+rounds,homeTeamId:f.awayTeamId,awayTeamId:f.homeTeamId})));
}
function computeTable(ids,results){
  const m=new Map(ids.map(id=>[id,{teamId:id,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0}]));
  for(const r of results){const h=m.get(r.homeTeamId),a=m.get(r.awayTeamId);if(!h||!a)continue;
    h.played++;a.played++;h.gf+=r.homeGoals;h.ga+=r.awayGoals;a.gf+=r.awayGoals;a.ga+=r.homeGoals;
    if(r.homeGoals>r.awayGoals){h.won++;h.pts+=3;a.lost++;}else if(r.homeGoals<r.awayGoals){a.won++;a.pts+=3;h.lost++;}else{h.drawn++;a.drawn++;h.pts++;a.pts++;}}
  const rows=[...m.values()].sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf||x.teamId.localeCompare(y.teamId));
  rows.forEach((r,i)=>{r.gd=r.gf-r.ga;r.position=i+1;});return rows;
}
function computeScores(teams,table){
  const pos=new Map(table.map(r=>[r.teamId,r]));
  const mk=slot=>{const mine=teams.filter(t=>t.owner===slot);
    const tp=mine.map(t=>{const r=pos.get(t.id)||{pts:0,position:0};return{id:t.id,name:t.name,pts:r.pts,position:r.position};});
    return{total:tp.reduce((s,x)=>s+x.pts,0),teams:tp.sort((a,b)=>a.position-b.position)};};
  const p1=mk(1),p2=mk(2);return{p1,p2,winner:p1.total===p2.total?0:(p1.total>p2.total?1:2)};
}
function cardMapOf(cat){return new Map([...cat.players,...cat.managers].map(c=>[c.id,c]));}
function toSim(team,cards){
  const mgr=cards.get(team.slots.MANAGER);const players=[];
  for(const s of fSlots(team)){const id=team.slots[s.id];if(!id)continue;const c=cards.get(id);if(!c)continue;
    players.push({...c,line:s.line,slotPos:s.pos,inPrimaryPosition:c.primary===s.pos});}
  return{teamId:team.id,name:team.name,owner:team.owner,formation:team.formation,players,manager:mgr};
}

function jit(name,attr){let h=0;const s=(name||'x')+'|'+attr;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return (h%5)-2;}
function deriveAttrs(name,pos,ovr){

  OUT_K.forEach(a=>{const delta=(d[a]!==undefined)?d[a]:(GEN_D[a]||0);o[a]=clampA(ovr+delta+jit(name,a));});
  if(pos==='GK')GKA_K.forEach(a=>o[a]=clampA(ovr+(GK_GROUP[a]||0)+jit(name,a)));
  const cap=(k,m)=>{o[k]=Math.min(o[k],clampA(m+jit(name,k+'c')));};
  if(line==='FWD'||pos==='CAM'){cap('marking',30);cap('tackling',37);cap('positioning',49);}
  if(line==='DEF'){['finishing','longShots','corners','freeKick','penalties'].forEach(k=>cap(k,40));cap('dribbling',60);cap('flair',52);if(pos==='CB'){cap('crossing',42);cap('vision',60);cap('technique',64);cap('pace',86);}}
  return o;
}
function mgrDerive(ovr,name){const b=ovr;const a={};MGR_K.forEach(k=>a[k]=clampA(b+jit(name,k)));a.attacking=clampA(b+jit(name,'at'));a.defending=clampA(b+jit(name,'de'));a.tactical=clampA(b+2);return a;}

function parseCSV(text){const rows=[];let i=0,f='',row=[],q=false;text=text.replace(/^\uFEFF/,'');
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;if(f!==''||row.length){row.push(f);rows.push(row);row=[];f='';}}else f+=c;}i++;}
  if(f!==''||row.length){row.push(f);rows.push(row);}
  if(!rows.length)return[];const head=rows[0].map(h=>h.trim());

  const hasAttrs=MGR_K.some(kk=>r[kk]!=null&&r[kk]!=='');const der=hasAttrs?{}:mgrDerive(ovr,base.name);MGR_K.forEach(kk=>base[kk]=(r[kk]!=null&&r[kk]!=='')?clampA(+r[kk]):der[kk]);return base;});}
function download(name,text,type){const b=new Blob([text],{type:type||'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* ============================================================================
   STATE / REDUCER
   ========================================================================== */
const ROUNDS=10;
const DRAFT_ORDER=[];for(let r=0;r<ROUNDS;r++){if(r%2===0)DRAFT_ORDER.push(1,2);else DRAFT_ORDER.push(2,1);}
function builderAt(state){return DRAFT_ORDER[state.teams.length];}
function freshState(cat){const budget=(cat.config&&cat.config.budget)||10000;
  return{screen:'setup',p1Name:'',p2Name:'',catalogue:cat,budget,pot:{1:budget,2:budget},
    teams:[],draft:{},builder:1,cur:null,step:'formation',market:null,profile:null,error:null,
    results:null,table:null,scores:null,byDay:null,simDay:0};}
function emptySlots(formation){const s={MANAGER:null};fSlotsOf(formation).forEach(x=>s[x.id]=null);return s;}
function teamsOf(state,owner){return state.teams.filter(t=>t.owner===owner);}
function newCur(state,owner){const n=teamsOf(state,owner).length+1;const nm=(owner===1?state.p1Name:state.p2Name)||('Player '+owner);
  return{id:newId('t'+owner),owner,formation:'4-3-3',name:nm+' '+n,budget:0,slots:emptySlots('4-3-3'),spent:0};}
function teamComplete(t){return teamSlotIds(t).every(s=>t.slots[s]);}
function takenPlayerNames(state){const m=cardMapOf(state.catalogue);const s=new Set();for(const id in state.draft){if(state.draft[id]){const c=m.get(id);if(c&&c.kind==='player')s.add(c.name);}}return s;}
function undrafted(state){const c=state.catalogue;const taken=takenPlayerNames(state);return{players:c.players.filter(p=>!state.draft[p.id]&&!taken.has(p.name)),managers:c.managers.filter(m=>!state.draft[m.id])};}
function cheapestForSlot(pool,pos){let min=Infinity;for(const p of pool){if(eligPos(p).includes(pos)&&p.value<min)min=p.value;}return min;}
function minTeamCost(state,formation){const u=undrafted(state);let sum=0;const usedN=new Set();
  for(const s of fSlotsOf(formation)){let min=Infinity,pick=null;for(const p of u.players){if(usedN.has(p.name))continue;if(eligPos(p).includes(s.pos)&&p.value<min){min=p.value;pick=p;}}if(pick){usedN.add(pick.name);sum+=min;}else return Infinity;}
  let mm=Infinity;for(const m of u.managers)if(m.value<mm)mm=m.value;return sum+(mm===Infinity?0:mm);}
function greedyFillCost(players,managers,formation,usedN,usedM){let cost=0;
  for(const s of fSlotsOf(formation)){let mn=Infinity,pk=null;for(const p of players){if(usedN.has(p.name))continue;if(eligPos(p).includes(s.pos)&&p.value<mn){mn=p.value;pk=p;}}if(!pk)return Infinity;usedN.add(pk.name);cost+=mn;}
  let mm=Infinity,mk=null;for(const m of managers){if(usedM.has(m.id))continue;if(m.value<mm){mm=m.value;mk=m;}}if(!mk)return Infinity;usedM.add(mk.id);cost+=mm;return cost;}
function bestFillForTeam(players,managers,usedN,usedM){let bestCost=Infinity,bn=null,bm=null;
  for(const f of FORMATION_NAMES){const tn=new Set(usedN),tm=new Set(usedM);const c=greedyFillCost(players,managers,f,tn,tm);if(isFinite(c)&&c<bestCost){bestCost=c;bn=tn;bm=tm;}}
  if(bn){bn.forEach(x=>usedN.add(x));bm.forEach(x=>usedM.add(x));return bestCost;}return Infinity;}
function cheapestFormation(state){let best='4-3-3',bc=Infinity;for(const f of FORMATION_NAMES){const c=minTeamCost(state,f);if(c<bc){bc=c;best=f;}}return best;}
function maxBudget(state,fOverride){
  const builder=state.cur?state.cur.owner:builderAt(state);
  const k=ROUNDS-teamsOf(state,builder).length-1; // YOUR remaining teams after this one
  if(k<=0)return state.pot[builder]; // your last team — commit whatever is left in your bank
  // Each manager has their own separate bank, and formations cost nothing. Only reserve
  // enough of YOUR bank to still field a cheapest legal XI for each of YOUR remaining teams.
  const u=undrafted(state);const players=u.players,managers=u.managers;const usedN=new Set(),usedM=new Set();
  const thisF=fOverride||(state.cur?state.cur.formation:'4-3-3');
  greedyFillCost(players,managers,thisF,usedN,usedM);
  let reserve=0;
  for(let i=0;i<k;i++){const c=bestFillForTeam(players,managers,usedN,usedM);if(!isFinite(c)){reserve=Infinity;break;}reserve+=c;}
  if(!isFinite(reserve))return state.pot[builder];
  return Math.max(0,state.pot[builder]-reserve);}
function canAffordFormation(state,f){return minTeamCost(state,f)<=maxBudget(state,f);}

function startSim(state){
  const cards=cardMapOf(state.catalogue);const sims=state.teams.map(t=>toSim(t,cards));
  const byId=new Map(sims.map(s=>[s.teamId,s]));const ids=sims.map(s=>s.teamId);
  const fixtures=generateFixtures(ids,hashSeed(ids.join('|')));
  const byDay={};const results=[];
  fixtures.forEach(fx=>{const h=byId.get(fx.homeTeamId),a=byId.get(fx.awayTeamId);
    const r=simulateMatch(h,a,fx.homeTeamId+'_'+fx.awayTeamId+'_'+fx.matchday);r.matchday=fx.matchday;
    results.push(r);(byDay[fx.matchday]=byDay[fx.matchday]||[]).push(r);});
  const table=computeTable(ids,results);const scores=computeScores(state.teams,table);
  return{...state,screen:'sim',simDay:0,results,table,scores,byDay,market:null,profile:null,cur:null};
}

function quickPick(state){
  const rng=mulberry32(hashSeed('qp_'+Date.now()+'_'+Math.random()));
  let s=freshState(state.catalogue);
  s={...s,p1Name:state.p1Name||'Player 1',p2Name:state.p2Name||'Player 2'};
  for(let i=0;i<ROUNDS*2;i++){
    const owner=DRAFT_ORDER[i];
    const mkCtx=f=>({...s,cur:{owner,formation:f,slots:emptySlots(f),budget:0,spent:0,id:'x',name:'x'}});
    const aff=FORMATION_NAMES.filter(f=>canAffordFormation(mkCtx(f),f));
    const formation=aff.length?aff[Math.floor(rng()*aff.length)]:cheapestFormation(mkCtx('4-3-3'));
    const ctx=mkCtx(formation);
    const minC=minTeamCost(ctx,formation),maxB=maxBudget(ctx,formation);
    const rem=ROUNDS-teamsOf(s,owner).length;
    let budget=Math.round((s.pot[owner]/Math.max(1,rem))*(0.7+0.6*rng()));
    budget=Math.max(minC,Math.min(maxB,budget));
    const takenG=takenPlayerNames(s);const usedN=new Set();const pick={};
    for(const slot of fSlotsOf(formation)){
      let best=null;for(const p of s.catalogue.players){if(s.draft[p.id]||usedN.has(p.name)||takenG.has(p.name))continue;if(!eligPos(p).includes(slot.pos))continue;if(!best||p.value<best.value)best=p;}
      pick[slot.id]=best;if(best)usedN.add(best.name);
    }
    let mgr=null;for(const m of s.catalogue.managers){if(s.draft[m.id])continue;if(!mgr||m.value<mgr.value)mgr=m;}
    let spent=Object.values(pick).reduce((x,p)=>x+(p?p.value:0),0)+(mgr?mgr.value:0);
    let surplus=budget-spent;
    for(const slot of fSlotsOf(formation)){
      const cur=pick[slot.id];if(!cur)continue;const cands=[];
      for(const p of s.catalogue.players){if(p.id===cur.id||s.draft[p.id]||usedN.has(p.name)||takenG.has(p.name))continue;if(!eligPos(p).includes(slot.pos))continue;if(p.value>cur.value&&(p.value-cur.value)<=surplus)cands.push(p);}
      if(cands.length){cands.sort((a,b)=>b.value-a.value);const up=cands[Math.floor(rng()*Math.min(cands.length,6))];surplus-=(up.value-cur.value);usedN.delete(cur.name);usedN.add(up.name);pick[slot.id]=up;}
    }
    if(mgr){const mc=[];for(const m of s.catalogue.managers){if(m.id===mgr.id||s.draft[m.id])continue;if(m.value>mgr.value&&(m.value-mgr.value)<=surplus)mc.push(m);}if(mc.length){mc.sort((a,b)=>b.value-a.value);const up=mc[Math.floor(rng()*Math.min(mc.length,5))];surplus-=(up.value-mgr.value);mgr=up;}}
    const slots=emptySlots(formation);let realSpent=0;
    for(const slot of fSlotsOf(formation)){const p=pick[slot.id];if(p){slots[slot.id]=p.id;realSpent+=p.value;}}
    if(mgr){slots.MANAGER=mgr.id;realSpent+=mgr.value;}
    const nm=((owner===1?s.p1Name:s.p2Name)||('Player '+owner))+' '+(teamsOf(s,owner).length+1);
    const team={id:newId('t'+owner),owner,formation,name:nm,budget,slots,spent:realSpent};
    const draft={...s.draft};for(const slot of fSlotsOf(formation)){const p=pick[slot.id];if(p)draft[p.id]=true;}if(mgr)draft[mgr.id]=true;
    s={...s,teams:[...s.teams,team],draft,pot:{...s.pot,[owner]:s.pot[owner]-budget}};
  }
  return startSim(s);
}

function reducer(state,a){
  switch(a.type){
    case 'SET_NAMES':return{...state,p1Name:a.p1,p2Name:a.p2};
    case 'SET_CATALOGUE':{const budget=(a.cat.config&&a.cat.config.budget)||state.budget;saveCatalogue(a.cat);return{...state,catalogue:a.cat,budget,pot:{1:budget,2:budget}};}
    case 'QUICK_PICK':{const st={...state,p1Name:a.p1||state.p1Name||'Player 1',p2Name:a.p2||state.p2Name||'Player 2'};return quickPick(st);}
    case 'ERR':return{...state,error:a.msg};
    case 'CLR_ERR':return{...state,error:null};
    case 'GO':return{...state,screen:a.screen,error:null};
    case 'START_BUILD':{const budget=state.budget;const s0={...state,pot:{1:budget,2:budget},teams:[],draft:{},builder:1,results:null,table:null,scores:null,byDay:null,simDay:0,market:null,profile:null};
      return{...s0,screen:'build',step:'formation',cur:newCur(s0,1)};}
    case 'CHOOSE_FORMATION':{if(!state.cur)return state;return{...state,cur:{...state.cur,formation:a.formation,slots:emptySlots(a.formation),spent:0},error:null};}
    case 'SET_NAME':{if(!state.cur)return state;return{...state,cur:{...state.cur,name:a.name}};}
    case 'GO_BUDGET':{if(!state.cur||!state.cur.formation)return{...state,error:'Pick a formation first'};
      const maxB=maxBudget(state),minC=minTeamCost(state,state.cur.formation);
      if(minC>maxB)return{...state,error:'Not enough left in your bank to field a '+state.cur.formation+' ('+fmtM(minC)+' minimum in players) — pick a lighter shape'};
      const sugg=Math.min(maxB,Math.round(state.pot[state.builder]/(ROUNDS-teamsOf(state,state.builder).length)));
      const start=Math.max(minC,Math.min(maxB,sugg||minC));
      return{...state,step:'budget',cur:{...state.cur,budget:state.cur.budget||start},error:null};}
    case 'SET_BUDGET':{if(!state.cur)return state;const minC=minTeamCost(state,state.cur.formation);const maxB=maxBudget(state);
      const lo=Math.min(minC,maxB);return{...state,cur:{...state.cur,budget:Math.max(lo,Math.min(maxB,Math.round(a.amount)))}};}
    case 'GO_FILL':{if(!state.cur)return state;const minC=minTeamCost(state,state.cur.formation);
      if(state.cur.budget<minC)return{...state,error:'Budget too low to fill this team ('+fmtM(minC)+' minimum)'};
      const pot={...state.pot,[state.builder]:state.pot[state.builder]-state.cur.budget};
      return{...state,pot,step:'fill',error:null};}
    case 'BACK':{return{...state,step:a.step,market:null,profile:null,error:null};}
    case 'OPEN_MARKET':{if(!state.cur)return state;const pos=a.slotId==='MANAGER'?'MANAGER':(fSlots(state.cur).find(s=>s.id===a.slotId)||{}).pos;
      return{...state,market:{slotId:a.slotId,pos},profile:null};}
    case 'CLOSE_MARKET':return{...state,market:null,profile:null};
    case 'VIEW_PROFILE':return{...state,profile:a.cardId};
    case 'CLOSE_PROFILE':return{...state,profile:null};
    case 'BUY':{if(!state.cur||!state.market)return state;const card=a.card;const slotId=state.market.slotId;
      if(state.draft[card.id])return{...state,error:'Already signed by another team'};
      if(card.kind==='player'&&takenPlayerNames(state).has(card.name))return{...state,error:card.name+' is already in the league — another season of theirs has been signed'};
      const left=state.cur.budget-state.cur.spent;if(card.value>left)return{...state,error:fmtM(card.value)+' is more than this team can afford ('+fmtM(left)+' left)'};
      if(slotId==='MANAGER'){if(card.kind!=='manager')return state;}
      else{const slot=fSlots(state.cur).find(s=>s.id===slotId);if(!slot||!eligPos(card).includes(slot.pos))return{...state,error:'That player cannot play there'};if(state.cur.slots[slotId])return{...state,error:'Position already filled'};}
      const cur={...state.cur,slots:{...state.cur.slots,[slotId]:card.id},spent:state.cur.spent+card.value};
      return{...state,cur,draft:{...state.draft,[card.id]:true},market:null,profile:null,error:null};}
    case 'RELEASE':{if(!state.cur)return state;const id=state.cur.slots[a.slotId];if(!id)return state;const card=cardMapOf(state.catalogue).get(id);
      const cur={...state.cur,slots:{...state.cur.slots,[a.slotId]:null},spent:Math.max(0,state.cur.spent-(card?card.value:0))};
      const draft={...state.draft};delete draft[id];return{...state,cur,draft,profile:null};}
    case 'FINISH_TEAM':{if(!state.cur||!teamComplete(state.cur))return{...state,error:'Fill every position and the manager slot first'};
      const teams=[...state.teams,state.cur];
      const s1={...state,teams,cur:null,market:null,profile:null,error:null};
      const pick=teams.length;
      if(pick<ROUNDS*2){const nb=DRAFT_ORDER[pick];return{...s1,builder:nb,step:'formation',cur:newCur(s1,nb)};}
      return startSim(s1);}
    case 'SIM_TICK':return{...state,simDay:Math.min(state.simDay+1,38)};
    case 'RESET':{const f=freshState(state.catalogue);saveState(f);return f;}
    default:return state;
  }
}

/* ---------------- Budget step ---------------- */
function BudgetStep({state,dispatch}){
  const cur=state.cur;const minC=minTeamCost(state,cur.formation);const maxB=maxBudget(state);
  const remainingTeams=ROUNDS-teamsOf(state,cur.owner).length-1;
  const reserve=state.pot[cur.owner]-cur.budget;
  return html`<div class="panel" style=${{padding:'24px',maxWidth:'720px',margin:'0 auto'}}>
    <div class="eyebrow">${cur.name} · ${cur.formation}</div><h2 class="head">Set this team's budget</h2>

    <div style=${{textAlign:'center',margin:'22px 0 6px'}}><div class="smallcap">Budget for ${cur.name}</div>
      <div style=${{fontFamily:'var(--display)',fontSize:'52px',lineHeight:1,color:'var(--gold)'}}>${fmtM(cur.budget)}</div></div>
    <div class="alloc"><input type="range" min=${minC} max=${maxB} step="10" value=${cur.budget} onInput=${e=>dispatch({type:'SET_BUDGET',amount:+e.target.value})}/></div>
    <div class="spread smallcap" style=${{marginTop:'4px'}}><span>min ${fmtM(minC)}</span><span>max ${fmtM(maxB)}</span></div>
    <div class="moneybar" style=${{marginTop:'20px'}}>
      <span class="smallcap">Left in bank after this team</span><span class="v" style=${{color:'var(--gold)',fontSize:'16px'}}>${fmtM(reserve)}</span></div>
    <div class="row" style=${{marginTop:'18px',justifyContent:'space-between'}}>
      <button class="btn ghost" onClick=${()=>dispatch({type:'BACK',step:'formation'})}>← Shape</button>
      <button class="btn p1" onClick=${()=>dispatch({type:'GO_FILL'})}>Sign players →</button>
    </div>
  </div>`;}

/* ---------------- Pitch ---------------- */
function Pitch({team,cards,owner,onSlot}){
  return html`<div class="pitch">
    <div class="mk halfway"></div><div class="mk circle"></div><div class="mk boxTop"></div><div class="mk boxBot"></div>
    ${fSlots(team).map(s=>{const id=team.slots[s.id];const c=id?cards.get(id):null;
      return html`<div class="slot" key=${s.id} style=${{left:s.x+'%',top:s.y+'%'}} onClick=${()=>onSlot&&onSlot(s,c)}>
        ${c?html`<div class=${'shirt '+(owner===1?'p1':'p2')}><span class="poslab">${s.pos}</span>${c.overall}</div>
              <span class="nm">${surname(c.name)}</span><span class="cl">${c.season}</span>`
            :html`<div class="shirt empty"><span class="poslab">${s.pos}</span>+</div><span class="nm muted">${s.pos}</span>`}
      </div>`;})}
  </div>`;}

/* ---------------- Market (redesigned) ---------------- */
function Market({state,dispatch}){
  const cur=state.cur,mk=state.market;const left=cur.budget-cur.spent;
  const [q,setQ]=useState('');const [sort,setSort]=useState('valdesc');const [affOnly,setAffOnly]=useState(false);
  useEffect(()=>{setQ('');setAffOnly(false);setSort('valdesc');},[mk.slotId,mk.pos]);
  const isMgr=mk.slotId==='MANAGER';
  const takenP=takenPlayerNames(state);
  let list=isMgr?state.catalogue.managers.filter(m=>!state.draft[m.id])
                :state.catalogue.players.filter(p=>!state.draft[p.id]&&!takenP.has(p.name)&&eligPos(p).includes(mk.pos));
  if(q.trim()){const s=q.trim().toLowerCase();list=list.filter(c=>c.name.toLowerCase().includes(s)||(c.club||'').toLowerCase().includes(s));}
  if(affOnly)list=list.filter(c=>c.value<=left);
  list=list.slice().sort((a,b)=>sort==='valasc'?a.value-b.value:sort==='rating'?b.overall-a.overall:sort==='name'?a.name.localeCompare(b.name):b.value-a.value);
  return html`<div class="panel" style=${{padding:'16px'}}>
    <div class="spread" style=${{marginBottom:'12px'}}>
      <div><div class="eyebrow">${isMgr?'Manager market':(POS_NAME[mk.pos]+' · '+mk.pos)}</div>
        <div class="smallcap" style=${{marginTop:'4px',color:'var(--chalk-dim)'}}>${list.length} available · ${fmtM(left)} to spend</div></div>
      <button class="btn ghost sm" onClick=${()=>dispatch({type:'CLOSE_MARKET'})}>✕ Close</button></div>
    <div class="mkt">
      <div class="ctrls">
        <input class="s" placeholder="Search name or club…" value=${q} onInput=${e=>setQ(e.target.value)}/>
        <select class="fld" style=${{width:'auto',flex:'0 0 auto',padding:'10px 12px'}} value=${sort} onChange=${e=>setSort(e.target.value)}>
          <option value="valdesc">Most valuable</option><option value="rating">Highest rated</option><option value="valasc">Cheapest</option><option value="name">A–Z</option></select>
        <button class=${'chiptoggle'+(affOnly?' on':'')} onClick=${()=>setAffOnly(v=>!v)}>Affordable</button>
      </div>
      <div class="mlist">
        ${list.length===0?html`<div class="empty">No one matches — adjust the filters.</div>`
          :list.slice(0,300).map(c=>{const aff=c.value<=left;
            return html`<div class=${'mrow'+(aff?'':' no')} key=${c.id} onClick=${()=>dispatch({type:'VIEW_PROFILE',cardId:c.id})}>
              <${RBadge} v=${c.overall} size=${38}/>
              <div style=${{minWidth:0}}><div class="pname">${c.name}</div>
                <div class="pmeta">${c.club} · ${c.season}${isMgr?'':' · '+eligPos(c).join(' ')}</div></div>
              <div class="mval" style=${{color:aff?'var(--chalk)':'var(--neg)'}}>${fmtM(c.value)}</div>
              <span class="chev">›</span></div>`;})}
      </div>
    </div>
    <div class="moneybar"><span class="smallcap">Budget left this team</span>
      <span class="v" style=${{color:left<0?'var(--neg)':'var(--gold)',fontSize:'17px'}}>${fmtM(left)}</span></div>
  </div>`;}

/* ---------------- Profile modal (redesigned) ---------------- */
function roleTiles(card){
  if(card.kind==='manager')
    return [['Attacking',card.attacking],['Defending',card.defending],['Tactical',card.tactical],['Motivating',card.motivating],['Man-mgmt',card.peopleManagement],['Discipline',card.levelOfDiscipline]];
  if(card.line==='GK')
    return [['Shot Stopping',pScore(card,W_GK)],['Aerial',pScore(card,W_AERA)],['Distribution',((card.kicking||50)+(card.throwing||50))/2],['Command',card.commandOfArea||60],['Composure',card.composure||60],['Reflexes',card.reflexes||60]];
  return [['Attacking',pScore(card,W_ATT)],['Creativity',pScore(card,W_CRE)],['Defending',pScore(card,W_DEF)],['Pace',((card.pace||50)+(card.acceleration||50))/2],['Physical',pScore(card,W_PHYS)],['Aerial',pScore(card,W_AERA)]];
}
function AttGroup({title,arr,card}){
  return html`<div class="attgroup"><h5>${title}</h5>
    ${arr.map(([k,lab])=>card[k]==null?'':html`<div class="attbar" key=${k}>
      <span class="lab">${lab}</span>
      <span class="track"><i style=${{width:Math.max(4,card[k])+'%',background:colorForRating(card[k]).bg}}></i></span>
      <span class="v" style=${{color:colorForRating(card[k]).bg}}>${card[k]}</span></div>`)}
  </div>`;}
function ProfileModal({card,state,dispatch,canSign,canRelease,slotId,onClose}){
  if(!card)return null;
  const isM=card.kind==='manager';
  const left=state.cur?(state.cur.budget-state.cur.spent):0;
  const afford=card.value<=left;
  const positions=isM?[]:eligPos(card);
  const close=()=>{if(typeof dispatch==='function')dispatch({type:'CLOSE_PROFILE'});onClose&&onClose();};
  const tiles=roleTiles(card);
  return html`<div class="modal" onClick=${close}><div class="panel modalbox" onClick=${e=>e.stopPropagation()}>
    <div class="prof-hero">
      <div style=${{minWidth:0}}><div class="eyebrow">${card.club} · ${card.season}</div><h2 class="head">${card.name}</h2>
        ${isM?html`<div class="prof-pos"><span class="poschip first">Manager</span></div>`
             :html`<div class="prof-pos">${positions.map((p,i)=>html`<span key=${p} class=${'poschip'+(i===0?' first':'')}>${p}</span>`)}</div>`}</div>
      <div class="prof-r"><${RBadge} v=${card.overall} size=${56}/><div class="prof-val">${fmtM(card.value)}</div></div>
    </div>
    <div class="rolegrid">${tiles.map(([lab,val])=>{const v=Math.round(val);return html`<div class="rolecard" key=${lab}>
      <div class="rl">${lab}</div><div class="rv" style=${{color:colorForRating(v).bg}}>${v}</div>
      <div class="rt"><i style=${{width:Math.max(4,v)+'%',background:colorForRating(v).bg}}></i></div></div>`;})}</div>
    <div class="attwrap2">
      ${isM?html`<${AttGroup} title="Manager attributes" arr=${MGR_ATTRS} card=${card}/>`
           :html`<div><${AttGroup} title="Technical" arr=${TECH} card=${card}/><${AttGroup} title="Mental" arr=${MENT} card=${card}/></div>
                 <div><${AttGroup} title="Physical" arr=${PHYS} card=${card}/>${card.reflexes!=null?html`<${AttGroup} title="Goalkeeping" arr=${GKA} card=${card}/>`:''}</div>`}
    </div>
    <div class="row" style=${{marginTop:'20px',justifyContent:'flex-end',gap:'10px'}}>
      <button class="btn ghost" onClick=${close}>Close</button>
      ${canRelease?html`<button class="btn danger" onClick=${()=>dispatch({type:'RELEASE',slotId})}>Release · refund ${fmtM(card.value)}</button>`:''}
      ${canSign?html`<button class="btn p1" disabled=${!afford} onClick=${()=>dispatch({type:'BUY',card})}>${afford?'Sign for '+fmtM(card.value):'Too expensive · '+fmtM(card.value)}</button>`:''}
    </div>
  </div></div>`;}

/* ---------------- Fill step (pitch + market + squad) ---------------- */
function FillStep({state,dispatch}){
  const cur=state.cur;const cards=cardMapOf(state.catalogue);const left=cur.budget-cur.spent;
  const mgrCard=cur.slots.MANAGER?cards.get(cur.slots.MANAGER):null;
  const complete=teamComplete(cur);
  const signed=fSlots(cur).map(s=>({s,c:cur.slots[s.id]?cards.get(cur.slots[s.id]):null})).filter(x=>x.c);
  function onSlot(s,c){ if(c)dispatch({type:'VIEW_PROFILE',cardId:c.id}); else dispatch({type:'OPEN_MARKET',slotId:s.id}); }
  const profileCard=state.profile?cards.get(state.profile):null;
  // is the profiled card currently in this team (=> release) or in the market (=> sign)?
  const inTeamSlot=profileCard?teamSlotIds(cur).find(id=>cur.slots[id]===profileCard.id):null;
  const canSign=!!(profileCard&&state.market&&!inTeamSlot);
  const canRelease=!!inTeamSlot;
  return html`<div>
    <div class=${'clock '+(cur.owner===1?'p1':'p2')}>
      <div><div class="who">${cur.owner===1?(state.p1Name||'Player 1'):(state.p2Name||'Player 2')}</div>
        <div class="meta">Team ${teamsOf(state,cur.owner).length+1} of ${ROUNDS} · pick ${state.teams.length+1} of ${ROUNDS*2}</div></div>
      <div style=${{textAlign:'right'}}><div class="smallcap">${cur.formation}</div>
        <div style=${{fontFamily:'var(--mono)',fontWeight:700,fontSize:'18px',color:left<0?'var(--neg)':'var(--gold)'}}>${fmtM(left)} left</div></div>
    </div>
    <div class="draftgrid">
      <div>
        <${Pitch} team=${cur} cards=${cards} owner=${cur.owner} onSlot=${onSlot}/>
        <div class=${'mgrslot '+(mgrCard?'filled':'')} onClick=${()=>{ if(mgrCard)dispatch({type:'VIEW_PROFILE',cardId:mgrCard.id}); else dispatch({type:'OPEN_MARKET',slotId:'MANAGER'}); }} style=${{cursor:'pointer'}}>
          ${mgrCard?html`<${RBadge} v=${mgrCard.overall} size=${40}/><div style=${{flex:1}}><div style=${{fontWeight:600}}>${mgrCard.name}</div><div class="smallcap">Manager · ${mgrCard.season}</div></div><div class="mval">${fmtM(mgrCard.value)}</div>`
                    :html`<div style=${{width:'40px',height:'40px',borderRadius:'9px',border:'2px dashed var(--line-strong)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--chalk-dim)'}}>+</div><div style=${{flex:1}} class="muted">Sign a manager</div>`}
        </div>
      </div>
      <div>
        ${state.market?html`<${Market} state=${state} dispatch=${dispatch}/>`
          :html`<div class="panel" style=${{padding:'18px'}}>
            <div class="spread"><div class="eyebrow">Your squad</div><div class="smallcap">${signed.length+(mgrCard?1:0)} signed</div></div>
            <p class="muted" style=${{margin:'8px 0 6px',fontSize:'13.5px'}}>Tap any position on the pitch to open the market and sign a player. Tap a signed player to view or release them.</p>
            <div style=${{margin:'10px 0',maxHeight:'300px',overflow:'auto'}}>
              ${signed.length===0?html`<div class="empty">No players signed yet.</div>`
                :signed.map(({s,c})=>html`<div class="prow" key=${s.id} onClick=${()=>dispatch({type:'VIEW_PROFILE',cardId:c.id})}>
                  <${RBadge} v=${c.overall} size=${36}/>
                  <div style=${{minWidth:0}}><div class="pname">${surname(c.name)} <span class="smallcap" style=${{marginLeft:'4px'}}>${s.pos}</span></div><div class="pmeta">${c.club} · ${c.season}</div></div>
                  <div class="mval">${fmtM(c.value)}</div><span class="chev">›</span></div>`)}
            </div>
            <div class="moneybar"><span class="smallcap">Spent ${fmtM(cur.spent)} of ${fmtM(cur.budget)}</span><span class="v" style=${{color:'var(--gold)'}}>${fmtM(left)} left</span></div>
            <button class="btn p1" style=${{width:'100%',marginTop:'14px'}} disabled=${!complete} onClick=${()=>dispatch({type:'FINISH_TEAM'})}>${complete?(state.teams.length+1>=ROUNDS*2?'Finish & play season →':'Confirm team →'):'Fill all '+(fSlots(cur).length+1)+' slots to continue'}</button>
          </div>`}
      </div>
    </div>
    ${profileCard?html`<${ProfileModal} card=${profileCard} state=${state} dispatch=${dispatch} canSign=${canSign} canRelease=${canRelease} slotId=${inTeamSlot}/>`:''}
  </div>`;}

/* ---------------- Build router ---------------- */
function BuildScreen({state,dispatch}){
  if(!state.cur)return null;
  if(state.step==='formation')return html`<${FormationPicker} state=${state} dispatch=${dispatch}/>`;
  if(state.step==='budget')return html`<${BudgetStep} state=${state} dispatch=${dispatch}/>`;
  return html`<${FillStep} state=${state} dispatch=${dispatch}/>`;
}

/* ---------------- League table ---------------- */
function LeagueTable({rows,teams,onTeam}){
  const meta={};teams.forEach(t=>meta[t.id]={name:t.name,owner:t.owner});
  return html`<table class="league"><thead><tr>
    <th class="l">#</th><th class="l">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
  </tr></thead><tbody>
    ${rows.map(r=>{const m=meta[r.teamId]||{};return html`<tr key=${r.teamId} class=${'click '+(m.owner===1?'r1':(m.owner===2?'r2':''))} onClick=${()=>onTeam&&onTeam(r.teamId)}>
      <td class="l"><span class="pos">${r.position}</span></td>
      <td class="l team"><span class="ownerbar" style=${{background:m.owner===1?'var(--p1)':'var(--p2)'}}></span>${m.name||r.teamId}</td>
      <td>${r.played}</td><td>${r.won}</td><td>${r.drawn}</td><td>${r.lost}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gd>0?'+':''}${r.gd}</td>
      <td style=${{fontWeight:700,color:'var(--gold)'}}>${r.pts}</td></tr>`;})}
  </tbody></table>`;}

/* ---------------- season aggregates ---------------- */
function aggStats(state){
  const cards=cardMapOf(state.catalogue);const g={},a={};
  state.results.forEach(r=>r.events.forEach(e=>{if(e.type==='GOAL')g[e.pid]=(g[e.pid]||0)+1;else if(e.type==='ASSIST')a[e.pid]=(a[e.pid]||0)+1;}));
  const owner={},tname={};state.teams.forEach(t=>{tname[t.id]=t.name;teamSlotIds(t).forEach(id=>{const x=t.slots[id];if(x)owner[x]=t.owner;});});
  const mk=o=>Object.keys(o).map(pid=>({card:cards.get(pid),n:o[pid],owner:owner[pid]})).filter(x=>x.card).sort((p,q)=>q.n-p.n);
  const cs={};state.results.forEach(r=>{if(r.awayGoals===0)cs[r.homeTeamId]=(cs[r.homeTeamId]||0)+1;if(r.homeGoals===0)cs[r.awayTeamId]=(cs[r.awayTeamId]||0)+1;});
  const big=state.results.slice().sort((x,y)=>(y.homeGoals+y.awayGoals)-(x.homeGoals+x.awayGoals)||Math.abs(y.homeGoals-y.awayGoals)-Math.abs(x.homeGoals-x.awayGoals)).slice(0,6);
  return {scorers:mk(g),assisters:mk(a),cleanSheets:cs,big,tname,owner};
}

/* ---------------- team explorer ---------------- */

  return html`<div class="modal" onClick=${onClose}><div class="panel modalbox" onClick=${e=>e.stopPropagation()}>
    <div class="spread"><div><div class="eyebrow">${team.owner===1?(state.p1Name||'Player 1'):(state.p2Name||'Player 2')} · ${team.formation}</div><h2 class="head">${team.name}</h2></div>
      <button class="btn ghost sm" onClick=${onClose}>✕</button></div>

      <div>
        <div class=${'mgrslot '+(mgr?'filled':'')}>${mgr?html`<${RBadge} v=${mgr.overall} size=${40}/><div style=${{flex:1}}><div style=${{fontWeight:600}} class="click" onClick=${()=>setPcard(mgr)}>${mgr.name}</div><div class="smallcap">Manager</div></div>`:html`<span class="muted">No manager</span>`}</div>
        <div class="panel" style=${{padding:'14px',marginTop:'12px'}}>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>

        <p class="smallcap" style=${{marginTop:'10px',textAlign:'center'}}>Tap a player to view attributes</p>
      </div>
    </div>

  </div></div>`;}

/* ---------------- simulating + results ---------------- */
function SimProgress({state,dispatch}){
  useEffect(()=>{if(state.simDay<38){const t=setTimeout(()=>dispatch({type:'SIM_TICK'}),38);return ()=>clearTimeout(t);}},[state.simDay]);
  const ids=state.teams.map(t=>t.id);

    <div style=${{marginTop:'20px'}}>
      ${partial.slice(0,8).map(r=>{const m=meta[r.teamId]||{};return html`<div class="teamline" key=${r.teamId}>

function StatList({title,items,unit}){

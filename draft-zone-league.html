<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draft Zone League</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --pitch-0:#08251C;--pitch-1:#0E3728;--pitch-2:#15543F;--pitch-3:#1C6B4F;
    --chalk:#EAF3EE;--chalk-dim:#93AEA2;--line:rgba(234,243,238,.16);--line-strong:rgba(234,243,238,.34);
    --p1:#FFB23E;--p2:#39B7F0;--pos:#5BE08A;--neg:#FF7A7A;--gold:#F4C95D;
    --display:'Anton',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 50% -10%,#14503B 0%,var(--pitch-0) 60%),var(--pitch-0);color:var(--chalk);font-family:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--body);cursor:pointer;}
  ::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--pitch-2);border-radius:8px;}::-webkit-scrollbar-track{background:transparent;}
  .wrap{max-width:1320px;margin:0 auto;padding:0 20px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(8,37,28,.96),rgba(8,37,28,.78));backdrop-filter:blur(6px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:14px;}
  .crest{width:38px;height:38px;border-radius:9px;background:repeating-linear-gradient(90deg,var(--p1) 0 6px,#0E3728 6px 12px);border:2px solid var(--chalk);}
  .brand h1{font-family:var(--display);font-size:22px;letter-spacing:.06em;margin:0;line-height:1;text-transform:uppercase;}
  .brand .sub{font-size:11px;color:var(--chalk-dim);letter-spacing:.18em;text-transform:uppercase;}
  .scorechips{display:flex;gap:10px;align-items:center;}
  .chip{display:flex;flex-direction:column;align-items:center;min-width:84px;padding:6px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.18);}
  .chip .nm{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chip .pts{font-family:var(--display);font-size:24px;line-height:1;}
  .chip.p1{box-shadow:inset 0 -3px 0 var(--p1);}.chip.p1 .pts{color:var(--p1);}
  .chip.p2{box-shadow:inset 0 -3px 0 var(--p2);}.chip.p2 .pts{color:var(--p2);}
  .panel{background:linear-gradient(180deg,var(--pitch-1),#0B2C21);border:1px solid var(--line);border-radius:16px;}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  h2.head{font-family:var(--display);text-transform:uppercase;letter-spacing:.04em;font-size:30px;margin:6px 0 0;}
  .btn{border:none;border-radius:11px;padding:13px 22px;font-weight:700;font-size:15px;letter-spacing:.02em;background:var(--chalk);color:#0A2A20;transition:transform .06s,filter .15s;}
  .btn:hover{filter:brightness(1.06);}.btn:active{transform:translateY(1px);}.btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.sm{padding:8px 14px;font-size:13px;}
  .btn.ghost{background:transparent;color:var(--chalk);border:1px solid var(--line-strong);}
  .btn.p1{background:var(--p1);color:#2A1700;}.btn.p2{background:var(--p2);color:#04263A;}
  .btn.danger{background:transparent;color:var(--neg);border:1px solid rgba(255,122,122,.5);}
  input.fld,select.fld{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:11px;padding:12px 13px;font-size:15px;font-family:var(--body);}
  input.fld:focus,select.fld:focus{outline:none;border-color:var(--gold);}
  select.fld option{background:#0B2C21;}
  label.lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:7px;}
  .muted{color:var(--chalk-dim);}
  .center{min-height:72vh;display:flex;align-items:center;justify-content:center;}
  .card{width:100%;max-width:560px;padding:34px;}
  .kit-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
  .kit-pill.p1{background:rgba(255,178,62,.14);color:var(--p1);border:1px solid rgba(255,178,62,.4);}
  .kit-pill.p2{background:rgba(57,183,240,.14);color:var(--p2);border:1px solid rgba(57,183,240,.4);}
  .draftgrid{display:grid;grid-template-columns:minmax(0,1fr) 372px;gap:20px;align-items:start;margin-top:18px;}
  @media(max-width:980px){.draftgrid{grid-template-columns:1fr;}}
  .clock{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 20px;border-radius:14px;margin-bottom:16px;border:1px solid var(--line-strong);}
  .clock.p1{background:linear-gradient(90deg,rgba(255,178,62,.18),rgba(255,178,62,.03));box-shadow:inset 4px 0 0 var(--p1);}
  .clock.p2{background:linear-gradient(90deg,rgba(57,183,240,.18),rgba(57,183,240,.03));box-shadow:inset 4px 0 0 var(--p2);}
  .clock .who{font-family:var(--display);font-size:24px;letter-spacing:.03em;text-transform:uppercase;}
  .clock .meta{font-size:12px;color:var(--chalk-dim);letter-spacing:.08em;text-transform:uppercase;}
  .reels{display:flex;gap:12px;justify-content:center;margin:10px 0 6px;}
  .reel{flex:1;max-width:260px;background:#06201A;border:1px solid var(--line-strong);border-radius:13px;padding:16px;text-align:center;overflow:hidden;}
  .reel .cap{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--chalk-dim);}
  .reel .val{font-family:var(--display);font-size:25px;line-height:1.05;margin-top:6px;letter-spacing:.02em;min-height:34px;}
  .reel.season .val{font-family:var(--mono);font-size:23px;color:var(--gold);}
  .reel.spinning .val{filter:blur(1px);opacity:.85;}
  .spinbtn{display:block;width:100%;border:none;border-radius:13px;padding:18px;font-family:var(--display);font-size:24px;letter-spacing:.08em;text-transform:uppercase;background:linear-gradient(180deg,var(--gold),#D9A52E);color:#2A1C00;}
  .spinbtn:active{transform:translateY(1px);}
  .clubpool{margin-top:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .poolhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,0,0,.2);}
  .poolhdr b{font-size:15px;}.poolhdr .ss{font-family:var(--mono);color:var(--gold);}
  .poolist{max-height:330px;overflow:auto;}
  .prow{display:grid;grid-template-columns:42px 1fr auto auto;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
  .prow:hover{background:rgba(255,255,255,.05);}.prow:last-child{border-bottom:none;}
  .ovr{font-family:var(--mono);font-weight:700;font-size:15px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:var(--pitch-2);}
  .ovr.hi{background:#1E7A57;color:#EAFBF2;}.ovr.lo{background:#3a2f1a;color:#e8d7a8;}
  .pname{font-weight:600;font-size:15px;line-height:1.15;}.pmeta{font-size:11.5px;color:var(--chalk-dim);}
  .info{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--chalk-dim);width:28px;height:28px;border-radius:7px;font-weight:700;}
  .pickbtn{background:var(--chalk);color:#0A2A20;border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;}
  .empty{padding:24px;text-align:center;color:var(--chalk-dim);}
  .pitch{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:3/4;background:repeating-linear-gradient(0deg,#16573F 0 12.5%,#13503A 12.5% 25%);border:1px solid var(--line);}
  .pitch .mk{position:absolute;border:2px solid var(--line-strong);}
  .pitch .halfway{left:8%;right:8%;top:50%;height:0;border-top:2px solid var(--line-strong);}
  .pitch .circle{left:50%;top:50%;width:26%;aspect-ratio:1;transform:translate(-50%,-50%);border-radius:50%;}
  .pitch .boxTop{left:26%;right:26%;top:0;height:15%;}.pitch .boxBot{left:26%;right:26%;bottom:0;height:15%;}
  .slot{position:absolute;transform:translate(-50%,-50%);width:74px;text-align:center;cursor:pointer;}
  .slot:hover .shirt{filter:brightness(1.12);}
  .shirt{width:48px;height:48px;margin:0 auto;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:16px;color:#06231A;border:2px solid rgba(255,255,255,.55);position:relative;}
  .shirt.empty{background:transparent;border:2px dashed var(--line-strong);color:var(--chalk-dim);font-family:var(--body);font-size:11px;font-weight:700;}
  .shirt.p1{background:linear-gradient(160deg,#FFC862,#F39B17);}.shirt.p2{background:linear-gradient(160deg,#6FD0FF,#1E9FE0);color:#04263A;}
  .slot .nm{font-size:11px;margin-top:4px;line-height:1.1;color:var(--chalk);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;font-weight:600;}
  .slot .cl{font-size:9px;color:var(--chalk-dim);display:block;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poslab{position:absolute;top:-6px;left:-6px;background:#06231A;border:1px solid var(--line-strong);color:var(--gold);font-family:var(--mono);font-size:9px;font-weight:700;border-radius:5px;padding:1px 4px;}
  .mgrslot{display:flex;align-items:center;gap:12px;margin-top:12px;padding:11px 14px;border-radius:12px;border:1px dashed var(--line-strong);}
  .mgrslot.filled{border-style:solid;}
  .opp{margin-top:16px;padding:14px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.14);}
  .opp h4{margin:0 0 8px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .progbars{display:flex;gap:6px;}.pb{flex:1;height:6px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;}.pb i{display:block;height:100%;}
  table.league{width:100%;border-collapse:collapse;font-size:14px;}
  table.league th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);text-align:right;padding:10px 8px;border-bottom:1px solid var(--line-strong);font-weight:700;}
  table.league th.l,table.league td.l{text-align:left;}
  table.league td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono);}
  table.league td.team{font-family:var(--body);font-weight:600;cursor:pointer;}
  table.league td.team:hover{color:var(--gold);}
  table.league tr.r1{background:linear-gradient(90deg,rgba(255,178,62,.12),transparent);}
  table.league tr.r2{background:linear-gradient(90deg,rgba(57,183,240,.12),transparent);}
  table.league tr.click{cursor:pointer;}table.league tr.click:hover td{background:rgba(255,255,255,.04);}
  .pos{display:inline-block;width:22px;color:var(--chalk-dim);}
  .ownerbar{display:inline-block;width:4px;height:16px;border-radius:2px;margin-right:9px;vertical-align:-3px;}
  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;margin:8px 0 24px;}
  .bigscore{font-family:var(--display);font-size:84px;line-height:.9;}
  .winnerbanner{text-align:center;padding:22px;border-radius:16px;margin-bottom:22px;border:1px solid var(--line-strong);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  @media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}.bigscore{font-size:60px;}}
  .teamline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .teamline .p{font-family:var(--mono);font-weight:700;}.teamline.click{cursor:pointer;}.teamline.click:hover{color:var(--gold);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#3a1414;border:1px solid #FF7A7A;color:#ffd9d9;padding:12px 18px;border-radius:11px;font-size:14px;z-index:80;}
  .row{display:flex;gap:12px;align-items:center;}.spread{display:flex;justify-content:space-between;align-items:center;}
  .stat{font-family:var(--mono);}.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  .smallcap{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--chalk-dim);}
  .seg{display:flex;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-wrap:wrap;}
  .seg button{background:transparent;border:none;color:var(--chalk-dim);padding:9px 13px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
  .seg button.on{background:var(--pitch-2);color:var(--chalk);}
  .modal{position:fixed;inset:0;background:rgba(3,16,12,.74);z-index:70;display:flex;align-items:center;justify-content:center;padding:18px;}
  .modalbox{max-width:820px;width:100%;max-height:92vh;overflow:auto;padding:22px;}
  .xline{display:grid;grid-template-columns:34px 1fr auto auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer;}
  .xline:hover{color:var(--gold);}
  .bar{display:grid;grid-template-columns:120px 1fr 34px;gap:10px;align-items:center;margin:6px 0;font-size:13px;}
  .bar .track{height:8px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden;}
  .bar .fill{height:100%;border-radius:5px;}
  .bar .v{font-family:var(--mono);text-align:right;font-weight:700;}
  .traitchip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(244,201,93,.4);background:rgba(244,201,93,.1);border-radius:999px;padding:4px 10px;margin:3px 4px 0 0;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chiptoggle{font-size:12px;font-weight:600;border:1px solid var(--line-strong);background:transparent;color:var(--chalk-dim);border-radius:999px;padding:6px 11px;}
  .chiptoggle.on{background:var(--gold);color:#2A1C00;border-color:var(--gold);}
  .attgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  @media(max-width:620px){.attgrid{grid-template-columns:repeat(2,1fr);}}
  .att label{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);display:block;margin-bottom:3px;}
  .att input{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line-strong);color:var(--chalk);border-radius:9px;padding:8px;font-family:var(--mono);font-size:14px;}
  .cvrow{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
  .cvrow .nm{font-weight:600;}.cvrow .meta{font-size:12px;color:var(--chalk-dim);}
  code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.js"></script>
<script>
/* ============================================================================
   Draft Zone League — hot-seat SPIN draft + season simulation. Single file.
   Spin a club & season -> draft one player from that squad into an open slot ->
   swap to the other player -> repeat. 20 teams, full season, most points wins.
   Includes a full in-app data editor so you can add ANY club-version yourself.
   ========================================================================== */
const { useReducer, useState, useMemo, useEffect } = React;
const html = htm.bind(React.createElement);
const DEFAULT_DATA = __DEFAULT_DATA__; // real historical squads, injected at build time
/* ============================================================================
   Draft Zone League — budget draft + Football-Manager-style season sim.
   Two players, 10 teams each. Player 1 builds all 10 teams, then Player 2.
   Per team: pick a formation, allocate part of your pot, then click any
   position/manager slot to sign from everyone who can play there (by value).
   Every player/manager is globally unique. Full FM attributes drive a deep
   season simulation; most combined league points wins. Single self-file.
   ========================================================================== */

/* ---------- positions, formations, attribute taxonomy ---------- */
const POS_LINE={GK:'GK',CB:'DEF',LB:'DEF',RB:'DEF',CDM:'MID',CM:'MID',CAM:'MID',LM:'MID',RM:'MID',LW:'FWD',RW:'FWD',ST:'FWD',CF:'FWD'};
const POS_NAME={GK:'Goalkeeper',CB:'Centre-back',LB:'Left-back',RB:'Right-back',CDM:'Defensive mid',CM:'Central mid',CAM:'Attacking mid',LM:'Left mid',RM:'Right mid',LW:'Left wing',RW:'Right wing',ST:'Striker',CF:'Centre-forward'};
const FORMATION_ROWS={
  '4-3-3':[['GK'],['LB','CB','CB','RB'],['CDM','CM','CM'],['LW','ST','RW']],
  '4-4-2':[['GK'],['LB','CB','CB','RB'],['LM','CM','CM','RM'],['ST','ST']],
  '4-2-3-1':[['GK'],['LB','CB','CB','RB'],['CDM','CDM'],['LW','CAM','RW'],['ST']],
  '4-3-2-1':[['GK'],['LB','CB','CB','RB'],['CDM','CM','CM'],['CAM','CAM'],['ST']],
  '4-1-2-1-2':[['GK'],['LB','CB','CB','RB'],['CDM'],['CM','CM'],['CAM'],['ST','ST']],
  '4-2-2-2':[['GK'],['LB','CB','CB','RB'],['CDM','CDM'],['CAM','CAM'],['ST','ST']],
  '4-5-1':[['GK'],['LB','CB','CB','RB'],['LM','CM','CDM','CM','RM'],['ST']],
  '4-4-1-1':[['GK'],['LB','CB','CB','RB'],['LM','CM','CM','RM'],['CAM'],['ST']],
  '3-4-3':[['GK'],['CB','CB','CB'],['LM','CM','CM','RM'],['LW','ST','RW']],
  '3-5-2':[['GK'],['CB','CB','CB'],['LM','CM','CDM','CM','RM'],['ST','ST']],
  '5-3-2':[['GK'],['LB','CB','CB','CB','RB'],['CDM','CM','CM'],['ST','ST']],
  '5-4-1':[['GK'],['LB','CB','CB','CB','RB'],['LM','CM','CM','RM'],['ST']],
  '5-2-3':[['GK'],['LB','CB','CB','CB','RB'],['CM','CM'],['LW','ST','RW']],
};
function buildFormation(name,rows){const slots=[];const n=rows.length;let oi=0;
  rows.forEach((row,ri)=>{const y=ri===0?91:Math.round(77-(ri-1)*((77-14)/(n-2)));const k=row.length;
    row.forEach((pos,ci)=>{const x=k===1?50:Math.round(15+ci*(70/(k-1)));const id=ri===0?'GK':('o'+(++oi));
      slots.push({id,pos,x,y,line:POS_LINE[pos]});});});
  const counts={GK:0,DEF:0,MID:0,FWD:0};slots.forEach(s=>counts[s.line]++);return{name,slots,counts};}
const FORMATIONS={};Object.keys(FORMATION_ROWS).forEach(n=>FORMATIONS[n]=buildFormation(n,FORMATION_ROWS[n]));
const FORMATION_NAMES=Object.keys(FORMATIONS);
function fSlotsOf(formation){return (FORMATIONS[formation]||FORMATIONS['4-3-3']).slots;}
function fSlots(team){return fSlotsOf(team.formation);}
function teamSlotIds(team){return ['MANAGER',...fSlots(team).map(s=>s.id)];}
function eligPos(card){return [card.primary,...(card.secondaries||[])];}
function openSlotsFor(team,card){return fSlots(team).filter(s=>!team.slots[s.id]&&eligPos(card).includes(s.pos));}
function formationCounts(name){return FORMATIONS[name]?FORMATIONS[name].counts:{GK:1,DEF:4,MID:3,FWD:3};}

const TECH=[['corners','Corners'],['crossing','Crossing'],['dribbling','Dribbling'],['finishing','Finishing'],['firstTouch','First Touch'],['freeKick','Free Kicks'],['heading','Heading'],['longShots','Long Shots'],['longThrows','Long Throws'],['marking','Marking'],['passing','Passing'],['penalties','Penalties'],['tackling','Tackling'],['technique','Technique']];
const MENT=[['aggression','Aggression'],['anticipation','Anticipation'],['bravery','Bravery'],['composure','Composure'],['concentration','Concentration'],['decisions','Decisions'],['determination','Determination'],['flair','Flair'],['leadership','Leadership'],['offTheBall','Off The Ball'],['positioning','Positioning'],['teamwork','Teamwork'],['vision','Vision'],['workRate','Work Rate']];
const PHYS=[['acceleration','Acceleration'],['agility','Agility'],['balance','Balance'],['jumpingReach','Jumping Reach'],['naturalFitness','Natural Fitness'],['pace','Pace'],['stamina','Stamina'],['strength','Strength']];
const GKA=[['aerialReach','Aerial Reach'],['commandOfArea','Command of Area'],['communication','Communication'],['eccentricity','Eccentricity'],['handling','Handling'],['kicking','Kicking'],['oneOnOnes','One on Ones'],['punching','Punching'],['reflexes','Reflexes'],['rushingOut','Rushing Out'],['throwing','Throwing']];
const MGR_ATTRS=[['adaptability','Adaptability'],['attacking','Attacking'],['defending','Defending'],['determination','Determination'],['discipline','Discipline'],['fitness','Fitness'],['levelOfDiscipline','Level of Discipline'],['manManagement','Man Management'],['mental','Mental'],['motivating','Motivating'],['peopleManagement','People Management'],['tactical','Tactical'],['technical','Technical']];

/* ---------- rating colour scale: purple (best) -> green -> yellow -> red ---------- */
function colorForRating(v){
  v=Math.max(1,Math.min(99,Math.round(v||0)));
  let bg,fg='#06231A';
  if(v>=96){const t=(v-96)/3;bg=mix('#7A3BB0','#4A1480',t);fg='#fff';}      // deepening purple 96-99
  else if(v>=92){bg='#15803D';fg='#EAFBF2';}                                 // dark green
  else if(v>=88){bg='#2E9E4F';fg='#EAFBF2';}                                 // green
  else if(v>=84){bg='#54C273';}                                              // light green
  else if(v>=80){bg='#8FCB52';}                                             // lime
  else if(v>=76){bg='#D7D24A';fg='#2A2400';}                                // yellow
  else if(v>=71){bg='#E6A93C';fg='#2A1C00';}                                // amber
  else if(v>=64){bg='#E27A3A';fg='#2A1300';}                                // orange
  else{bg='#D44A4A';fg='#fff';}                                             // red
  return {bg,fg};
}
function mix(a,b,t){const pa=hx(a),pb=hx(b);const r=Math.round(pa[0]+(pb[0]-pa[0])*t),g=Math.round(pa[1]+(pb[1]-pa[1])*t),bl=Math.round(pa[2]+(pb[2]-pa[2])*t);return `rgb(${r},${g},${bl})`;}
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function ratingStyle(v){const c=colorForRating(v);return {background:c.bg,color:c.fg};}

/* ---------- RNG + poisson ---------- */
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function hashSeed(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function makeRng(seed){const n=mulberry32(typeof seed==='string'?hashSeed(seed):seed);return{
  float:()=>n(),int:(lo,hi)=>Math.floor(n()*(hi-lo+1))+lo,
  poisson:(l)=>{if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=n();}while(p>L);return k-1;},
  weighted:(w)=>{const t=w.reduce((a,b)=>a+b,0);if(t<=0)return 0;let r=n()*t;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}return w.length-1;}};}

/* ============================================================================
   DEEP SIMULATION — every player attribute + manager attribute contributes.
   Role scores are weighted blends of FM attributes; attack & creation use a
   mean/max blend so a single superstar (e.g. prime Messi) lifts the whole team.
   ========================================================================== */
const W_DEF={tackling:3,marking:3,positioning:3,anticipation:2.6,concentration:2.4,bravery:1.4,strength:2,jumpingReach:1.4,heading:1.5,composure:1.8,decisions:2,aggression:1,workRate:1.6,acceleration:1,pace:1.1};
const W_ATT={finishing:3.6,offTheBall:3,composure:2.4,anticipation:2,dribbling:1.6,technique:1.6,firstTouch:2,flair:1.5,longShots:1.4,heading:1.4,acceleration:1.6,pace:1.6,balance:1,agility:1.1};
const W_CRE={vision:3,passing:3,technique:2.6,decisions:2,flair:2,composure:1.6,offTheBall:1.6,crossing:1.5,firstTouch:2,dribbling:1.6,anticipation:1.4};
const W_CON={passing:3,vision:2,technique:2.4,composure:2,decisions:2,teamwork:2,workRate:2,stamina:1.6,firstTouch:2,anticipation:1.5,tackling:1.4,positioning:1.4};
const W_GK={reflexes:3,handling:3,oneOnOnes:2.6,commandOfArea:2.2,aerialReach:2,kicking:1.4,positioning:2,concentration:2,anticipation:1.8,communication:1.4,composure:1.6,agility:1.6,throwing:1};
function pScore(p,W){let s=0,t=0;for(const a in W){if(p[a]!=null){s+=p[a]*W[a];t+=W[a];}}return t?s/t:50;}
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
function blend(arr,wMean,wMax){if(!arr.length)return 48;return avg(arr)*wMean+Math.max.apply(null,arr)*wMax;}

const BASE_GOALS=1.32,QEXP=1.85,HOME_ADV=1.10,POSS_INF=0.42,BIGM=82,SEC_PEN=0.93;
function buildProfile(team){
  const P=team.players;
  const adj=(p,v)=>p.inPrimaryPosition?v:v*SEC_PEN;
  const gks=P.filter(p=>p.line==='GK'),defs=P.filter(p=>p.line==='DEF'),mids=P.filter(p=>p.line==='MID'),fwds=P.filter(p=>p.line==='FWD');
  const dArr=defs.map(p=>adj(p,pScore(p,W_DEF)));
  const def=dArr.length?(avg(dArr)*0.82+Math.min.apply(null,dArr)*0.18):46;     // back line: weak link matters
  const gk=gks.length?pScore(gks[0],W_GK):44;
  const midCon=blend(mids.map(p=>adj(p,pScore(p,W_CON))),0.74,0.26);
  const midDef=avg(mids.map(p=>adj(p,pScore(p,W_DEF))))||45;
  const midCre=blend(mids.map(p=>adj(p,pScore(p,W_CRE))),0.6,0.4);
  const fwdAtt=blend(fwds.map(p=>adj(p,pScore(p,W_ATT))),0.55,0.45);
  const fwdCre=blend(fwds.map(p=>adj(p,pScore(p,W_CRE))),0.55,0.45);
  const cf=(c,b)=>Math.sqrt(Math.max(1,c)/b);
  const dF=cf(defs.length,4),mF=cf(mids.length,3),fF=cf(fwds.length,3);
  let attLine=fwdAtt*fF, conLine=midCon*mF, defLine=def*dF, midDefLine=midDef*mF;
  let creation=midCre*mF*0.52+fwdCre*fF*0.48;
  let attackOut=attLine*0.58+creation*0.30+conLine*0.12;
  let defResist=defLine*0.5+gk*0.3+midDefLine*0.2;
  // manager
  const m=team.manager||{attacking:55,defending:55,tactical:55,motivating:55,manManagement:55,peopleManagement:55,levelOfDiscipline:55,discipline:55,mental:55,determination:55,adaptability:55,fitness:60};
  const counts=formationCounts(team.formation);
  const formBias=(counts.FWD-counts.DEF)/5;             // + attacking shape, - defensive shape
  const mgrLean=(m.attacking-m.defending)/100;
  const fit=1-Math.min(0.55,Math.abs(formBias*1.8-mgrLean));   // 0.45..1 how well manager suits the shape
  const fitBonus=1+(m.tactical/100)*(fit-0.72)*0.20;          // tactical managers amplify good fit, punish mismatch
  const attackMod=(0.83+(m.attacking/100)*0.34+(m.tactical/100)*0.10+(m.motivating/100)*0.06)*fitBonus;
  const defenceMod=(0.83+(m.defending/100)*0.34+(m.tactical/100)*0.10+(m.levelOfDiscipline/100)*0.06)*fitBonus;
  const teamwork=avg(P.map(p=>p.teamwork||50)),workrate=avg(P.map(p=>p.workRate||50));
  const cohesion=0.90+((m.manManagement+m.peopleManagement+m.motivating)/300)*0.12+((teamwork+workrate)/200)*0.05;
  attackOut*=attackMod*cohesion;defResist*=defenceMod*cohesion;
  const avgBig=m.mental*0.34+m.determination*0.16+avg(P.map(p=>p.composure||50))*0.25+avg(P.map(p=>p.concentration||50))*0.25;
  return {attackOutput:attackOut,defensiveResistance:defResist,midControl:conLine,avgBig,
          counter:0.5+(m.tactical/200),poss:0.5+(m.tactical/300),topAtt:fwdAtt};
}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function attribute(team,goals,rng){
  const ev=[];if(goals<=0)return ev;
  const pool=team.players.filter(p=>p.line!=='GK');
  const sw=pool.map(p=>{const base=(p.finishing||40)*1.6+(p.offTheBall||40)*1.0+(p.anticipation||40)*0.5+(p.longShots||30)*0.3;const lf=p.line==='FWD'?1.0:p.line==='MID'?0.5:0.14;return Math.max(1,base*lf);});
  const aw=pool.map(p=>{const base=(p.vision||40)*1.3+(p.passing||40)*1.0+(p.crossing||30)*0.6+(p.flair||30)*0.5;const lf=p.line==='FWD'?0.85:p.line==='MID'?1.0:0.3;return Math.max(1,base*lf);});
  for(let g=0;g<goals;g++){const min=rng.int(1,90),si=rng.weighted(sw),sc=pool[si];
    ev.push({pid:sc.id,team:team.teamId,type:'GOAL',minute:min,name:sc.name});
    if(rng.float()<0.78&&pool.length>1){let ai=rng.weighted(aw);if(ai===si)ai=(ai+1)%pool.length;
      ev.push({pid:pool[ai].id,team:team.teamId,type:'ASSIST',minute:min,name:pool[ai].name});}}
  return ev;
}
function simulateMatch(home,away,seed){
  const rng=makeRng(seed),H=buildProfile(home),A=buildProfile(away);
  const hMid=H.midControl*H.poss*2,aMid=A.midControl*A.poss*2;
  const hShare=hMid/(hMid+aMid),aShare=1-hShare;
  const hPoss=1+(hShare-0.5)*2*POSS_INF,aPoss=1+(aShare-0.5)*2*POSS_INF;
  const hCtr=1+aShare*H.counter*0.22,aCtr=1+hShare*A.counter*0.22;
  let hXg=BASE_GOALS*Math.pow(H.attackOutput/A.defensiveResistance,QEXP)*hPoss*hCtr*HOME_ADV;
  let aXg=BASE_GOALS*Math.pow(A.attackOutput/H.defensiveResistance,QEXP)*aPoss*aCtr;
  if(H.topAtt>=BIGM&&A.topAtt>=BIGM){const d=(H.avgBig-A.avgBig)/100;hXg*=1+d*0.12;aXg*=1-d*0.12;}
  hXg=clamp(hXg,0.16,5.6);aXg=clamp(aXg,0.16,5.6);
  const hg=rng.poisson(hXg),ag=rng.poisson(aXg);
  return {homeTeamId:home.teamId,awayTeamId:away.teamId,homeGoals:hg,awayGoals:ag,homeXg:Math.round(hXg*100)/100,awayXg:Math.round(aXg*100)/100,events:[...attribute(home,hg,rng),...attribute(away,ag,rng)]};
}
function generateFixtures(ids,seed){
  const rng=makeRng(seed);const teams=ids.slice();
  for(let i=teams.length-1;i>0;i--){const j=rng.int(0,i);[teams[i],teams[j]]=[teams[j],teams[i]];}
  const n=teams.length,rounds=n-1,half=n/2,arr=teams.slice(),first=[];
  for(let r=0;r<rounds;r++){for(let i=0;i<half;i++){const t1=arr[i],t2=arr[n-1-i],hf=(r+i)%2===0;first.push({matchday:r+1,homeTeamId:hf?t1:t2,awayTeamId:hf?t2:t1});}
    const fixed=arr[0],rest=arr.slice(1);rest.unshift(rest.pop());arr.splice(0,arr.length,fixed,...rest);}
  return first.concat(first.map(f=>({matchday:f.matchday+rounds,homeTeamId:f.awayTeamId,awayTeamId:f.homeTeamId})));
}
function computeTable(ids,results){
  const m=new Map(ids.map(id=>[id,{teamId:id,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,pts:0}]));
  for(const r of results){const h=m.get(r.homeTeamId),a=m.get(r.awayTeamId);if(!h||!a)continue;
    h.played++;a.played++;h.gf+=r.homeGoals;h.ga+=r.awayGoals;a.gf+=r.awayGoals;a.ga+=r.homeGoals;
    if(r.homeGoals>r.awayGoals){h.won++;h.pts+=3;a.lost++;}else if(r.homeGoals<r.awayGoals){a.won++;a.pts+=3;h.lost++;}else{h.drawn++;a.drawn++;h.pts++;a.pts++;}}
  const rows=[...m.values()].sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf||x.teamId.localeCompare(y.teamId));
  rows.forEach((r,i)=>{r.gd=r.gf-r.ga;r.position=i+1;});return rows;
}
function computeScores(teams,table){
  const pos=new Map(table.map(r=>[r.teamId,r]));
  const mk=slot=>{const mine=teams.filter(t=>t.owner===slot);
    const tp=mine.map(t=>{const r=pos.get(t.id)||{pts:0,position:0};return{id:t.id,name:t.name,pts:r.pts,position:r.position};});
    return{total:tp.reduce((s,x)=>s+x.pts,0),teams:tp.sort((a,b)=>a.position-b.position)};};
  const p1=mk(1),p2=mk(2);return{p1,p2,winner:p1.total===p2.total?0:(p1.total>p2.total?1:2)};
}
function cardMapOf(cat){return new Map([...cat.players,...cat.managers].map(c=>[c.id,c]));}
function toSim(team,cards){
  const mgr=cards.get(team.slots.MANAGER);const players=[];
  for(const s of fSlots(team)){const id=team.slots[s.id];if(!id)continue;const c=cards.get(id);if(!c)continue;
    players.push({...c,line:s.line,slotPos:s.pos,inPrimaryPosition:c.primary===s.pos});}
  return{teamId:team.id,name:team.name,owner:team.owner,formation:team.formation,players,manager:mgr};
}

function jit(name,attr){let h=0;const s=(name||'x')+'|'+attr;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return (h%5)-2;}
function deriveAttrs(name,pos,ovr){
  const d=DELTAS[pos]||{};const o={};const line=POS_LINE[pos];
  OUT_K.forEach(a=>{const delta=(d[a]!==undefined)?d[a]:(GEN_D[a]||0);o[a]=clampA(ovr+delta+jit(name,a));});
  if(pos==='GK')GKA_K.forEach(a=>o[a]=clampA(ovr+(GK_GROUP[a]||0)+jit(name,a)));
  const cap=(k,m)=>{o[k]=Math.min(o[k],clampA(m+jit(name,k+'c')));};
  if(line==='FWD'||pos==='CAM'){cap('marking',30);cap('tackling',37);cap('positioning',49);}
  if(line==='DEF'){['finishing','longShots','corners','freeKick','penalties'].forEach(k=>cap(k,40));cap('dribbling',60);cap('flair',52);if(pos==='CB'){cap('crossing',42);cap('vision',60);cap('technique',64);cap('pace',86);}}
  return o;
}
function mgrDerive(ovr,name){const b=ovr;const a={};MGR_K.forEach(k=>a[k]=clampA(b+jit(name,k)));a.attacking=clampA(b+jit(name,'at'));a.defending=clampA(b+jit(name,'de'));a.tactical=clampA(b+2);return a;}

function newId(pre){return pre+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function cvKey(club,season){return (club||'').trim()+'__'+(season||'').trim();}
function listClubVersions(cat){
  const map=new Map();
  cat.managers.forEach(m=>{const k=cvKey(m.club,m.season);if(!map.has(k))map.set(k,{club:m.club,season:m.season,manager:null,players:[]});map.get(k).manager=m;});
  cat.players.forEach(p=>{const k=cvKey(p.club,p.season);if(!map.has(k))map.set(k,{club:p.club,season:p.season,manager:null,players:[]});map.get(k).players.push(p);});
  return[...map.values()].sort((a,b)=>(a.club+a.season).localeCompare(b.club+b.season));
}
function csvCell(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function parseCSV(text){const rows=[];let i=0,f='',row=[],q=false;text=text.replace(/^\uFEFF/,'');
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;if(f!==''||row.length){row.push(f);rows.push(row);row=[];f='';}}else f+=c;}i++;}
  if(f!==''||row.length){row.push(f);rows.push(row);}
  if(!rows.length)return[];const head=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1).map(r=>{const o={};head.forEach((h,j)=>o[h]=(r[j]??'').trim());return o;});
}

const ROUNDS=10;
function freshState(cat){const budget=(cat.config&&cat.config.budget)||10000;
  return{screen:'setup',p1Name:'',p2Name:'',catalogue:cat,budget,pot:{1:budget,2:budget},
    teams:[],draft:{},builder:1,cur:null,step:'formation',market:null,profile:null,error:null,
    results:null,table:null,scores:null,byDay:null,simDay:0};}
function emptySlots(formation){const s={MANAGER:null};fSlotsOf(formation).forEach(x=>s[x.id]=null);return s;}
function teamsOf(state,owner){return state.teams.filter(t=>t.owner===owner);}
function newCur(state,owner){const n=teamsOf(state,owner).length+1;const nm=(owner===1?state.p1Name:state.p2Name)||('Player '+owner);
  return{id:newId('t'+owner),owner,formation:'4-3-3',name:nm+' '+n,budget:0,slots:emptySlots('4-3-3'),spent:0};}
function teamComplete(t){return teamSlotIds(t).every(s=>t.slots[s]);}
function undrafted(state){const c=state.catalogue;return{players:c.players.filter(p=>!state.draft[p.id]),managers:c.managers.filter(m=>!state.draft[m.id])};}
function cheapestForSlot(pool,pos){let min=Infinity;for(const p of pool){if(eligPos(p).includes(pos)&&p.value<min)min=p.value;}return min;}
function minTeamCost(state,formation){const u=undrafted(state);let sum=0;const used={};
  for(const s of fSlotsOf(formation)){let min=Infinity,pick=null;for(const p of u.players){if(used[p.id])continue;if(eligPos(p).includes(s.pos)&&p.value<min){min=p.value;pick=p;}}if(pick){used[pick.id]=true;sum+=min;}else return Infinity;}
  let mm=Infinity;for(const m of u.managers)if(m.value<mm)mm=m.value;return sum+(mm===Infinity?0:mm);}
function greedyFillCost(players,managers,formation,used){let cost=0;
  for(const s of fSlotsOf(formation)){let mn=Infinity,pk=null;for(const p of players){if(used.has(p.id))continue;if(eligPos(p).includes(s.pos)&&p.value<mn){mn=p.value;pk=p;}}if(!pk)return Infinity;used.add(pk.id);cost+=mn;}
  let mm=Infinity,mk=null;for(const m of managers){if(used.has(m.id))continue;if(m.value<mm){mm=m.value;mk=m;}}if(!mk)return Infinity;used.add(mk.id);cost+=mm;return cost;}
function bestFillForTeam(players,managers,used){let bestCost=Infinity,bestSet=null;
  for(const f of FORMATION_NAMES){const trial=new Set(used);const c=greedyFillCost(players,managers,f,trial);if(isFinite(c)&&c<bestCost){bestCost=c;bestSet=trial;}}
  if(bestSet){bestSet.forEach(id=>used.add(id));return bestCost;}return Infinity;}
function cheapestFormation(state){let best='4-3-3',bc=Infinity;for(const f of FORMATION_NAMES){const c=minTeamCost(state,f);if(c<bc){bc=c;best=f;}}return best;}
function maxBudget(state,fOverride){
  const k=ROUNDS-teamsOf(state,state.builder).length-1; // teams left AFTER this one
  if(k<=0)return state.pot[state.builder];
  const u=undrafted(state);const players=u.players,managers=u.managers;const used=new Set();
  const thisF=fOverride||(state.cur?state.cur.formation:'4-3-3');
  greedyFillCost(players,managers,thisF,used);
  let reserve=0;
  for(let i=0;i<k;i++){const c=bestFillForTeam(players,managers,used);if(!isFinite(c)){reserve=Infinity;break;}reserve+=c;}
  if(!isFinite(reserve))return 0;
  return Math.max(0,state.pot[state.builder]-reserve);}
function canAffordFormation(state,f){return minTeamCost(state,f)<=maxBudget(state,f);}

function startSim(state){
  const cards=cardMapOf(state.catalogue);const sims=state.teams.map(t=>toSim(t,cards));
  const byId=new Map(sims.map(s=>[s.teamId,s]));const ids=sims.map(s=>s.teamId);
  const fixtures=generateFixtures(ids,hashSeed(ids.join('|')));
  const byDay={};const results=[];
  fixtures.forEach(fx=>{const h=byId.get(fx.homeTeamId),a=byId.get(fx.awayTeamId);
    const r=simulateMatch(h,a,fx.homeTeamId+'_'+fx.awayTeamId+'_'+fx.matchday);r.matchday=fx.matchday;
    results.push(r);(byDay[fx.matchday]=byDay[fx.matchday]||[]).push(r);});
  const table=computeTable(ids,results);const scores=computeScores(state.teams,table);
  return{...state,screen:'sim',simDay:0,results,table,scores,byDay,market:null,profile:null,cur:null};
}

function reducer(state,a){
  switch(a.type){
    case 'SET_NAMES':return{...state,p1Name:a.p1,p2Name:a.p2};
    case 'SET_CATALOGUE':{const budget=(a.cat.config&&a.cat.config.budget)||state.budget;return{...state,catalogue:a.cat,budget,pot:{1:budget,2:budget}};}
    case 'ERR':return{...state,error:a.msg};
    case 'CLR_ERR':return{...state,error:null};
    case 'GO':return{...state,screen:a.screen,error:null};
    case 'START_BUILD':{const budget=state.budget;const s0={...state,pot:{1:budget,2:budget},teams:[],draft:{},builder:1,results:null,table:null,scores:null,byDay:null,simDay:0,market:null,profile:null};
      return{...s0,screen:'build',step:'formation',cur:newCur(s0,1)};}
    case 'CHOOSE_FORMATION':{if(!state.cur)return state;return{...state,cur:{...state.cur,formation:a.formation,slots:emptySlots(a.formation),spent:0},error:null};}
    case 'SET_NAME':{if(!state.cur)return state;return{...state,cur:{...state.cur,name:a.name}};}
    case 'GO_BUDGET':{if(!state.cur||!state.cur.formation)return{...state,error:'Pick a formation first'};
      const maxB=maxBudget(state),minC=minTeamCost(state,state.cur.formation);
      if(minC>maxB)return{...state,error:'Not enough left for a '+state.cur.formation+' — pick a cheaper shape'};
      const sugg=Math.min(maxB,Math.round(state.pot[state.builder]/(ROUNDS-teamsOf(state,state.builder).length)));
      const start=Math.max(minC,Math.min(maxB,sugg||minC));
      return{...state,step:'budget',cur:{...state.cur,budget:state.cur.budget||start},error:null};}
    case 'SET_BUDGET':{if(!state.cur)return state;const minC=minTeamCost(state,state.cur.formation);const maxB=maxBudget(state);
      const lo=Math.min(minC,maxB);return{...state,cur:{...state.cur,budget:Math.max(lo,Math.min(maxB,Math.round(a.amount)))}};}
    case 'GO_FILL':{if(!state.cur)return state;const minC=minTeamCost(state,state.cur.formation);
      if(state.cur.budget<minC)return{...state,error:'Budget too low to fill this team ('+fmtM(minC)+' minimum)'};
      return{...state,step:'fill',error:null};}
    case 'BACK':{return{...state,step:a.step,market:null,profile:null,error:null};}
    case 'OPEN_MARKET':{if(!state.cur)return state;const pos=a.slotId==='MANAGER'?'MANAGER':(fSlots(state.cur).find(s=>s.id===a.slotId)||{}).pos;
      return{...state,market:{slotId:a.slotId,pos},profile:null};}
    case 'CLOSE_MARKET':return{...state,market:null,profile:null};
    case 'VIEW_PROFILE':return{...state,profile:a.cardId};
    case 'CLOSE_PROFILE':return{...state,profile:null};
    case 'BUY':{if(!state.cur||!state.market)return state;const card=a.card;const slotId=state.market.slotId;
      if(state.draft[card.id])return{...state,error:'Already signed by another team'};
      const left=state.cur.budget-state.cur.spent;if(card.value>left)return{...state,error:fmtM(card.value)+' is more than this team can afford ('+fmtM(left)+' left)'};
      if(slotId==='MANAGER'){if(card.kind!=='manager')return state;}
      else{const slot=fSlots(state.cur).find(s=>s.id===slotId);if(!slot||!eligPos(card).includes(slot.pos))return{...state,error:'That player cannot play there'};if(state.cur.slots[slotId])return{...state,error:'Position already filled'};}
      const cur={...state.cur,slots:{...state.cur.slots,[slotId]:card.id},spent:state.cur.spent+card.value};
      return{...state,cur,draft:{...state.draft,[card.id]:true},market:null,profile:null,error:null};}
    case 'RELEASE':{if(!state.cur)return state;const id=state.cur.slots[a.slotId];if(!id)return state;const card=cardMapOf(state.catalogue).get(id);
      const cur={...state.cur,slots:{...state.cur.slots,[a.slotId]:null},spent:Math.max(0,state.cur.spent-(card?card.value:0))};
      const draft={...state.draft};delete draft[id];return{...state,cur,draft,profile:null};}
    case 'FINISH_TEAM':{if(!state.cur||!teamComplete(state.cur))return{...state,error:'Fill every position and the manager slot first'};
      const teams=[...state.teams,state.cur];const pot={...state.pot,[state.builder]:state.pot[state.builder]-state.cur.spent};
      const s1={...state,teams,pot,cur:null,market:null,profile:null,error:null};
      const built=teamsOf(s1,state.builder).length;
      if(built<ROUNDS)return{...s1,step:'formation',cur:newCur(s1,state.builder)};
      if(state.builder===1)return{...s1,builder:2,step:'formation',cur:newCur(s1,2)};
      return startSim(s1);}
    case 'SIM_TICK':return{...state,simDay:Math.min(state.simDay+1,38)};
    case 'RESET':{const f=freshState(state.catalogue);saveState(f);return f;}
    default:return state;
  }
}

function Build({state,dispatch}){
  const cards=useMemo(()=>cardMapOf(state.catalogue),[state.catalogue,state.draft]);

          <div class="posbtns">${fSlots(cur).filter(s=>!cur.slots[s.id]).map(s=>html`<button key=${s.id} class="posbtn" onClick=${()=>dispatch({type:'OPEN_MARKET',slotId:s.id})}>${s.pos}</button>`)}

function Simulating({state,dispatch}){
  useEffect(()=>{if(state.simDay>=38)return;const t=setTimeout(()=>dispatch({type:'SIM_TICK'}),120);return()=>clearTimeout(t);},[state.simDay]);
  const ids=state.teams.map(t=>t.id);const upto=[];for(let d=1;d<=state.simDay;d++)(state.byDay[d]||[]).forEach(r=>upto.push(r));
  const tbl=computeTable(ids,upto);const nameOf=new Map(state.teams.map(t=>[t.id,t]));const done=state.simDay>=38;
  return html`<div class="wrap"><div class="panel" style=${{padding:'24px',marginTop:'22px'}}>
    <div class="spread"><div><div class="eyebrow">Season in progress</div><h2 class="head">Matchday ${state.simDay} / 38</h2></div>

    <div class="pb" style=${{height:'8px',marginTop:'14px'}}><i style=${{width:(state.simDay/38*100)+'%',background:'var(--gold)',transition:'width .12s',display:'block',height:'100%'}}></i></div>
    <div style=${{marginTop:'18px',maxHeight:'52vh',overflow:'auto'}}><${LeagueTable} rows=${tbl} nameOf=${nameOf}/></div>
  </div></div>`;
}

function Results({state,dispatch}){
  const cards=useMemo(()=>cardMapOf(state.catalogue),[state.catalogue]);
  const nameOf=useMemo(()=>new Map(state.teams.map(t=>[t.id,t])),[state.teams]);
  const [sel,setSel]=useState(null);const [pcard,setPcard]=useState(null);const [tab,setTab]=useState('table');const [statSort,setStatSort]=useState('g');
  const sc=state.scores;const winName=sc.winner===0?'Tie':sc.winner===1?state.p1Name:state.p2Name;
  const winColor=sc.winner===2?'var(--p2)':'var(--p1)';
  const playerStats=useMemo(()=>{
    const goals={},assists={},cs={};
    state.results.forEach(m=>{m.events.forEach(e=>{if(e.type==='GOAL')goals[e.pid]=(goals[e.pid]||0)+1;else assists[e.pid]=(assists[e.pid]||0)+1;});
      const home=nameOf.get(m.homeTeamId),away=nameOf.get(m.awayTeamId);
      if(m.awayGoals===0&&home&&home.slots.GK)cs[home.slots.GK]=(cs[home.slots.GK]||0)+1;
      if(m.homeGoals===0&&away&&away.slots.GK)cs[away.slots.GK]=(cs[away.slots.GK]||0)+1;});
    const rows=[];state.teams.forEach(t=>{fSlots(t).forEach(s=>{const id=t.slots[s.id];if(!id)return;const c=cards.get(id);if(!c)return;
      rows.push({card:c,team:t.name,owner:t.owner,pos:s.pos,ovr:c.overall,g:goals[id]||0,a:assists[id]||0,cs:cs[id]||0});});});
    return rows;
  },[state.results]);
  const sorted=[...playerStats].sort((a,b)=>statSort==='g'?b.g-a.g:statSort==='a'?b.a-a.a:statSort==='cs'?b.cs-a.cs:b.ovr-a.ovr).slice(0,60);
  const biggest=useMemo(()=>{return [...state.results].map(m=>({...m,marg:Math.abs(m.homeGoals-m.awayGoals),tot:m.homeGoals+m.awayGoals})).sort((a,b)=>b.marg-a.marg||b.tot-a.tot).slice(0,6);},[state.results]);
  return html`<div class="wrap">
    ${sel&&html`<${TeamView} team=${state.teams.find(t=>t.id===sel)} cards=${cards} state=${state} viewPlayer=${c=>setPcard(c)} onClose=${()=>setSel(null)} />`}
    ${pcard&&html`<${ProfileModal} card=${pcard} state=${state} dispatch=${{}} />`}
    <div class="winnerbanner" style=${{boxShadow:`inset 0 -4px 0 ${winColor}`,marginTop:'22px'}}>
      <div class="eyebrow">Full-time · combined points</div>
      <div class="vs"><div style=${{textAlign:'right'}}><div class="smallcap">${state.p1Name}</div><div class="bigscore" style=${{color:'var(--p1)'}}>${sc.p1.total}</div></div>
        <div class="smallcap">PTS</div>
        <div style=${{textAlign:'left'}}><div class="smallcap">${state.p2Name}</div><div class="bigscore" style=${{color:'var(--p2)'}}>${sc.p2.total}</div></div></div>
      <h2 class="head" style=${{fontSize:'26px'}}>${sc.winner===0?'It\'s a tie!':winName+' wins!'}</h2>
      <div style=${{marginTop:'16px'}}><button class="btn ghost" onClick=${()=>{if(confirm('Start a brand-new game? This clears both squads and the season.'))dispatch({type:'RESET'});}}>New game (reset everything)</button></div>
    </div>
    <div class="seg" style=${{marginBottom:'16px'}}>
      ${[['table','League'],['players','Players'],['matches','Big results'],['squads','Squads']].map(([k,l])=>html`<button key=${k} class=${tab===k?'on':''} onClick=${()=>setTab(k)}>${l}</button>`)}</div>

    ${tab==='table'?html`<div class="panel" style=${{padding:'18px'}}><${LeagueTable} rows=${state.table} nameOf=${nameOf} onTeam=${id=>setSel(id)}/></div>`:''}

    ${tab==='players'?html`<div>
      <div class="seg" style=${{marginBottom:'12px'}}>${[['g','Top scorers'],['a','Assists'],['cs','Clean sheets'],['ovr','Rating']].map(([k,l])=>html`<button key=${k} class=${statSort===k?'on':''} onClick=${()=>setStatSort(k)}>${l}</button>`)}</div>
      <div class="panel" style=${{padding:'12px'}}><div class="mlist" style=${{maxHeight:'62vh'}}>
        ${sorted.map((r,i)=>html`<div class="mrow" key=${r.card.id} onClick=${()=>setPcard(r.card)}>
          <${RBadge} v=${r.ovr} size=${32}/>
          <div><div class="pname">${r.card.name} <span class="pmeta">${r.pos}</span></div><div class="pmeta" style=${{color:r.owner===1?'var(--p1)':'var(--p2)'}}>${r.team}</div></div>
          <div class="mval">${statSort==='g'?r.g+' G':statSort==='a'?r.a+' A':statSort==='cs'?r.cs+' CS':fmtM(r.card.value)}</div>
          <div class="pmeta">${r.g}G ${r.a}A</div></div>`)}
      </div></div></div>`:''}

    ${tab==='matches'?html`<div class="grid2">${biggest.map((m,i)=>{const h=nameOf.get(m.homeTeamId),a=nameOf.get(m.awayTeamId);if(!h||!a)return'';
      return html`<div class="panel" key=${i} style=${{padding:'16px'}}><div class="smallcap">Matchday ${m.matchday}</div>
        <div class="spread" style=${{marginTop:'8px',alignItems:'center'}}>
          <div style=${{flex:1}}><div class="pname" style=${{color:h.owner===1?'var(--p1)':'var(--p2)'}}>${h.name}</div></div>
          <div class="stat" style=${{fontSize:'24px',fontWeight:700,padding:'0 12px'}}>${m.homeGoals}–${m.awayGoals}</div>
          <div style=${{flex:1,textAlign:'right'}}><div class="pname" style=${{color:a.owner===1?'var(--p1)':'var(--p2)'}}>${a.name}</div></div></div>
        <div class="smallcap" style=${{marginTop:'6px',textAlign:'center'}}>xG ${m.homeXg} – ${m.awayXg}</div></div>`;})}</div>`:''}

    ${tab==='squads'?html`<div>
      <div class="grid2">
        ${[1,2].map(o=>html`<div class="panel" key=${o} style=${{padding:'16px'}}>
          <div class="spread"><div class="kit-pill ${o===1?'p1':'p2'}">${o===1?state.p1Name:state.p2Name}</div><div class="stat" style=${{fontWeight:700,color:o===1?'var(--p1)':'var(--p2)'}}>${(o===1?sc.p1:sc.p2).total} pts</div></div>
          <div style=${{marginTop:'10px'}}>${(o===1?sc.p1:sc.p2).teams.map(tp=>html`<div class="teamline click" key=${tp.id} onClick=${()=>setSel(tp.id)}><span><span class="pos">${tp.position}</span>${tp.name}</span><span class="p">${tp.pts}</span></div>`)}</div>
        </div>`)}
      </div></div>`:''}
  </div>`;
}

      </div>
      <div style=${{marginTop:'10px'}}><label class="lbl">Other positions he can play</label>
        <div class="chips">${Object.keys(POS_LINE).filter(x=>x!==p.primary).map(pos=>{const on=(p.secondaries||[]).includes(pos);return html`<button key=${pos} class=${'chiptoggle'+(on?' on':'')} onClick=${()=>set('secondaries',on?(p.secondaries||[]).filter(s=>s!==pos):[...(p.secondaries||[]),pos])}>${pos}</button>`;})}</div></div>
      <div class="row" style=${{marginTop:'12px',gap:'10px'}}><button class="btn ghost sm" onClick=${()=>{const d=deriveAttrs(p.name,p.primary,+p.overall);setP(x=>({...x,...d}));}}>Auto-fill attributes from overall</button></div>
      <div class="attsec"><h5>Technical</h5>${grid(TECH)}</div>
      <div class="attsec"><h5>Mental</h5>${grid(MENT)}</div>
      <div class="attsec"><h5>Physical</h5>${grid(PHYS)}</div>
      ${isGK?html`<div class="attsec"><h5>Goalkeeping</h5>${grid(GKA)}</div>`:''}
      <div style=${{marginTop:'16px',textAlign:'right'}}><button class="btn p1" onClick=${()=>savePlayer(p)}>Save player</button></div>
    </div></div>`;}

  function MgrForm({m0}){const [m,setM]=useState({...m0});const set=(k,v)=>setM(x=>({...x,[k]:v}));const setAttr=(k,v)=>setM(x=>({...x,[k]:clampA(+v)}));
    return html`<div class="modal" onClick=${()=>setEdit(null)}><div class="panel modalbox" onClick=${e=>e.stopPropagation()}>
      <div class="spread"><h2 class="head" style=${{fontSize:'22px'}}>${m0.name?'Edit manager':'New manager'}</h2><button class="btn ghost sm" onClick=${()=>setEdit(null)}>Close</button></div>
      <div class="grid3" style=${{marginTop:'12px'}}>
        <div><label class="lbl">Name</label><input class="fld" value=${m.name} onInput=${e=>set('name',e.target.value)}/></div>
        <div><label class="lbl">Club</label><input class="fld" value=${m.club} onInput=${e=>set('club',e.target.value)}/></div>
        <div><label class="lbl">Year / season</label><input class="fld" value=${m.season} onInput=${e=>set('season',e.target.value)}/></div>
      </div>
      <div class="grid3" style=${{marginTop:'10px'}}>
        <div><label class="lbl">Overall /99</label><input class="fld" value=${m.overall} onInput=${e=>set('overall',e.target.value)}/></div>
        <div><label class="lbl">Market value £m</label><input class="fld" value=${m.value} onInput=${e=>set('value',e.target.value)}/></div>
        <div style=${{display:'flex',alignItems:'flex-end'}}><button class="btn ghost sm" onClick=${()=>{const d=mgrDerive(+m.overall,m.name);setM(x=>({...x,...d}));}}>Auto-fill from overall</button></div>
      </div>
      <div class="attsec"><h5>Manager attributes</h5><div class="attgrid">${MGR_ATTRS.map(([k,lab])=>html`<div class="att" key=${k}><label>${lab}</label><input value=${m[k]==null?'':m[k]} onInput=${e=>setAttr(k,e.target.value)}/></div>`)}</div></div>
      <div style=${{marginTop:'16px',textAlign:'right'}}><button class="btn p1" onClick=${()=>saveMgr(m)}>Save manager</button></div>
    </div></div>`;}

  return html`<div class="wrap">
    <div class="spread" style=${{marginTop:'18px'}}><div><div class="eyebrow">Data manager</div><h2 class="head">The backend database</h2></div>
      <button class="btn p1" onClick=${()=>dispatch({type:'GO',screen:'setup'})}>Done →</button></div>
    <p class="muted" style=${{marginTop:'8px'}}>Everything the game uses lives here: every player's overall, market value, positions and full attribute set, every manager, and the starting pot. Edit in-app, or export/import CSV to bulk-edit in a spreadsheet, or export <code>data.json</code> for the repo.</p>

    <div class="panel" style=${{padding:'16px',marginTop:'14px'}}>
      <div class="grid3">
        <div><label class="lbl">Starting pot per player (£m)</label><div class="row" style=${{gap:'8px'}}><input class="fld" value=${budget} onInput=${e=>setBudget(e.target.value)}/><button class="btn ghost sm" onClick=${()=>commit({...cat,config:{...(cat.config||{}),budget:Math.max(100,Math.round(+budget||10000))}})}>Set</button></div></div>
        <div style=${{display:'flex',alignItems:'flex-end',gap:'8px',flexWrap:'wrap'}}>
          <button class="btn ghost sm" onClick=${()=>download('players.csv',exportPlayersCSV(cat))}>Export players CSV</button>
          <button class="btn ghost sm" onClick=${()=>download('managers.csv',exportManagersCSV(cat))}>Export managers CSV</button></div>
        <div style=${{display:'flex',alignItems:'flex-end',gap:'8px',flexWrap:'wrap'}}>
          <button class="btn ghost sm" onClick=${()=>download('data.json',JSON.stringify({config:cat.config||{budget:state.budget},players:cat.players,managers:cat.managers}))}>Export data.json</button>
          <button class="btn danger sm" onClick=${()=>{if(confirm('Reset all data to the built-in dataset?')){const d=JSON.parse(JSON.stringify(DEFAULT_DATA));commit(d);}}}>Reset data</button></div>
      </div>
      <div class="row" style=${{marginTop:'12px',gap:'10px',flexWrap:'wrap'}}>
        <label class="btn ghost sm" style=${{display:'inline-block'}}>Import players CSV<input type="file" accept=".csv" style=${{display:'none'}} onChange=${e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const ps=importPlayersCSV(rd.result);commit({...cat,players:ps});alert('Imported '+ps.length+' players');}catch(err){alert('Import failed: '+err.message);}};rd.readAsText(f);}}/></label>
        <label class="btn ghost sm" style=${{display:'inline-block'}}>Import managers CSV<input type="file" accept=".csv" style=${{display:'none'}} onChange=${e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const ms=importManagersCSV(rd.result);commit({...cat,managers:ms});alert('Imported '+ms.length+' managers');}catch(err){alert('Import failed: '+err.message);}};rd.readAsText(f);}}/></label>
      </div>
    </div>

    <div class="seg" style=${{margin:'16px 0'}}>${[['browse','Players ('+cat.players.length+')'],['mgrs','Managers ('+cat.managers.length+')']].map(([k,l])=>html`<button key=${k} class=${tab===k?'on':''} onClick=${()=>setTab(k)}>${l}</button>`)}</div>
    <input class="fld" placeholder="Search…" value=${q} onInput=${e=>setQ(e.target.value)} style=${{marginBottom:'12px'}}/>

    ${tab==='browse'?html`<div class="panel" style=${{padding:'12px'}}>
      <div style=${{textAlign:'right',marginBottom:'8px'}}><button class="btn p1 sm" onClick=${()=>setEdit({kind:'player',data:{...emptyPlayer(),__auto:true}})}>+ Add player</button></div>
      <div class="mlist" style=${{maxHeight:'56vh'}}>${players.map(p=>html`<div class="mrow" key=${p.id}>
        <${RBadge} v=${p.overall} size=${32}/>
        <div onClick=${()=>setEdit({kind:'player',data:p})} style=${{cursor:'pointer'}}><div class="pname">${p.name} <span class="pmeta">${eligPos(p).join(' ')}</span></div><div class="pmeta">${p.club} · ${p.season}</div></div>
        <div class="mval">${fmtM(p.value)}</div>
        <button class="btn danger sm" onClick=${()=>del(p)}>✕</button></div>`)}</div></div>`:''}

    ${tab==='mgrs'?html`<div class="panel" style=${{padding:'12px'}}>
      <div style=${{textAlign:'right',marginBottom:'8px'}}><button class="btn p1 sm" onClick=${()=>setEdit({kind:'manager',data:{id:newId('m'),kind:'manager',name:'',club:'',season:'',overall:75,value:20,...mgrDerive(75,'')}})}>+ Add manager</button></div>
      <div class="mlist" style=${{maxHeight:'56vh'}}>${managers.map(m=>html`<div class="mrow" key=${m.id}>
        <${RBadge} v=${m.overall} size=${32}/>
        <div onClick=${()=>setEdit({kind:'manager',data:m})} style=${{cursor:'pointer'}}><div class="pname">${m.name}</div><div class="pmeta">${m.club} · ${m.season}</div></div>
        <div class="mval">${fmtM(m.value)}</div>
        <button class="btn danger sm" onClick=${()=>del(m)}>✕</button></div>`)}</div></div>`:''}

    ${edit&&edit.kind==='player'?html`<${PlayerForm} p0=${edit.data}/>`:''}
    ${edit&&edit.kind==='manager'?html`<${MgrForm} m0=${edit.data}/>`:''}
  </div>`;
}

/* ---------- root ---------- */
function App(){
  const [boot]=useState(()=>{const s=loadState();return s||freshState(JSON.parse(JSON.stringify(DEFAULT_DATA)));});
  const [state,dispatch]=useReducer(reducer,boot);
  useEffect(()=>{saveState(state);},[state]);
  useEffect(()=>{if(!state.error)return;const t=setTimeout(()=>dispatch({type:'CLR_ERR'}),3600);return()=>clearTimeout(t);},[state.error]);
  let screen;
  if(state.screen==='setup')screen=html`<${Setup} state=${state} dispatch=${dispatch}/>`;
  else if(state.screen==='build')screen=html`<${Build} state=${state} dispatch=${dispatch}/>`;
  else if(state.screen==='sim')screen=html`<${Simulating} state=${state} dispatch=${dispatch}/>`;
  else if(state.screen==='results')screen=html`<${Results} state=${state} dispatch=${dispatch}/>`;
  else if(state.screen==='editor')screen=html`<${Editor} state=${state} dispatch=${dispatch}/>`;
  return html`<div><${TopBar} state=${state} dispatch=${dispatch}/>${screen}
    ${state.error?html`<div class="toast">${state.error}</div>`:''}</div>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
